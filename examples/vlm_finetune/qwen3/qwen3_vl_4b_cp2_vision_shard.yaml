# Dense Qwen3-VL-4B with context parallelism and DeepStack-aware vision sharding.
#
# A/B on 8 GPUs (cp=2, dp=4):
#   sharded  : automodel examples/vlm_finetune/qwen3/qwen3_vl_4b_cp2_vision_shard.yaml --nproc-per-node 8
#   baseline : automodel examples/vlm_finetune/qwen3/qwen3_vl_4b_cp2_vision_shard.yaml --nproc-per-node 8 --cp_vision_sharding.enabled false

recipe: FinetuneRecipeForVLM

seed: 1234

step_scheduler:
  global_batch_size: 8
  local_batch_size: 1
  ckpt_every_steps: 50
  val_every_steps: 50
  num_epochs: 1
  max_steps: 50

dist_env:
  backend: nccl
  timeout_minutes: 20

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3-VL-4B-Thinking
  attn_implementation: sdpa
  torch_dtype: bfloat16

processor:
  _target_: transformers.AutoProcessor.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3-VL-4B-Thinking
  min_pixels: 200704
  max_pixels: 1003520

checkpoint:
  enabled: false

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 2
  pp_size: 1
  ep_size: 1
  sequence_parallel: false
  activation_checkpointing: true

cp_vision_sharding:
  enabled: true
  min_tokens: 0

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_rdr_dataset
  path_or_dataset: quintend/rdr-items
  split: train

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 0
  pin_memory: true
  collate_fn:
    _target_: nemo_automodel.components.datasets.vlm.collate_fns.qwen2_5_collate_fn

optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_language_model: false

ci:
  recipe_owner: yuhez
  nodes: 1
  time: "00:30:00"
