#
# MiniMax M3 VL (image) LoRA SFT -- MOCK 4k variant.
# 8-node / 64 GPUs = PP4 x DP16 with EP8 over the DP shard (ep_shard=2).
# Identical to minimax_m3_vl_lora_pp4ep8_8node.yaml but swaps the MedPix dataset
# for build_mock_vlm_dataset (synthetic images + conversations) at 4096 seqlen.
# Use for functional / throughput smoke tests with no HF download -- loss is
# meaningless (random-noise images).

recipe: FinetuneRecipeForVLM

seed: 1234

step_scheduler:
  # PP4 on 64 GPUs -> dp_size = 64/4 = 16. global_batch_size must be divisible by
  # local_batch_size * dp_size.
  # local 8 OOM'd at the step-0 grad-clip (ep=8 backward re-gathers 16/128 experts).
  # local must be >= pp_size (4) so microbatches/step (local // pp_microbatch_size)
  # can fill the 4-stage pipeline -- local 2 failed that assert. local 4 is the floor
  # and halves activations vs 8; grad-accum becomes 128 / (4 * dp 16) = 2.
  global_batch_size: 128
  local_batch_size: 4
  ckpt_every_steps: 1000
  val_every_steps: 25
  log_remote_every_steps: 1
  gc_every_steps: 10
  max_steps: 100

dist_env:
  backend: nccl
  timeout_minutes: 90

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: /workspace/minimax-m3-bf16_vv1
  trust_remote_code: false
  torch_dtype: bfloat16
  text_config:
    num_mtp_modules: 0
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    # sdpa (not te): M3 sparse-attention layers emit an additive [B,H,T,T] bias
    # from the DSA indexer, which only SDPA's explicit-mask path accepts. TE's
    # DotProductAttention treats attention_mask as a boolean padding mask and
    # crashes on the float bias (a TE block-sparse path is a perf follow-up).
    attn: sdpa
    linear: te
    rms_norm: torch_fp32
    rope_fusion: false
    experts: gmm
    dispatcher: deepep
    fake_balanced_gate: false
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true

processor:
  # The checkpoint's remote-code MiniMaxVLProcessor drops chat_template during
  # from_pretrained, so this helper reattaches chat_template.jinja afterwards.
  _target_: nemo_automodel.components.models.minimax_m3_vl.processing.build_minimax_m3_vl_processor
  pretrained_model_name_or_path: /workspace/minimax-m3-bf16_vv1
  trust_remote_code: true

peft:
  _target_: nemo_automodel.components._peft.lora.PeftConfig
  match_all_linear: false
  exclude_modules:
    - "*vision_tower*"
    - "*vision_model*"
    - "*vision*"
    - "*visual*"
    - "*multi_modal_projector*"
    - "*patch_merge_mlp*"
    - "*lm_head*"
    # Index branch (selection-only) and router gates are not adapted.
    - "*indexer*"
    - "*block_sparse_moe.gate*"
  dim: 32
  alpha: 32
  dropout: 0.0
  moe_rank_scaling: true

checkpoint:
  enabled: false
  checkpoint_dir: vlm_checkpoints/minimax_m3_vl_lora_pp4ep8_8node_mock4k/
  model_save_format: safetensors
  save_consolidated: false
  # BF16 base checkpoint: weights load directly (no MXFP8 *_scale_inv / dequant).
  dequantize_base_checkpoint: false

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 4
  ep_size: 8
  sequence_parallel: false
  activation_checkpointing: true
  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 1
    layers_per_stage: 2
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false
  moe:
    # ep=8 gathers 16 of 128 experts per rank (~25 GB transient across this rank's
    # MoE layers) -- at 4k seqlen that tipped the step-0 grad-clip all-reduce into
    # OOM. Resharding the gathered experts after the forward frees that memory for
    # the backward. (SFT's ep=32 holds only ~4 experts/rank, so it runs with false.)
    reshard_after_forward: true
    wrap_outer_model: true

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy
  fp32_upcast: false

dataset:
  # Synthetic VLM dataset: random images + generated conversations. max_length
  # here makes each assistant response long enough that the tokenized sequence
  # fills the 4096 collate budget (random-noise images -> loss is not meaningful).
  _target_: nemo_automodel.components.datasets.vlm.mock.build_mock_vlm_dataset
  num_samples: 512
  num_images_per_sample: 1
  image_size: [256, 256]
  max_length: 4096
  seed: 42

dataloader:
  # No collate_fn: dataset.max_length triggers the pretokenize path in
  # build_dataloader (PreTokenizedDatasetWrapper truncates each sample to 4096),
  # which selects pad_collate_fn automatically. A default_collate_fn here would
  # be handed already-tokenized dicts and fail with KeyError('conversation').
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 2
  persistent_workers: true
  pin_memory: true
  drop_last: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.vlm.mock.build_mock_vlm_dataset
  num_samples: 128
  num_images_per_sample: 1
  image_size: [256, 256]
  max_length: 4096
  seed: 43

validation_dataloader:
  # No collate_fn: same pretokenize path as the train dataloader (pad_collate_fn).
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 1

optimizer:
  _target_: torch.optim.Adam
  betas: [0.9, 0.999]
  eps: 1e-8
  lr: 1.0e-5
  weight_decay: 0

lr_scheduler:
  lr_decay_style: cosine
  min_lr: 1.0e-7

wandb:
  project: hiddentrail
  entity: nvidia
  name: minimax_m3_vl_lora_pp4ep8_mock4k
  dir: vlm_checkpoints/minimax_m3_vl_lora_pp4ep8_8node_mock4k/
