#
# PACKED 128k context CP run: FULL 60-layer MiniMax M3 VL, cp_size=16, pack_size=131072.
# 256 GPUs / 32 nodes:  world = pp(4) * dp(4) * cp(16) * tp(1) = 256.
# ep(32) | dp*cp = 4*16 = 64.  Per-rank sequence after CP sharding = 131072/16 = 8192.
#
# This is the cp16/256-GPU variant of minimax_m3_vl_sft_cp8_packed_128k.yaml, created
# after the cp8/128-GPU run OOM'd on GPU activation memory (16384 tokens/rank x 60
# layers). cp16 halves per-rank sequence to 8192 (~the cp4_full_8k per-rank seq x4,
# vs x8 at cp8), keeping the validated ep32/pp4 structure. Param/optimizer footprint
# is unchanged (dp*cp = 64 ... wait FSDP shards across dp_shard_cp = dp*cp; here 64
# vs 32 at cp8 -> params shard FURTHER, so param memory also drops).
#
# Launch on 32 nodes: edit launch_sft_ep32pp4_16nodes_genai.sub to "#SBATCH -N 32"
# and point CONFIG at this file. If 8192/rank still OOMs, raise pp_size (more stages
# -> fewer layers/rank) or cp_size further.
#
# Indexed packed mask (attn_implementation: flash_attention_2) avoids the dense
# [B,1,S,S] dataloader OOM; the mask is stripped under CP and doc boundaries come
# from position_ids.

recipe: FinetuneRecipeForVLM
seed: 1234

step_scheduler:
  # dp = 256 / (pp4 * cp16 * tp1) = 4; packed local_batch_size = pp_size (4 packs).
  # global = 4 * 4 = 16 (grad_accum 1).
  global_batch_size: 16
  local_batch_size: 4
  ckpt_every_steps: 1000000
  val_every_steps: 1000000
  log_remote_every_steps: 1
  gc_every_steps: 10
  max_steps: 10

dist_env:
  backend: nccl
  timeout_minutes: 90

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: /lustre/fsw/portfolios/coreai/users/athittenaman/checkpoints/minimax-m3-bf16_vv1
  trust_remote_code: false
  torch_dtype: bfloat16
  text_config:
    num_mtp_modules: 0
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: sdpa
    linear: te
    rms_norm: torch_fp32
    rope_fusion: false
    experts: gmm
    dispatcher: deepep
    fake_balanced_gate: false
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true

processor:
  _target_: nemo_automodel.components.models.minimax_m3_vl.processing.build_minimax_m3_vl_processor
  pretrained_model_name_or_path: /lustre/fsw/portfolios/coreai/users/athittenaman/checkpoints/minimax-m3-bf16_vv1
  trust_remote_code: true

checkpoint:
  enabled: false
  checkpoint_dir: vlm_checkpoints/minimax_m3_vl_sft_cp16_packed_128k/
  model_save_format: safetensors
  save_consolidated: false
  dequantize_base_checkpoint: false

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 16
  pp_size: 4
  ep_size: 32
  sequence_parallel: false
  activation_checkpointing: true
  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 1
    layers_per_stage: 2
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false
  moe:
    reshard_after_forward: false
    wrap_outer_model: true

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy
  fp32_upcast: false

packed_sequence:
  pack_size: 131072
  max_length: 16384
  pretokenize: true
  drop_long_samples: true
  collate_max_length: 131072
  balance_media_tokens: true
  attn_implementation: flash_attention_2

dataset:
  _target_: nemo_automodel.components.datasets.vlm.mock.build_mock_vlm_dataset
  num_samples: 256
  num_images_per_sample: 1
  image_size: [256, 256]
  max_length: 16384
  seed: 42

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 2
  pin_memory: true
  drop_last: true

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1e-8
  lr: 2.0e-6
  weight_decay: 0.1

lr_scheduler:
  lr_decay_style: cosine
  min_lr: 2.0e-7
