#
# PACKED 8k comparison run: identical shape to minimax_m3_vl_sft_cp4_full_8k.yaml
# (full 60 layers, cp4/pp4/ep32, 128 GPUs) but with sequence PACKING enabled, so it
# validates the per-document CP-sparse masking at full scale and is directly
# comparable to the no-packing 8k run (loss magnitude / grad / mem should be sane;
# exact loss differs because the data is multi-document packs vs a single 8k doc).
#
# Submit by pointing launch_sft_ep32pp4_16nodes_genai.sub's CONFIG at this file (16 nodes).

recipe: FinetuneRecipeForVLM
seed: 1234

step_scheduler:
  # dp = 128 / (pp4 * cp4 * tp1) = 8; packed local_batch_size = pp_size (4 packs, so
  # PP can microbatch them). global = 4 * 8 = 32 (grad_accum 1).
  global_batch_size: 32
  local_batch_size: 4
  ckpt_every_steps: 1000000
  val_every_steps: 1000000
  log_remote_every_steps: 1
  gc_every_steps: 10
  max_steps: 20

dist_env:
  backend: nccl
  timeout_minutes: 60

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: /lustre/fsw/portfolios/coreai/users/athittenaman/checkpoints/minimax-m3-bf16_vv1
  trust_remote_code: false
  torch_dtype: bfloat16
  text_config:
    num_mtp_modules: 0
    # Do NOT override sparse_attention_config (replace, not merge) -> layers 3-59 sparse.
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: sdpa
    linear: te
    rms_norm: torch_fp32
    rope_fusion: false
    experts: gmm
    dispatcher: deepep
    fake_balanced_gate: false
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true

processor:
  _target_: nemo_automodel.components.models.minimax_m3_vl.processing.build_minimax_m3_vl_processor
  pretrained_model_name_or_path: /lustre/fsw/portfolios/coreai/users/athittenaman/checkpoints/minimax-m3-bf16_vv1
  trust_remote_code: true

checkpoint:
  enabled: false
  checkpoint_dir: vlm_checkpoints/minimax_m3_vl_sft_cp4_packed_8k/
  model_save_format: safetensors
  save_consolidated: false
  dequantize_base_checkpoint: false

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 4
  pp_size: 4
  ep_size: 32
  sequence_parallel: false
  activation_checkpointing: true
  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 1
    layers_per_stage: 2
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false
  moe:
    reshard_after_forward: false
    wrap_outer_model: true

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy
  fp32_upcast: false

# Pack short mock docs (~2048 tokens) into 8192 packs (divisible by 2*cp=8) ->
# ~4 documents/pack, exercising the per-document CP-sparse mask at full scale.
packed_sequence:
  pack_size: 8192
  max_length: 2048
  pretokenize: true
  drop_long_samples: true
  collate_max_length: 8192
  balance_media_tokens: true

dataset:
  _target_: nemo_automodel.components.datasets.vlm.mock.build_mock_vlm_dataset
  num_samples: 512
  num_images_per_sample: 1
  image_size: [256, 256]
  max_length: 2048
  seed: 42

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 2
  pin_memory: true
  drop_last: true

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1e-8
  lr: 2.0e-6
  weight_decay: 0.1

lr_scheduler:
  lr_decay_style: cosine
  min_lr: 2.0e-7
