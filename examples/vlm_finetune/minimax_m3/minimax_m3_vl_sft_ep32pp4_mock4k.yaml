#
# Full MiniMax M3 VL SFT: EP32 + PP4 (128 GPUs / 16 nodes) -- MOCK 4k variant.
# Identical to minimax_m3_vl_sft_ep32pp4.yaml but swaps the MedPix dataset for
# build_mock_vlm_dataset (synthetic images + conversations) at 4096 seqlen.
# Use for functional / throughput smoke tests with no HF download -- loss is
# meaningless (random-noise images).

recipe: FinetuneRecipeForVLM

seed: 1234

step_scheduler:
  global_batch_size: 512
  # local 8 OOM'd at step 1 (Adam states resident after the first optimizer.step
  # + 4k activations > 80 GB). local 4 halves in-flight PP microbatches; grad-accum
  # becomes 512 / (4 * dp 32) = 4.
  local_batch_size: 4
  ckpt_every_steps: 100
  val_every_steps: 25
  log_remote_every_steps: 1
  gc_every_steps: 10
  max_steps: 10

dist_env:
  backend: nccl
  timeout_minutes: 60

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  # Local path of the provided checkpoint; replace with the HF id once published.
  pretrained_model_name_or_path: /workspace/minimax-m3-preview_vv1
  trust_remote_code: false
  torch_dtype: bfloat16
  text_config:
    # SFT is MTP-free by default (the checkpoint's single MTP module is dropped on
    # load).
    num_mtp_modules: 0
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    # sdpa (not te): M3 sparse-attention layers emit an additive [B,H,T,T] bias
    # from the DSA indexer, which only SDPA's explicit-mask path accepts. TE's
    # DotProductAttention treats attention_mask as a boolean padding mask and
    # crashes on the float bias (a TE block-sparse path is a perf follow-up).
    attn: sdpa
    linear: te
    rms_norm: torch_fp32
    rope_fusion: false
    experts: gmm
    dispatcher: deepep
    fake_balanced_gate: false
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true
    # NOTE: the router gate is forced to fp32 by the model regardless of backend.

processor:
  # The checkpoint bundles its processor (auto_map -> processing_minimax.MiniMaxVLProcessor)
  # but its remote-code __init__ drops chat_template during from_pretrained, so this
  # helper loads it via AutoProcessor (trust_remote_code) and reattaches chat_template.jinja.
  _target_: nemo_automodel.components.models.minimax_m3_vl.processing.build_minimax_m3_vl_processor
  pretrained_model_name_or_path: /workspace/minimax-m3-preview_vv1
  trust_remote_code: true

checkpoint:
  # Disabled for the smoke test: the mock dataset is tiny (1024 / global 512 = 2
  # steps per epoch), so the epoch-boundary save would checkpoint the full ~400B
  # model every 2 steps and dominate the run. Matches the LoRA mock recipe.
  enabled: false
  checkpoint_dir: vlm_checkpoints/minimax_m3_vl_sft_ep32pp4_mock4k/
  model_save_format: safetensors
  save_consolidated: false
  # Load MXFP8 base weights: request *_scale_inv tensors and dequantize on load.
  dequantize_base_checkpoint: true

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 4
  ep_size: 32
  sequence_parallel: false
  activation_checkpointing: true
  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 1
    layers_per_stage: 2
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false
  moe:
    # true frees the gathered experts after the forward (~7 GiB at ep=32) for extra
    # backward headroom; combined with local_batch_size=4 this clears the step-1 OOM.
    reshard_after_forward: true
    wrap_outer_model: true

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy
  fp32_upcast: false

dataset:
  # Synthetic VLM dataset: random images + generated conversations. max_length
  # here makes each assistant response long enough that the tokenized sequence
  # fills the 4096 collate budget (random-noise images -> loss is not meaningful).
  _target_: nemo_automodel.components.datasets.vlm.mock.build_mock_vlm_dataset
  num_samples: 1024
  num_images_per_sample: 1
  image_size: [256, 256]
  max_length: 4096
  seed: 42

dataloader:
  # No collate_fn: dataset.max_length triggers the pretokenize path in
  # build_dataloader (PreTokenizedDatasetWrapper truncates each sample to 4096),
  # which selects pad_collate_fn automatically. A default_collate_fn here would
  # be handed already-tokenized dicts and fail with KeyError('conversation').
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 2
  persistent_workers: true
  pin_memory: true
  drop_last: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.vlm.mock.build_mock_vlm_dataset
  num_samples: 256
  num_images_per_sample: 1
  image_size: [256, 256]
  max_length: 4096
  seed: 43

validation_dataloader:
  # No collate_fn: same pretokenize path as the train dataloader (pad_collate_fn).
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 1

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1e-8
  lr: 2.0e-6
  weight_decay: 0.1

lr_scheduler:
  lr_decay_style: cosine
  min_lr: 2.0e-7

wandb:
  project: hiddentrail
  entity: nvidia
  name: minimax_m3_vl_sft_ep32pp4_mock4k
  dir: vlm_checkpoints/minimax_m3_vl_sft_ep32pp4_mock4k/
