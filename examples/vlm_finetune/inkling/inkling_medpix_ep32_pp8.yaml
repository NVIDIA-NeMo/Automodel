# Full Inkling (975B-A41B) MedPix fine-tune: EP32 / PP8. Loads the raw checkpoint directly.

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 256
  local_batch_size: 8
  ckpt_every_steps: 500
  val_every_steps: 100000
  num_epochs: 1
  max_steps: 50

dist_env:
  backend: nccl
  timeout_minutes: 20

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: thinkingmachines/Inkling
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: sdpa
    linear: torch
    rms_norm: torch_fp32
    gate_precision: float32
    experts: torch_mm
    enable_hf_state_dict_adapter: true

processor:
  _target_: transformers.AutoProcessor.from_pretrained
  pretrained_model_name_or_path: thinkingmachines/Inkling

checkpoint:
  enabled: false
  checkpoint_dir: /tmp/checkpoints/
  model_save_format: safetensors
  save_consolidated: false

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 8
  dp_replicate_size: 1
  ep_size: 32
  sequence_parallel: false
  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 1
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    layers_per_stage: 4
    patch_inner_model: false
    patch_causal_lm_model: false

freeze_config:
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_medpix_dataset
  path_or_dataset: mmoukouba/MedPix-VQA
  split: train

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 1
  collate_fn:
    _target_: nemo_automodel.components.datasets.vlm.collate_fns.inkling_collate_fn
    max_length: 512
  drop_last: true

optimizer:
  _target_: torch.optim.Adam
  betas: [0.9, 0.95]
  eps: 1e-7
  lr: 1.0e-4
  weight_decay: 0.0


ci:
  recipe_owner: HuiyingLi
  nodes: 32
  time: "00:45:00"
