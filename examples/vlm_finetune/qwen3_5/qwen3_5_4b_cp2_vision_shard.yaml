# Dense Qwen3.5-4B VLM with context parallelism (cp_size=2) on a single node
# (8 GPUs: cp=2, dp=4), demonstrating context-parallel vision-tower sharding.
#
# Vision-tower sharding is explicitly enabled below: with cp_size=2 the recipe
# publishes the configured policy and CP group around the pre-embed forward, and
# Qwen3_5ForConditionalGeneration.prepare_model_inputs_for_cp routes the vision
# tower through cp_vision_shard.maybe_distribute_visual, so each CP rank runs the
# ViT on ~1/cp_size of the frames instead of the full set redundantly.
#
# A/B (same topology, same global batch -> numerically equivalent loss):
#   sharded  : automodel examples/vlm_finetune/qwen3_5/qwen3_5_4b_cp2_vision_shard.yaml --nproc-per-node 8
#   baseline : automodel examples/vlm_finetune/qwen3_5/qwen3_5_4b_cp2_vision_shard.yaml --nproc-per-node 8 --distributed.cp_vision_sharding.enabled false
# The config sets min_tokens=0 so even this small demo batch exercises the distributed path.
# The baseline CLI override is captured in the resolved recipe configuration.

recipe: FinetuneRecipeForVLM

seed: 1234

step_scheduler:
  global_batch_size: 16
  local_batch_size: 1
  ckpt_every_steps: 100
  val_every_steps: 100
  num_epochs: 1
  max_steps: 50

dist_env:
  backend: nccl
  timeout_minutes: 20

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3.5-4B
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: sdpa
    linear: torch
    rms_norm: torch
    rope_fusion: false
  attn_implementation: sdpa
  torch_dtype: bfloat16

processor:
  _target_: transformers.AutoProcessor.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3.5-4B

checkpoint:
  enabled: false

distributed:
  _target_: nemo_automodel.components.distributed.fsdp2.FSDP2Manager
  tp_size: 1
  cp_size: 2
  pp_size: 1
  dp_replicate_size: 1
  ep_size: 1
  sequence_parallel: false
  activation_checkpointing: true
  cp_vision_sharding:
    enabled: true
    min_tokens: 0

freeze_config:
  # Frozen ViT is the common speedup case (also the recipe default). The
  # trainable-tower path is gradient-correct too (CP-only group); the CP vision
  # group is CP-only so a trainable ViT's gradients are not tp-accumulated.
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_medpix_dataset
  path_or_dataset: mmoukouba/MedPix-VQA
  split: train

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 0
  collate_fn:
    _target_: nemo_automodel.components.datasets.vlm.collate_fns.default_collate_fn

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1e-8
  lr: 1.0e-5
  weight_decay: 0.1

ci:
  recipe_owner: yuhez
  nodes: 1
  time: "00:30:00"
