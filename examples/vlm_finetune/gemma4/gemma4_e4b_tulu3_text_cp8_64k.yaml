# Gemma 4 E4B (small dense, 4B, kv-sharing + per-layer-inputs) text-only SFT on
# Tulu-3, sequence-packed to 64k, on a SINGLE 8-GPU node. cp8 shards the 64k
# sequence to 8k tokens/rank via the model-owned p2p ring; FSDP shards the 4B
# params + fp32 Adam over the cp axis. Peak ~32 GiB/GPU.
#
# Three E4B-specific settings vs the 31B tulu3 recipe (each validated):
#   1. dataset.inject_fake_images=false  -- the VLM pipeline otherwise injects a
#      fake image into every text-only sample (to keep the vision tower in the
#      FSDP graph). E4B's vision patch-embedder then builds a ~54 GiB position
#      one-hot and OOMs. The vision tower is frozen here, so the fake images are
#      unnecessary; disabling them keeps the run text-only (~32 GiB) and avoids
#      the OOM.
#   2. NO thinking-prefix hook -- E4B is not a reasoning model; it cannot predict
#      the injected <|channel>thought ...<|channel|> tokens (assistant loss ~1.5
#      plain vs blown-up with thinking). The 31B is a reasoning model and is the
#      opposite, hence the 31B recipe injects thinking and E4B must not.
#   3. FusedLinearCrossEntropy (cut_cross_entropy) -- avoids materializing the
#      full [S, 262k-vocab] logits at 64k. Requires text_config.output_hidden_states.
#
# Dense CP requires attn_implementation=sdpa (the ring swaps
# F.scaled_dot_product_attention) and no TE-attention backend. TP is unavailable
# for E2B/E4B (HF's per-layer-input merge crashes under DTensor), so scale with
# dp_shard x cp only.

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 1
  local_batch_size: 1
  ckpt_every_steps: 999999
  val_every_steps: 999999
  max_steps: 50
  num_epochs: 1

dist_env:
  backend: nccl
  timeout_minutes: 30

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: google/gemma-4-E4B-it
  torch_dtype: torch.bfloat16
  attn_implementation: sdpa
  use_liger_kernel: false
  use_sdpa_patching: false
  text_config:
    use_cache: false
    output_hidden_states: true

processor:
  padding_side: right

checkpoint:
  enabled: false

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 8
  sequence_parallel: false
  activation_checkpointing: true

loss_fn:
  _target_: nemo_automodel.components.loss.linear_ce.FusedLinearCrossEntropy
  logit_softcapping: 30.0
  reduction: sum

dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_meta_dataset
  path_or_dataset: /lustre/fs1/portfolios/coreai/projects/coreai_dlalgo_nemofw/users/huiyingl/evee/Automodel/logs/gemma4_tulu3_seqpack_cp/data/tulu3_train_meta.json
  split: train
  truncate: false
  inject_fake_images: false

packed_sequence:
  pretokenize: true
  max_length: 65536
  pack_size: 65536
  collate_max_length: 65536
  packing_ratio: 0.9
  drop_long_samples: true

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 4
  persistent_workers: true
  pin_memory: true

optimizer:
  _target_: torch.optim.AdamW
  lr: 2e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

wandb:
  project: huiyingl_workspace
  entity: Nemo-automodel
  name: gemma4_e4b_tulu3_text_cp8_64k
  group: gemma4_e4b_tulu3_text_cp8_64k
  tags: [gemma4-e4b, tulu3, text-only, dense, cp8, 64k, single-node]
  dir: logs/gemma4_e4b_tulu3_text_cp8_64k/wandb
