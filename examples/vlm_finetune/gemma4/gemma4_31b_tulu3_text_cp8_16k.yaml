# Gemma 4 31B (dense) text-only SFT on Tulu-3, sequence-packed to 16k, single node.
# Context parallelism cp8 shards the 16k sequence to 2k local/rank so the full
# 60-layer model fits on one 8-GPU node (~54 GiB steady).
# Dense CP requires attn_implementation=sdpa (the model-owned p2p ring swaps
# F.scaled_dot_product_attention) and no TE-attention backend so the dense CP
# install path runs.

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 1
  local_batch_size: 1
  ckpt_every_steps: 999999
  val_every_steps: 999999
  max_steps: 50
  num_epochs: 1

dist_env:
  backend: nccl
  timeout_minutes: 60

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: google/gemma-4-31B-it
  torch_dtype: torch.bfloat16
  attn_implementation: sdpa
  use_liger_kernel: false
  use_sdpa_patching: false
  text_config:
    use_cache: false

processor:
  padding_side: right

checkpoint:
  enabled: false

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 8
  sequence_parallel: false
  activation_checkpointing: true

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  # Pull Tulu-3 straight from the HF Hub (no meta-JSON / JSONL data-prep step).
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_tulu3_dataset
  path_or_dataset: allenai/tulu-3-sft-mixture
  split: train
  truncate: false

packed_sequence:
  pretokenize: true
  max_length: 16384
  pack_size: 16384
  collate_max_length: 16384
  packing_ratio: 0.9
  drop_long_samples: true
  post_tokenize_hook_fn: nemo_automodel.components.datasets.vlm.collate_fns.gemma4_inject_thinking_prefix

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 4
  persistent_workers: true
  pin_memory: true

optimizer:
  _target_: torch.optim.AdamW
  lr: 2e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

wandb:
  enable: false
  project: <your_wandb_project>
  entity: <your_wandb_entity>
  name: <your_wandb_name>
  dir: <your_wandb_save_dir>
