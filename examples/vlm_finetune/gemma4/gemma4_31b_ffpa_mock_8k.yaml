# Gemma 4 31B (dense) VLM perf recipe: FFPA head_dim=512 attention at 8k, NO CP.
# Mirrors gemma4_31b_ffpa.yaml (attn_implementation: ffpa, cp_size: 1) but swaps the
# on-disk MMLongBench meta dataset for the built-in synthetic VLM mock, so the recipe
# is fully self-contained and CI-runnable with no data download or local prep.
#
# NOTE — why this recipe does NOT use packed_sequence:
#   attn_implementation='ffpa' is rejected with packed sequences (auto_model.py:
#   "attn_implementation='ffpa' is incompatible with packed sequences") AND with CP.
#   So without CP, FFPA seqlen is controlled exclusively via collate_fn.max_length
#   (forwarded to the HF processor as padding="max_length" + truncation=True), giving
#   a deterministic (B, 8192) shape every step. Packing the head_dim=512 full-attention
#   through FFPA is only available via the CP ring path — see
#   gemma4_31b_ffpa_mock_packing_cp8_16k.yaml (attn=sdpa + cp_full_attn_backend=ffpa).
# torchrun --nproc-per-node=8 examples/vlm_finetune/finetune.py -c examples/vlm_finetune/gemma4/gemma4_31b_ffpa_mock_8k.yaml

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 8
  local_batch_size: 1
  ckpt_every_steps: 999999
  val_every_steps: 999999
  max_steps: 200
  num_epochs: 50

dist_env:
  backend: nccl
  timeout_minutes: 60

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: google/gemma-4-31B-it
  torch_dtype: torch.bfloat16
  use_liger_kernel: true
  use_sdpa_patching: false
  # No CP here, so the FFPA op is called directly via the HF 'ffpa' backend
  # (route for head_dim=512 dense full-attention).
  attn_implementation: ffpa
  text_config:
    use_cache: false

processor:
  padding_side: right

checkpoint:
  enabled: false

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1
  sequence_parallel: false
  # Activation checkpointing is required for Gemma4 31B to fit in memory; fsdp alone leads to OOM.
  activation_checkpointing: true

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.vlm.mock.build_mock_vlm_dataset
  num_samples: 256
  num_images_per_sample: 1
  image_size: [896, 896]
  max_length: 8192
  seed: 42
  # This non-packed recipe feeds raw conversations to gemma4_prefix_collate_fn
  # (seqlen controlled via collate_fn.max_length), so do NOT pre-tokenize --
  # PreTokenizedDatasetWrapper would drop the "conversation" key the collate needs.
  pretokenize: false

validation_dataset:
  _target_: nemo_automodel.components.datasets.vlm.mock.build_mock_vlm_dataset
  num_samples: 16
  num_images_per_sample: 1
  image_size: [896, 896]
  max_length: 8192
  seed: 43
  pretokenize: false

# Gemma4 FFPA without CP does not support sequence packing, so seqlen is controlled
# exclusively via collate_fn.max_length (forwarded to the HF processor with
# padding="max_length" + truncation=True for deterministic activation memory).
dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 4
  pin_memory: true
  collate_fn:
    _target_: nemo_automodel.components.datasets.vlm.collate_fns.gemma4_prefix_collate_fn
    max_length: 8192

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 1
  collate_fn:
    _target_: nemo_automodel.components.datasets.vlm.collate_fns.gemma4_prefix_collate_fn
    max_length: 8192

optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]

lr_scheduler:
  lr_decay_style: cosine

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

ci:
  recipe_owner: Butterfingrz
  env_vars:
    MAX_STEPS: 10
