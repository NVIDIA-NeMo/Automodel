# Gemma 4 31B (dense) Ring P2P CP fine-tune: the head_dim=512 full-attention ring
# chunks run through the FFPA CuTeDSL kernel; sliding-window layers use Flex.
# torchrun --nproc-per-node=8 examples/vlm_finetune/finetune.py -c examples/vlm_finetune/gemma4/gemma4_31b_ffpa_cp8.yaml

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 8
  local_batch_size: 1
  ckpt_every_steps: 500
  val_every_steps: 500
  num_epochs: 2

dist_env:
  backend: nccl
  timeout_minutes: 60

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: google/gemma-4-31B-it
  torch_dtype: torch.bfloat16
  use_liger_kernel: true
  use_sdpa_patching: false
  # CP installs the model-owned ring by swapping SDPA, so HF init must use sdpa
  # (ffpa bypasses the swap and is rejected with cp_size>1).
  attn_implementation: sdpa
  text_config:
    use_cache: false
    cp_full_attn_backend: ffpa  # route head_dim=512 full-attention ring chunks through FFPA

processor:
  padding_side: right

checkpoint:
  enabled: false
  checkpoint_dir: vlm_checkpoints/gemma4_31b_it/
  model_save_format: torch_save
  save_consolidated: false

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 8
  sequence_parallel: false
  activation_checkpointing: true  # required for 31B to fit

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_meta_dataset
  path_or_dataset: /path/to/mmlongbench/meta_train_summ_multi.json

validation_dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_meta_dataset
  path_or_dataset: /path/to/mmlongbench/meta_val_summ_multi.json

# max_length must be divisible by 2*cp_size (16 here) for contiguous CP sharding.
dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 4
  pin_memory: true
  collate_fn:
    _target_: nemo_automodel.components.datasets.vlm.collate_fns.gemma4_prefix_collate_fn
    max_length: 16384

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 1
  collate_fn:
    _target_: nemo_automodel.components.datasets.vlm.collate_fns.gemma4_prefix_collate_fn
    max_length: 16384

optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]

lr_scheduler:
  lr_decay_style: cosine

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

wandb:
  project: gemma4-31b-ffpa-cp
  name: ""
  group: "gemma4-31b-mmlongbench"
  tags:
    - gemma4-31b
    - fsdp2
    - cp8
    - ffpa

ci:
  recipe_owner: athitten
  time: "00:30:00"
