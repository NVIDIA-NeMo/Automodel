# Gemma 4 E4B text-only SFT on Tulu-3, sequence-packed to 64k, MULTINODE:
# 2 nodes (16 GPUs), dp1 x cp16 -> CP shards 64k to 4k tokens/rank (same local
# size as the single-node cp8/32k recipe, ~54 GiB/GPU). Requires the E4B
# kv-sharing fix (cache-free holder) + activation_checkpointing=false; see
# gemma4_e4b_tulu3_text_cp8_32k.yaml for the rationale of every E4B-specific
# setting below.

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 1
  local_batch_size: 1
  ckpt_every_steps: 999999
  val_every_steps: 999999
  max_steps: 20
  num_epochs: 1

dist_env:
  backend: nccl
  timeout_minutes: 30

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: google/gemma-4-E4B-it
  torch_dtype: torch.bfloat16
  attn_implementation: sdpa
  use_liger_kernel: false
  use_sdpa_patching: false
  text_config:
    use_cache: false
    output_hidden_states: true

processor:
  padding_side: right

checkpoint:
  enabled: false

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 16
  sequence_parallel: false
  activation_checkpointing: false

loss_fn:
  _target_: nemo_automodel.components.loss.linear_ce.FusedLinearCrossEntropy
  logit_softcapping: 30.0
  reduction: sum

dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_meta_dataset
  path_or_dataset: /lustre/fs1/portfolios/coreai/projects/coreai_dlalgo_nemofw/users/huiyingl/evee/Automodel/logs/gemma4_tulu3_seqpack_cp/data/tulu3_train_meta.json
  split: train
  truncate: false
  inject_fake_images: false

packed_sequence:
  pretokenize: true
  max_length: 65536
  pack_size: 65536
  collate_max_length: 65536
  packing_ratio: 0.9
  drop_long_samples: true

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 4
  persistent_workers: true
  pin_memory: true

optimizer:
  _target_: torch.optim.AdamW
  lr: 2e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

wandb:
  project: huiyingl_workspace
  entity: Nemo-automodel
  name: gemma4_e4b_tulu3_text_cp16_64k_2node
  group: gemma4_e4b_tulu3_text_cp16_64k
  tags: [gemma4-e4b, tulu3, text-only, dense, cp16, 64k, 2node]
  dir: logs/gemma4_e4b_tulu3_text_cp16_64k/wandb
