# Gemma 4 31B (dense) text-only SFT on Tulu-3, sequence-packed to 128k, single node.
# The head_dim=512 full-attention ring chunks run through the FFPA CuTeDSL *varlen*
# kernel (cu_seqlens from _packed_seq_ids, so it stays active under packing);
# sliding-window layers use Flex.
# torchrun --nproc-per-node=8 examples/vlm_finetune/finetune.py -c examples/vlm_finetune/gemma4/gemma4_31b_ffpa_tulu3_text_cp8_16k.yaml

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 1
  local_batch_size: 1
  ckpt_every_steps: 999999
  val_every_steps: 999999
  max_steps: 200
  num_epochs: 1

dist_env:
  backend: nccl
  timeout_minutes: 60

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: google/gemma-4-31B-it
  torch_dtype: torch.bfloat16
  # CP installs the model-owned ring by swapping SDPA, so HF init must use sdpa
  # (ffpa bypasses the swap and is rejected with cp_size>1).
  attn_implementation: sdpa
  use_liger_kernel: false
  use_sdpa_patching: false
  text_config:
    use_cache: false
    cp_full_attn_backend: ffpa  # route head_dim=512 full-attention ring chunks through FFPA varlen

processor:
  padding_side: right

checkpoint:
  enabled: false

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 8
  sequence_parallel: false
  activation_checkpointing: true  # required for 31B to fit

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_meta_dataset
  path_or_dataset: /path/to/tulu3_sharegpt/tulu3_train_meta.json
  split: train
  truncate: false

# pack_size must be divisible by 2*cp_size (16 here): 131072 / 16 = 8192.
# collate_max_length MUST match pack_size, else the collate truncates each pack.
packed_sequence:
  pretokenize: true
  max_length: 131072
  pack_size: 131072
  collate_max_length: 131072
  packing_ratio: 0.9
  drop_long_samples: true
  post_tokenize_hook_fn: nemo_automodel.components.datasets.vlm.collate_fns.gemma4_inject_thinking_prefix

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 4
  persistent_workers: true
  pin_memory: true

optimizer:
  _target_: torch.optim.AdamW
  lr: 2e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

wandb:
  enable: True
  project: gemma4-31b-ffpa-Ring-cp
  name: gemma4_31b_ffpa_tulu3_text_cp8_128k
  group: gemma4_31b_ffpa_tulu3_text_cp8_128k
  tags: [gemma4-31b, tulu3, text-only, dense, cp8, 128k, ffpa, packed, single-node]
  dir: logs/gemma4_31b_ffpa_tulu3_text_cp8_128k/wandb
