# Gemma 4 4B (dense) CP=2 smoke test with mock text-only dataset.
# Use this to validate the CP implementation before scaling to 31B.
#
# Topology: CP2 x DP4 = 8 GPUs.
# Memory estimate per A100-80GB:
#   weights ~1GB + opt ~2GB + activations → well within 80GB.
#
# Run:
#   torchrun --nproc-per-node=8 nemo_automodel/recipes/vlm/finetune.py \
#     -c examples/vlm_finetune/gemma4/gemma4_4b_cp2_mock.yaml
#
# To compare loss parity against CP=1, run the same config with
# --distributed.cp_size 1 --distributed.dp_size 8 and check that
# losses match step-for-step.

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 8
  local_batch_size: 1
  ckpt_every_steps: 9999
  val_every_steps: 9999
  max_steps: 10
  num_epochs: 1

dist_env:
  backend: nccl
  timeout_minutes: 10

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: google/gemma-4-E4B-it
  torch_dtype: torch.bfloat16
  use_liger_kernel: false
  use_sdpa_patching: false
  attn_implementation: sdpa
  text_config:
    use_cache: false

processor:
  padding_side: right

checkpoint:
  enabled: false

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 2
  sequence_parallel: false
  activation_checkpointing: true

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

# Text-only mock dataset — pixel_values is absent so the CP image-token
# insertion limitation does not apply.
dataset:
  _target_: nemo_automodel.components.datasets.vlm.mock.build_mock_vlm_dataset
  num_samples: 100
  num_images_per_sample: 0
  max_length: 4096
  seed: 42

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 0
  pin_memory: true
  drop_last: true

optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

ci:
  recipe_owner: khazic
