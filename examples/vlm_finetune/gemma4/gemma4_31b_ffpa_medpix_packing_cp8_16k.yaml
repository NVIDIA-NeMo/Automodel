# Gemma 4 31B (dense) MedPix-VQA SFT, sequence-packed to 16k under Ring P2P CP8.
# The head_dim=512 full-attention ring chunks run through the FFPA CuTeDSL varlen
# kernel; sliding-window layers use Flex. MedPix-VQA is pulled from the HF Hub at
# runtime, so the recipe is CI-runnable with no local data prep.
# torchrun --nproc-per-node=8 examples/vlm_finetune/finetune.py -c examples/vlm_finetune/gemma4/gemma4_31b_ffpa_medpix_packing_cp8_16k.yaml

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 1
  local_batch_size: 1
  ckpt_every_steps: 999999
  val_every_steps: 999999
  max_steps: 200
  num_epochs: 1

dist_env:
  backend: nccl
  timeout_minutes: 60

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: google/gemma-4-31B-it
  torch_dtype: torch.bfloat16
  # CP installs the model-owned ring by swapping SDPA, so HF init must use sdpa
  # (ffpa bypasses the swap and is rejected with cp_size>1).
  attn_implementation: sdpa
  use_liger_kernel: false
  use_sdpa_patching: false
  text_config:
    use_cache: false
    cp_full_attn_backend: ffpa  # route head_dim=512 full-attention ring chunks through FFPA varlen

processor:
  padding_side: right

checkpoint:
  enabled: false

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 8
  sequence_parallel: false
  activation_checkpointing: true  # required for 31B to fit

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_medpix_dataset
  path_or_dataset: mmoukouba/MedPix-VQA
  split: train[:1000]

# pack_size must be divisible by 2*cp_size (16 here): 16384 / 16 = 1024.
packed_sequence:
  pretokenize: true
  max_length: 16384
  pack_size: 16384
  packing_ratio: 0.9
  drop_long_samples: true
  post_tokenize_hook_fn: nemo_automodel.components.datasets.vlm.collate_fns.gemma4_inject_thinking_prefix

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 4
  persistent_workers: true
  pin_memory: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_medpix_dataset
  path_or_dataset: mmoukouba/MedPix-VQA
  split: validation[:500]

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.vlm.collate_fns.gemma4_prefix_collate_fn

optimizer:
  _target_: torch.optim.AdamW
  lr: 2e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

ci:
  recipe_owner: Butterfingrz
  env_vars:
    MAX_STEPS: 10
