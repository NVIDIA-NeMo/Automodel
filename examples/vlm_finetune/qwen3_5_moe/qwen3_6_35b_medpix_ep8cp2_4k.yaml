# Local EP8 CP2 parity run for Qwen3.6-35B-A3B on MedPix-VQA at 4k sequence length.
# Run:
#   automodel examples/vlm_finetune/qwen3_5_moe/qwen3_6_35b_medpix_ep8cp2_4k_100steps.yaml --nproc-per-node 8

recipe: FinetuneRecipeForVLM

seed: 1234

step_scheduler:
  global_batch_size: 8
  local_batch_size: 1
  ckpt_every_steps: 1000
  val_every_steps: 1000
  log_remote_every_steps: 1
  gc_every_steps: 5
  num_epochs: 1
  max_steps: 100

dist_env:
  backend: nccl
  timeout_minutes: 60

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3.6-35B-A3B
  trust_remote_code: false
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: te
    linear: torch
    rms_norm: torch_fp32
    rope_fusion: false
    dispatcher: deepep
    experts: gmm
    fake_balanced_gate: false
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true

processor:
  _target_: transformers.AutoProcessor.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3.6-35B-A3B

checkpoint:
  enabled: false
  checkpoint_dir: checkpoints/qwen3_6_35b_medpix_ep8cp2_4k_100steps/
  model_save_format: safetensors
  save_consolidated: false

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 2
  pp_size: 1
  dp_replicate_size: 1
  ep_size: 8
  sequence_parallel: false
  activation_checkpointing: true
  defer_fsdp_grad_sync: false

  moe:
    reshard_after_forward: false
    wrap_outer_model: true

freeze_config:
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_medpix_dataset
  path_or_dataset: mmoukouba/MedPix-VQA
  split: train

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 1
  collate_fn:
    _target_: nemo_automodel.components.datasets.vlm.collate_fns.default_collate_fn
    max_length: 4096
  drop_last: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_medpix_dataset
  path_or_dataset: mmoukouba/MedPix-VQA
  split: validation

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 1
  collate_fn:
    _target_: nemo_automodel.components.datasets.vlm.collate_fns.default_collate_fn
    max_length: 4096
  drop_last: true

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1e-8
  lr: 5.0e-6
  weight_decay: 0.1

lr_scheduler:
  lr_decay_style: constant

wandb:
  enable: false
  project: huiyingl_workspace
  entity: Nemo-automodel
  name: qwen3_6_35b_medpix_ep8cp2_4k_100steps
  group: qwen3_6_35b_medpix_ep8cp_parity_4k_100steps
  tags: [qwen3.6-35b, medpix, ep8, cp2, 4k, parity]
  dir: logs/qwen3_6_35b_medpix_ep8cp2_4k_100steps/wandb  # pragma: allowlist secret
