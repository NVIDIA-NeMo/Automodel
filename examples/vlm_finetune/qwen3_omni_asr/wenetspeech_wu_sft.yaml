# Wu Chinese ASR fine-tuning of Qwen3-Omni-30B-A3B-Instruct on yuekai/WenetSpeech_Wu_1k.
#
# Audio decoding goes through `make_wenetspeech_wu_asr_dataset` which uses
# `datasets.Audio(decode=False)` + soundfile, so this recipe runs in environments
# without `torchcodec` or `qwen_omni_utils` (e.g. the bundled DTensorPolicyWorkerV2
# Python at /opt/ray_venvs/...).
#
# To run on a single 8-GPU node:
#   export WENETSPEECH_WU_PATH=/path/to/wenetspeech_wu_1k  # local mirror or HF id
#   examples/vlm_finetune/qwen3_omni_asr/train.sh
#
# The env var WENETSPEECH_WU_PATH has no default; OmegaConf will raise a clear
# missing-variable error if it is unset.

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 8
  local_batch_size: 1
  ckpt_every_steps: 200
  num_epochs: 1
  max_steps: 500

dist_env:
  backend: nccl
  timeout_minutes: 10

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForMultimodalLM.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3-Omni-30B-A3B-Instruct
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: sdpa
    linear: te
    rms_norm: torch_fp32
    rope_fusion: false
    experts: te
    enable_deepep: true
    fake_balanced_gate: false
    enable_hf_state_dict_adapter: true

checkpoint:
  enabled: true
  checkpoint_dir: /tmp/checkpoints/qwen3_omni_asr_wenetspeech_wu
  model_save_format: safetensors
  save_consolidated: true

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 8
  sequence_parallel: false

freeze_config:
  freeze_embeddings: false
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

# LoRA adapters land only on the language model's self-attention projections.
# The NEMO custom Qwen3-Omni model exposes the LM layers under `model.layers.*`
# (the audio tower lives at `audio_tower.layers.*` and the vision tower at
# `visual.*`), so this pattern keeps adapters off audio/vision/lm_head modules.
peft:
  _target_: nemo_automodel.components._peft.lora.PeftConfig
  target_modules:
    - model.layers.*.self_attn.*_proj
  dim: 16
  alpha: 32
  dropout: 0.0

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_wenetspeech_wu_asr_dataset
  path_or_dataset: ${oc.env:WENETSPEECH_WU_PATH}
  split: train
  sampling_rate: 16000

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 2
  collate_fn:
    _target_: nemo_automodel.components.datasets.vlm.collate_fns.qwen3_omni_asr_collate_fn

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1e-8
  lr: 2.0e-5
  weight_decay: 0.0

# Uncomment and configure for W&B logging
# wandb:
#   project: <your_wandb_project>
#   entity: <your_wandb_entity>
#   name: qwen3_omni_asr_wenetspeech_wu
#   save_dir: <your_wandb_save_dir>

ci:
  recipe_owner: yuekaiz
  time: "00:30:00"
