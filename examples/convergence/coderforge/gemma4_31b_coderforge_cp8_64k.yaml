# Gemma 4 31B (dense, multimodal checkpoint) — text-only AGENT SFT on CoderForge,
# context-parallel to 64k on 2 nodes (16 GPUs): cp8 x dp2 (8k tokens/rank).
# Phase 2 of AM-492 (AM-556). Validates context parallelism end-to-end.
#
# Derived from the validated examples/vlm_finetune/gemma4/gemma4_31b_tulu3_text_cp8_16k.yaml
# (dense CP, sdpa, freeze vision/audio/embeddings) and the 64k/2-node E4B variant
# (FusedLinearCrossEntropy + output_hidden_states to avoid materializing the
# [S, 262k] logits at 64k).
#
# *** SMOKE-TEST THIS FIRST (max_steps=20). *** The one experimental piece is the
# DATA path: CoderForge is tool-calling, and the validated Gemma4-CP text path
# (make_meta_dataset -> processor pretokenize/pack) has no `tools` column, so it
# would drop the tool schemas. We therefore use the LLM `ChatDataset` (verified to
# render `tools` + assistant-only masks for this tokenizer) wired into the VLM
# recipe via the pretokenize=false path + THD collate. Confirm in the smoke run:
#   (1) CP runs (no shape/seq_len errors; 65536 % (2*cp_size)=0),
#   (2) the tool schema is rendered into the prompt (tools survive),
#   (3) step-0 loss is sane (~1-2, not ~0 or NaN).
# If the ChatDataset<->VLM wiring needs adjustment, that is expected iteration.

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 2        # dp2 x local_batch_size 1; add grad-accum for the full run
  local_batch_size: 1
  ckpt_every_steps: 200
  val_every_steps: 999999
  max_steps: 20               # SMOKE — raise for the real run (~ a few k steps / ~1 epoch)
  num_epochs: 1

dist_env:
  backend: nccl
  timeout_minutes: 120

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: /lustre/fsw/portfolios/coreai/users/athittenaman/checkpoints/hf_gemma4_31b_it
  torch_dtype: torch.bfloat16
  attn_implementation: sdpa   # dense CP requires sdpa (model-owned p2p ring); do NOT set a TE attn backend
  use_liger_kernel: false
  use_sdpa_patching: false
  text_config:
    use_cache: false
    output_hidden_states: true  # required by FusedLinearCrossEntropy (fuses the LM-head projection)

processor:
  padding_side: right

checkpoint:
  enabled: true
  checkpoint_dir: /lustre/fsw/portfolios/coreai/users/athittenaman/coderforge_ckpts/gemma4_31b_cp8_64k/
  model_save_format: safetensors
  save_consolidated: final    # consolidated HF checkpoint for SWE-bench eval (Phase 3)

distributed:
  strategy: fsdp2
  dp_size: none               # auto: world_size / (tp_size * cp_size) = 16 / (1*8) = 2
  tp_size: 1
  cp_size: 8                  # 65536 / (2*8) = 4096 -> divisible; 8192 tokens/rank
  sequence_parallel: false
  activation_checkpointing: true   # needed at 64k for 31B (31B supports AC; the E4B template could not)

loss_fn:
  _target_: nemo_automodel.components.loss.linear_ce.FusedLinearCrossEntropy
  logit_softcapping: 30.0     # matches gemma4 final_logit_softcapping
  reduction: sum

# --- EXPERIMENTAL data wiring (see header) -------------------------------------
# ChatDataset preserves the OpenAI tool schema and assistant-only masking. It needs
# its own tokenizer (the VLM recipe otherwise supplies only a processor), so we
# instantiate one inline from the same checkpoint (its chat_template.jinja drives
# rendering). Omitting `packed_sequence` keeps pretokenize=false, so ChatDataset's
# token output flows straight to the THD collate.
dataset:
  _target_: nemo_automodel.components.datasets.llm.chat_dataset.ChatDataset
  path_or_dataset_id: /lustre/fsw/portfolios/coreai/users/athittenaman/coderforge_cache/togethercomputer_CoderForge-Preview_filtered_reward1_seq65536/data.jsonl
  tokenizer:
    _target_: transformers.AutoTokenizer.from_pretrained
    pretrained_model_name_or_path: /lustre/fsw/portfolios/coreai/users/athittenaman/checkpoints/hf_gemma4_31b_it
  split: train
  seq_length: 65536
  padding: do_not_pad         # the THD collate pads/packs the batch

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 4
  persistent_workers: true
  pin_memory: true
  collate_fn:
    # VLM-recipe-compatible adapter: accepts (examples, processor) and delegates to
    # packed_sequence_thd_collater, which synthesizes seq_lens/position_ids for CP.
    # CP rank-divisibility (2*cp_size) is handled by gemma4's cp_batch sharder.
    _target_: nemo_automodel.components.datasets.utils.packed_sequence_thd_collater_vlm

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

wandb:
  enable: true
  project: cp_validation
  entity: nvidia
  name: gemma4_31b_coderforge_cp8_64k
