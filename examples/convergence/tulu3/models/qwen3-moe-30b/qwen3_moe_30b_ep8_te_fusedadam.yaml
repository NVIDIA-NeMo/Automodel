# Qwen3 MoE 30B SFT on Tulu-3 with EP=8, TE FusedAdam, FSDP on 8 GPUs.
# Uses ChatDataset with default collater.

step_scheduler:
  global_batch_size: 128
  local_batch_size: 2
  ckpt_every_steps: 1000
  gc_every_steps: 10
  max_steps: 1000
  val_every_steps: 100

dist_env:
  backend: nccl
  timeout_minutes: 30

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  # FusedLinearCrossEntropy fuses the lm_head projection with cross-entropy and
  # needs the final hidden state instead of the full [bsz, seq, vocab] logits.
  output_hidden_states: true
  pretrained_model_name_or_path: Qwen/Qwen3-30B-A3B-Base
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: te
    linear: te
    rms_norm: torch_fp32
    experts: torch_mm
    dispatcher: deepep
    fake_balanced_gate: false
    enable_hf_state_dict_adapter: true

checkpoint:
  enabled: true
  checkpoint_dir: checkpoints_convergence/qwen3_moe_30b_te_fusedadam/
  model_save_format: safetensors
  save_consolidated: final

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 8

  sequence_parallel: false
  activation_checkpointing: true

  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 4
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false
    layers_per_stage: 2

loss_fn:
  # Avoids the full bf16->fp32 logit upcast that OOMs MaskedCrossEntropy on long
  # tulu3 samples (truncation: false) on 8xH100-80GB. See PR #1554.
  _target_: nemo_automodel.components.loss.linear_ce.FusedLinearCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.chat_dataset.ChatDataset
  path_or_dataset_id: allenai/tulu-3-sft-mixture
  split: train
  truncation: false
  seq_length: 2048
  padding: do_not_pad
  shuffle_seed: 42
  chat_template: examples/convergence/tulu3/models/qwen3-moe-30b/chat_template.jinja

packed_sequence:
  packed_sequence_size: 0

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.default_collater
    pad_seq_len_divisible: 8
  shuffle: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.chat_dataset.ChatDataset
  path_or_dataset_id: allenai/tulu-3-sft-mixture
  split: "train[:128]"
  seq_length: 2048
  padding: do_not_pad
  shuffle_seed: 42
  chat_template: examples/convergence/tulu3/models/qwen3-moe-30b/chat_template.jinja

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.default_collater
    pad_seq_len_divisible: 8

optimizer:
  _target_: transformer_engine.pytorch.optimizers.fused_adam.FusedAdam
  betas: [0.9, 0.95]
  eps: 1e-8
  lr: 1.0e-5
  weight_decay: 0
  master_weights: true
  store_param_remainders: true
  exp_avg_dtype: torch.bfloat16
  exp_avg_sq_dtype: torch.bfloat16

# ── Weekly Tulu-3 convergence CI (train 1000 steps -> IFEval -> threshold gate) ──
# Passes iff |CI IFEval prompt_level_strict_acc - baseline| < k * stderr. The SFT
# model is evaluated WITH --thinking (its training mode); without it the empty
# <think> prefill sends the model OOD and IFEval collapses. baseline/stderr measured.
ci:
  recipe_owner: athitten
  nodes: 1
  time: "02:00:00"                     # full 1000-step train + IFEval
  convergence:
    step_scheduler.max_steps: 1000     # phases.convergence abbreviates to 200; restore full run
  downstream_eval:
    tasks: ifeval
    tokenizer: Qwen/Qwen3-30B-A3B
    tp_size: 1
    dp_size: 1
    thinking: true
    extra_model_args: "think_end_token=</think>,max_model_len=8192"
    metric: prompt_level_strict_acc
    baseline: 0.5767
    stderr: 0.0213
    k: 2
