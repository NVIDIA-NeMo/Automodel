seed: 42

wandb:
  enable: false
  project: qwen-image-lora-finetuning
  mode: online
  name: qwen_image_lora_run_1

dist_env:
  backend: "nccl"
  init_method: "env://"

model:
  pretrained_model_name_or_path: "Qwen/Qwen-Image"
  model_type: "qwen_image"
  mode: "finetune"
  cache_dir: null
  attention_backend: "flash"
  transformer_engine_fp8: false

peft:
  _target_: nemo_automodel.components._peft.lora.PeftConfig
  dim: 64
  alpha: 64
  dropout: 0.0
  target_modules:
    - "*.attn.to_q"
    - "*.attn.to_k"
    - "*.attn.to_v"
    - "*.attn.to_out.0"
    - "*.attn.add_q_proj"
    - "*.attn.add_k_proj"
    - "*.attn.add_v_proj"
    - "*.attn.to_add_out"
    - "*.img_mlp.net.0.proj"
    - "*.img_mlp.net.2"
    - "*.txt_mlp.net.0.proj"
    - "*.txt_mlp.net.2"

optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-5
  weight_decay: 0.01
  betas: [0.9, 0.999]
  foreach: false
  fused: true

lr_scheduler:
  lr_decay_style: cosine
  lr_warmup_steps: 0
  min_lr: 1e-6

ddp:
  backend: "nccl"
  activation_checkpointing: false
  find_unused_parameters: true

flow_matching:
  adapter_type: "qwen_image"
  adapter_kwargs:
    guidance_scale: 3.5
    use_guidance_embeds: false
  timestep_sampling: "logit_normal"
  logit_mean: 0.0
  logit_std: 1.0
  flow_shift: 2.23
  mix_uniform_ratio: 0.0
  sigma_min: 0.02
  sigma_max: 1.0
  num_train_timesteps: 1000
  i2v_prob: 0.0
  use_loss_weighting: true
  loss_weighting_scheme: "bsmntw"
  log_interval: 100
  summary_log_interval: 10

step_scheduler:
  num_epochs: 10
  local_batch_size: 3
  global_batch_size: 24
  ckpt_every_steps: 500
  save_checkpoint_every_epoch: false
  log_remote_every_steps: 1
  # max_steps: null  # Set to limit training to a specific number of steps

data:
  dataloader:
    _target_: nemo_automodel.components.datasets.diffusion.build_text_to_image_multiresolution_dataloader
    cache_dir: PATH_TO_YOUR_DATA
    train_text_encoder: false
    num_workers: 2
    base_resolution: [512, 512]
    dynamic_batch_size: false
    shuffle: true
    drop_last: false

checkpoint:
  enabled: true
  checkpoint_dir: PATH_TO_YOUR_CKPT_DIR
  model_save_format: torch_save
  save_consolidated: false
  restore_from: null

ci:
  recipe_owner: pthombre
  time: "00:30:00"
