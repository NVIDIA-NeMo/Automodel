recipe: nemo_automodel.recipes.diffusion.train.TrainDiffusionRecipe

model:
  pretrained_model_name_or_path: "Qwen/Qwen-Image-Edit-2511"
  mode: "finetune"
  model_type: "qwen_image_edit"
  cache_dir: null
  attention_backend: "native"

optim:
  learning_rate: 2e-6
  clip_grad: 1.0
  optimizer:
    name: torch_adamw
    fused: true
    weight_decay: 0.05
    betas: [0.9, 0.999]

lr_scheduler:
  lr_decay_style: constant
  lr_warmup_steps: 100
  lr_decay_steps: 1000000000
  init_lr: 0.0
  max_lr: 2e-6
  min_lr: 2e-6

fsdp:
  dp_size: 40
  dp_replicate_size: 5
  tp_size: 1
  cp_size: 1
  pp_size: 1
  activation_checkpointing: true
  defer_fsdp_grad_sync: true
  cpu_offload: false
  reduce_dtype: bfloat16
  output_dtype: bfloat16
  enable_fsdp2_prefetch: true
  fsdp2_backward_prefetch_depth: 2
  fsdp2_forward_prefetch_depth: 1
  fsdp2_no_reshard_last_units: 1
  fsdp2_unit_group_size: 6
  activation_checkpointing_skip_last_units: 3

flow_matching:
  adapter_type: "qwen_image_edit"
  adapter_kwargs:
    caption_drop_rate: 0.05
    vae_scale_factor: 8
    offload_text_encoder_after_encode: false
    offload_vae_after_encode: false
  timestep_sampling: "beta"
  beta_alpha: 2.5
  beta_beta: 1.5
  beta_seed_by_step: true
  sigma_min: 0.0
  sigma_max: 1.0
  num_train_timesteps: 1000
  i2v_prob: 0.0
  cfg_dropout_prob: 0.0
  use_loss_weighting: false
  log_interval: 1
  summary_log_interval: 1

step_scheduler:
  num_epochs: 40
  local_batch_size: 1
  global_batch_size: 80
  ckpt_every_steps: 250
  save_checkpoint_every_epoch: false
  save_final_checkpoint: true
  log_every: 1
  max_steps: 500

data:
  dataloader:
    _target_: nemo_automodel.components.datasets.diffusion.build_qwen_image_edit_dataloader
    csv_path: PATH_TO_YOUR_QWEN_IMAGE_EDIT_CSV
    max_image_area: 2500000
    max_context_image_area: 1048576
    max_condition_image_area: 147456
    max_total_seq_area: 5500000
    add_hex_rate: 0.5
    num_workers: 8
    prefetch_factor: 2
    shuffle: true

checkpoint:
  enabled: true
  checkpoint_dir: PATH_TO_YOUR_CKPT_DIR
  model_save_format: safetensors
  save_consolidated: true
  diffusers_compatible: true
  restore_from: null

wandb:
  project: qwen-image-edit-finetuning
  mode: online
  name: qwen_image_edit_b300_5node_500step_ckpt250

dist_env:
  backend: "nccl"
  init_method: "env://"
  timeout_minutes: 120

seed: 42

ci:
  recipe_owner: pthombre
  time: "04:00:00"
