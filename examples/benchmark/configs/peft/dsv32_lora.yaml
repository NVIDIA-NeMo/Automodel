# Benchmarking config for DeepSeek-V3.2 LoRA
seed: 1234
benchmark:
  warmup_steps: 10
  peak_tflops: 989
  nsys_start: -1
  nsys_end: -1
  nsys_ranks: []
  num_nodes: 16
step_scheduler:
  gc_every_steps: 10
  global_batch_size: 512
  local_batch_size: 4
  ckpt_every_steps: 1000
  val_every_steps: 1000
  num_epochs: 1
  max_steps: 30
distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 4
  ep_size: 32
  sequence_parallel: false
  activation_checkpointing: true
  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 1
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false
    layers_per_stage: 2
  moe:
    reshard_after_forward: false
    wrap_outer_model: false
dist_env:
  backend: nccl
  timeout_minutes: 10
model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: nemo_automodel.components.models.deepseek_v32.config.DeepseekV32Config.from_pretrained
    pretrained_model_name_or_path: deepseek-ai/DeepSeek-V3.2
    name_or_path: deepseek-ai/DeepSeek-V3.2
  trust_remote_code: true
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: te
    linear: te
    rms_norm: te
    rope_fusion: false
    experts: gmm
    dispatcher: deepep
    fake_balanced_gate: true
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true
peft:
  _target_: nemo_automodel.components._peft.lora.PeftConfig
  target_modules: ["*"]
  dim: 32
  alpha: 32
  dropout: 0.0
  moe_rank_scaling: true
checkpoint:
  enabled: false
loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy
  fp32_upcast: false
dataset:
  _target_: nemo_automodel.components.datasets.llm.mock_iterable_dataset.MockIterableDataset
  seq_len: 4096
  num_samples: 100000
dataloader:
  batch_size: null
  _target_: torch.utils.data.DataLoader
  num_workers: 0
optimizer:
  _target_: torch.optim.Adam
  betas: [0.9, 0.999]
  eps: 1e-8
  lr: 0.0001
  weight_decay: 0
