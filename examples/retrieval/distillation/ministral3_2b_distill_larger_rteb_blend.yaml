# Automodel translation of ministral3_distillation/configs/rteb_blend_distillation.yaml
#
# Source recipe (legacy ministral3_distillation/train.py):
#   - Student : ministral3 2 B cold-pruned (domain layerwise_rank, H=2560 L=22 FFN=6144)
#   - Teacher : Ministral3-8B-Embedding   (H=4096 L=34 FFN=14336, frozen, live encoder)
#   - Loss    : MSE (un-normalised) + InfoNCE-distill (q->d, KL, in-batch + 4 hard negs)
#   - Pooling : mean (avg) on both sides; query/passage E5-style prefixes
#   - LR      : 1e-5, warmup 200, 50 000 steps (~3 epochs on the 1.03 M-record blend)
#   - Data    : RTEB v2 training blend (66 files), see configs/rteb_blend_distillation.yaml
#
# Usage (8 GPUs, single node):
#   automodel --nproc-per-node 8 examples/retrieval/distillation/ministral3_2b_distill_rteb_blend.yaml

recipe: EmbeddingDistillRecipe

seed: 42

dist_env:
  backend: nccl
  timeout_minutes: 5

step_scheduler:
  # Mirrors the source: batch_size=4 per GPU * grad_accum=2 * 8 GPUs = 64 effective.
  # ckpt_every_steps mirrors save_every=500 from the source.
  # num_epochs=3 approximates the source's max_steps=50000 over the 1.03 M-record blend
  # (one epoch at GB=64 is ~16 050 steps, three epochs ~48 150).
  global_batch_size: 64
  local_batch_size: 4
  ckpt_every_steps: 500
  num_epochs: 3

model:
  _target_: nemo_automodel.components.models.biencoder.student_with_projection.StudentWithProjection.build
  pretrained_model_name_or_path: /lustre/fsw/portfolios/llmservice/users/viraman/experiments/ablation/ministral3_3b_new_baseline_score_function_pruning_20260527/domain/models/layerwise_rank
  teacher_hidden_size: 4096
  pooling: mean
  l2_normalize: false
  capture_layers: []
  trust_remote_code: true
  torch_dtype: bfloat16
  attn_implementation: flash_attention_2

teacher_model:
  _target_: nemo_automodel.components.models.biencoder.student_with_projection.TeacherEmbeddingEncoder.build
  pretrained_model_name_or_path: /lustre/fsw/portfolios/llmservice/users/ybabakhin/model_checkpoints/ministral3_8b_new_baseline_coir_indomain_codex_indomain_8_nodes_eval_avg_pooling_05-26-214437/LATEST/model/consolidated
  pooling: mean
  l2_normalize: false
  capture_layers: []
  trust_remote_code: true
  torch_dtype: bfloat16
  attn_implementation: flash_attention_2

tokenizer:
  _target_: nemo_automodel.NeMoAutoTokenizer.from_pretrained
  pretrained_model_name_or_path: /lustre/fsw/portfolios/llmservice/users/ybabakhin/model_checkpoints/ministral3_8b_new_baseline_coir_indomain_codex_indomain_8_nodes_eval_avg_pooling_05-26-214437/LATEST/model/consolidated
  add_eos_token: false
  padding_side: left
  force_hf: true

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  dataset:
    _target_: nemo_automodel.components.datasets.llm.make_retrieval_dataset
    model_type: bi_encoder
    # n_passages = 1 positive + 4 hard negatives = 5 (matches the source's
    # nce_num_hard_negatives: 4 with cross-device negatives ON).
    n_passages: 5
    seed: 42
    do_shuffle: true
    data_type: train
