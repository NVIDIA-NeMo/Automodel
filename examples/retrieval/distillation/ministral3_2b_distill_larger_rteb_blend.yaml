  collate_fn:
    _target_: nemo_automodel.components.datasets.llm.BiEncoderDistillCollator
    q_max_len: 512
    p_max_len: 512
    # E5/Linq-style asymmetric prefixes (mirror source config).
    query_prefix: "query:"
    passage_prefix: "passage:"
    pad_to_multiple_of: 8
  shuffle: true
  num_workers: 2

# ------------------------------------------------------------------------
# Loss building blocks (instances are built whether or not their weight is
# active, so the recipe-level weights below drive the actual loss mix).
# ------------------------------------------------------------------------
distill_loss:
  _target_: nemo_automodel.components.loss.embedding_distill.EmbeddingDistillLoss
  reduction: mean

mse_loss:
  _target_: nemo_automodel.components.loss.embedding_distill.EmbeddingMSELoss
  # mse_normalize: false in the source -- match exactly so the optimiser sees
  # the raw, un-normalised L2 distance between projected student and teacher.
  normalize: false
  reduction: mean

score_loss:
  _target_: nemo_automodel.components.loss.embedding_distill.ScoreDistillLoss
  temperature: 0.02

intermediate_loss:
  _target_: nemo_automodel.components.loss.intermediate_distill.IntermediateDistillLoss
  layer_pairs: []
  loss_type: mse
  normalize: false

infonce_loss:
  _target_: nemo_automodel.components.loss.infonce.InfoNCELoss
  temperature: 0.05
  learnable_temperature: false
  direction: q2d
  use_in_batch_negatives: true
  normalize: true
  cross_device_negatives: true

infonce_distill_loss:
  _target_: nemo_automodel.components.loss.infonce.InfoNCEDistillLoss
  temperature: 0.05
  direction: q2d
  use_in_batch_negatives: true
  normalize: true
  divergence: kl
  cross_device_negatives: true

# ------------------------------------------------------------------------
# Active loss mix from the source recipe:
#   total = 0 * cosine + 1 * mse + 0 * score + 0 * intermediate + 0 * nce + 1 * nce_distill
# (i.e. MSE alignment + InfoNCE-distill listwise KD)
# ------------------------------------------------------------------------
distill_loss_weight: 0.0
mse_loss_weight: 1.0
score_loss_weight: 0.0
intermediate_loss_weight: 0.0
nce_loss_weight: 0.0
nce_distill_loss_weight: 1.0

# Empty -- no intermediate-feature distillation in this recipe.
layer_pairs: []
projection_lr: null

optimizer:
  _target_: transformer_engine.pytorch.optimizers.fused_adam.FusedAdam
  # Source uses lr=1.0e-5 with weight_decay=0.01.
  lr: 1.0e-5
  weight_decay: 0.01
  adam_w_mode: true
  bias_correction: true
  master_weights: true

lr_scheduler:
  lr_warmup_steps: 200
  lr_decay_style: cosine

clip_grad_norm:
  max_norm: 1.0

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1
  sequence_parallel: false

checkpoint:
  enabled: true
  checkpoint_dir: /lustre/fsw/portfolios/llmservice/users/viraman/Automodel/runs/retrieval_distill_rteb_blend/checkpoints
  model_save_format: safetensors
  save_consolidated: true
