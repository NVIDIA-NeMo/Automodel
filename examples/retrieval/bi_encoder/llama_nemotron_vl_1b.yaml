# To run this recipe:
#   automodel examples/retrieval/bi_encoder/llama_nemotron_vl_1b.yaml --nproc-per-node 8
# Adjust --nproc-per-node to the number of GPUs available on your machine.

recipe: TrainBiEncoderRecipe

seed: 42

temperature: 0.02

step_scheduler:
  global_batch_size: 128
  local_batch_size: 1
  ckpt_every_steps: 500
  val_every_steps: 500
  num_epochs: 1

dist_env:
  backend: nccl
  timeout_minutes: 30

model:
  _target_: nemo_automodel.NeMoAutoModelBiEncoder.from_pretrained
  pretrained_model_name_or_path: nvidia/llama-nemotron-embed-vl-1b-v2
  pooling: avg
  l2_normalize: true
  trust_remote_code: true
  torch_dtype: bfloat16

processor:
  _target_: nemo_automodel.components.models.llama_nemotron_vl.LlamaNemotronVLProcessor.from_pretrained
  pretrained_model_name_or_path: nvidia/llama-nemotron-embed-vl-1b-v2
  trust_remote_code: true
  q_max_length: 512
  p_max_length: 512
  pad_to_multiple_of: 8

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  dataset:
    _target_: nemo_automodel.components.datasets.llm.make_retrieval_dataset
    model_type: bi_encoder
    data_dir_list:
      - hf://nvidia/embed-nemotron-dataset-v1/FEVER
    data_type: train
    n_passages: 2
    seed: 42
    do_shuffle: true
  collate_fn:
    _target_: nemo_automodel.components.datasets.llm.VisionBiEncoderCollator
    padding: true
    truncation: true
  shuffle: true
  num_workers: 0

optimizer:
  _target_: transformer_engine.pytorch.optimizers.fused_adam.FusedAdam
  lr: 5.0e-6
  weight_decay: 0.01
  adam_w_mode: true
  bias_correction: true
  master_weights: true

lr_scheduler:
  lr_warmup_steps: 100

checkpoint:
  enabled: true
  checkpoint_dir: ./output/llama_nemotron_vl_1b
  model_save_format: safetensors
  save_consolidated: true

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1
  sequence_parallel: false
