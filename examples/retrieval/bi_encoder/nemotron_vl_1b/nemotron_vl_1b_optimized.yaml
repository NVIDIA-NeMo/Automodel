# Optimized configuration for Llama Nemotron VL 1B retrieval fine-tuning.
#
# The default global batch size is 64 and the local batch size is 2. On one
# 8-GPU node, this uses four gradient accumulation steps, so static_graph must
# remain false. On 4 nodes with 8 GPUs each, there is no gradient accumulation;
# set static_graph to true for that launch.
#
# Before launching on 80 GB GPUs, set:
#
#   export PYTORCH_ALLOC_CONF=expandable_segments:True
#
# To use fewer GPUs with a larger local batch size, enable activation
# checkpointing with distributed.activation_checkpointing=true and set
# distributed.activation_checkpointing_scope to vision or all. See README.md
# for complete 8-GPU, 32-GPU, and 4-GPU examples.

recipe: TrainBiEncoderRecipe

seed: 0

temperature: 0.02

# Prepare the bidirectional attention inputs outside the training step.
bi_encoder_optimization:
  patch_flash_attention_is_packed_sequence: true
  precompute_bidirectional_mask: true

step_scheduler:
  global_batch_size: 64
  local_batch_size: 2
  ckpt_every_steps: 5000
  val_every_steps: 500
  num_epochs: 1
  log_remote_every_steps: 50

dist_env:
  backend: nccl
  timeout_minutes: 10

model:
  _target_: nemo_automodel.NeMoAutoModelBiEncoder.from_pretrained
  pretrained_model_name_or_path: nvidia/llama-nemotron-embed-vl-1b-v2
  pooling: avg
  l2_normalize: true
  use_liger_kernel: true
  use_sdpa_patching: true
  torch_dtype: bfloat16
  attn_implementation: flash_attention_2
  do_distributed_inbatch_negative: true
  detach_distributed_inbatch_negatives: false

  # Optimized language model backend.
  use_custom_llama_backend: true
  use_te_fused_mlp: true
  use_te_fused_qkv: true

  # Optimized vision encoder.
  use_te_fused_siglip_layer: true
  disable_unused_siglip_pooling_head: true

tokenizer:
  _target_: nemo_automodel.components.models.llama_nemotron_vl.processor.LlamaNemotronVLProcessor.from_pretrained
  pretrained_model_name_or_path: nvidia/llama-nemotron-embed-vl-1b-v2
  q_max_length: 512
  p_max_length: 4096
  query_prefix: "query:"
  passage_prefix: "passage:"
  max_input_tiles: 2

dataset:
  _target_: nemo_automodel.components.datasets.llm.retrieval_dataset.RetrievalDatasetConfig
  model_type: bi_encoder
  data_dir_list:
    - path: <DATASETS_PATH>/automodel_colpali/training_datasets/colpali_train.json
      num_samples: 5000
    - path: hf://nvidia/embed-nemotron-dataset-v1/MIRACL
      num_samples: 5000
  data_type: train
  n_passages: 5
  seed: 42
  do_shuffle: true

dataloader:
  collate_fn:
    _target_: nemo_automodel.components.datasets.llm.ProcessorMethodCollator
    collator_fn_name: process_queries_documents_biencoder
  shuffle: true
  num_workers: 4
  pin_memory: true

optimizer:
  _target_: transformer_engine.pytorch.optimizers.fused_adam.FusedAdam
  lr: 1e-6
  weight_decay: 0.1
  adam_w_mode: true
  bias_correction: true
  master_weights: true

lr_scheduler:
  lr_warmup_steps: 100
  lr_decay_style: linear

checkpoint:
  enabled: true
  checkpoint_dir: ./output/nemotron_vl_1b_optimized/checkpoints
  model_save_format: safetensors
  save_consolidated: true

distributed:
  strategy: ddp
  find_unused_parameters: false
  # Required for the default 8-GPU launch, which uses gradient accumulation.
  # Set this to true only when accumulation is 1 and every iteration uses the
  # same execution path, such as the documented 4-node x 8-GPU launch.
  static_graph: false
  bucket_cap_mb: 400
  gradient_as_bucket_view: true

# Uncomment and configure for W&B logging
# wandb:
#   project: <your_wandb_project>
#   entity: <your_wandb_entity>
#   name: nemotron_vl_1b_optimized

ci:
  recipe_owner: yuhez
  time: "00:45:00"
  nodes: 1
  nightly:
    # CI uses the public text corpus; the model still executes a dummy vision
    # forward for rank symmetry, and checkpoint robustness tests an image input.
    dataset.data_dir_list:
      - path: hf://nvidia/embed-nemotron-dataset-v1/MIRACL
        num_samples: 5000
    dataloader.num_workers: 0
    tokenizer.p_max_length: 1536
    distributed.static_graph: false
  checkpoint_robustness:
    dataset.data_dir_list:
      - path: hf://nvidia/embed-nemotron-dataset-v1/MIRACL
        num_samples: 5000
    dataloader.num_workers: 0
    tokenizer.p_max_length: 1536
    distributed.static_graph: false
    cosine_threshold: 0.999
    hf_cosine_threshold: 0.999
    check_hf_reload: true
    check_resume: true
