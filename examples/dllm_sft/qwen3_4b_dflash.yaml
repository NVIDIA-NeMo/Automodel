# DFlash draft-model SFT recipe for Qwen3-4B.
#
# Trains a 5-layer Qwen3-style DFlash draft (hidden=2560, 32 Q-heads, 8 KV-heads,
# block_size=16) conditioned on the frozen Qwen/Qwen3-4B target.
#
# z-lab/Qwen3-4B-DFlash-b16 already carries that draft architecture
# (target_layer_ids [1,9,17,25,33], mask_token_id 151669).
#
# Usage (8-GPU single node):
#   python -m torch.distributed.run --nproc-per-node=8 \
#       nemo_automodel/recipes/dllm/train_ft.py \
#       -c examples/dllm_sft/qwen3_4b_dflash.yaml

recipe: DiffusionLMSFTRecipe

step_scheduler:
  global_batch_size: 32    # batch-size 4 x 8 GPUs
  local_batch_size: 1
  ckpt_every_steps: 1000
  val_every_steps: 500
  max_steps: null
  num_epochs: 6

dist_env:
  backend: nccl
  timeout_minutes: 30

seed: 42

wandb:
  enable: false
  project: dflash-sft
  name: dflash-qwen3-4b-run

model:
  _target_: transformers.AutoModel.from_pretrained
  pretrained_model_name_or_path: z-lab/Qwen3-4B-DFlash-b16
  trust_remote_code: true
  dtype: bfloat16

checkpoint:
  enabled: true
  checkpoint_dir: checkpoints/qwen3-4b-dflash-b16/training
  model_save_format: safetensors

distributed:
  strategy: fsdp2
  dp_size: null
  tp_size: 1
  cp_size: 1
  pp_size: 1
  sequence_parallel: false
  activation_checkpointing: false
  mp_policy:
    param_dtype: bfloat16
    reduce_dtype: float32
    output_dtype: float32
  autocast_dtype: bfloat16
  offload_policy: null
  # Per-layer FSDP2 prefetch overlaps all-gather / reduce-scatter with compute.
  # Off by default in FSDP2Config, so enable it here.
  enable_fsdp2_prefetch: true
  fsdp2_forward_prefetch_depth: 1
  fsdp2_backward_prefetch_depth: 2   # 2 hides all-gather behind compute; 1 lowers peak mem

dllm:
  mode: dflash
  mask_token_id: 151669    # reserved Qwen3 special token used as the DFlash mask
  eps: 0.001
  supervise_padding: true

# block_size 0 reads 16 from the draft config. num_blocks_per_sample 512
# needs flex_attention; SDPA OOMs at this N.
dflash:
  target_model_id: Qwen/Qwen3-4B
  target_torch_dtype: bfloat16
  block_size: 0
  loss_decay_gamma: 7.0
  num_blocks_per_sample: 512
  attention_backend: flex_attention
  overlap_anchors: true
  use_fused_linear_ce: true

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.999]
  eps: 1.0e-8
  lr: 6.0e-4
  weight_decay: 0.0

clip_grad_norm:
  max_norm: 1.0

lr_scheduler:
  lr_decay_style: cosine
  init_lr: 0.0
  min_lr: 0.0
  lr_warmup_steps: 2000    # ~4% warmup; tune to total steps

# For paper-comparable acceptance length, swap path_or_dataset_id for data
# regenerated by the target model.
dataset:
  _target_: nemo_automodel.components.datasets.llm.chat_dataset.ChatDataset
  path_or_dataset_id: allenai/tulu-3-sft-mixture
  split: train
  shuffle_seed: 42
  seq_length: 3072
  truncation: true
  unshifted: true
  tokenizer:
    pretrained_model_name_or_path: Qwen/Qwen3-4B

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  group_by_length: false
