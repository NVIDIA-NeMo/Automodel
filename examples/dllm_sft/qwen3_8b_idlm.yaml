# I-DLM (Introspective Diffusion LM) all-masked finetuning for Qwen3-8B.
#
# Converts the AR Qwen3-8B into a diffusion LM (Yu et al., 2026, arXiv:2604.11035)
# via the all-masked objective under strict causal attention with a next-token
# logit shift:  L = CE_noisy + clean_loss_weight * CE_clean.
#
# Hyperparameters follow Appendix H.1 of the paper (I-DLM-8B, full fine-tune):
#   lr 1e-5 cosine, warmup ratio 0.03, per-device batch 1, grad-accum 4
#   (effective batch 32 on 8 GPUs), 2 epochs, clean-loss weight 0.2.
#
# Usage (8-GPU single node):
#   python -m torch.distributed.run --nproc-per-node=8 \
#       nemo_automodel/recipes/dllm/train_ft.py \
#       -c examples/dllm_sft/qwen3_8b_idlm.yaml

recipe: DiffusionLMSFTRecipe

step_scheduler:
  global_batch_size: 32    # per-device 1 x grad-accum 4 x 8 GPUs (paper Appendix H.1)
  local_batch_size: 1
  ckpt_every_steps: 1000
  val_every_steps: 500
  max_steps: null
  num_epochs: 2            # paper: 2 epochs (stride curriculum N=2 then N=3)

dist_env:
  backend: nccl
  timeout_minutes: 30

seed: 42

wandb:
  project: idlm-sft
  name: idlm-qwen3-8b-run

# Base AR model being converted into an I-DLM.
model:
  _target_: transformers.AutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3-8B
  trust_remote_code: true
  dtype: bfloat16

checkpoint:
  enabled: true
  checkpoint_dir: checkpoints/qwen3-8b-idlm/training
  model_save_format: safetensors

# The paper trains with DeepSpeed ZeRO-2; FSDP2 is the AutoModel equivalent
# (parameter + optimizer-state sharding) and is DTensor-native.
distributed:
  strategy: fsdp2
  dp_size: null
  tp_size: 1
  cp_size: 1
  pp_size: 1
  sequence_parallel: false
  activation_checkpointing: true   # 8B full FT at seq 4096; trade compute for memory
  mp_policy:
    param_dtype: bfloat16
    reduce_dtype: float32
    output_dtype: float32
  autocast_dtype: bfloat16
  offload_policy: null
  # Per-layer FSDP2 prefetch overlaps all-gather / reduce-scatter with compute.
  enable_fsdp2_prefetch: true
  fsdp2_forward_prefetch_depth: 1
  fsdp2_backward_prefetch_depth: 2

# mode: idlm selects IDLMStrategy (all-masked corruption + Dream-shift two-CE,
# strict causal attention). clean_loss_weight is the paper's fixed alpha=0.2;
# set auto_balance_clean_loss: true for the auto-balanced scaling (Eq. 2) used
# in the paper's later stride expansions.
dllm:
  mode: idlm
  mask_token_id: 151669    # reserved Qwen3 special token used as the I-DLM mask
  clean_loss_weight: 0.2
  auto_balance_clean_loss: false
  eps: 0.001
  supervise_padding: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.999]
  eps: 1.0e-8
  lr: 1.0e-5              # paper Appendix H.1
  weight_decay: 0.0

clip_grad_norm:
  max_norm: 1.0

lr_scheduler:
  lr_decay_style: cosine
  init_lr: 0.0
  min_lr: 0.0
  warmup_ratio: 0.03       # paper Appendix H.1

# I-DLM trains on responses generated across reasoning datasets (paper Section 3.1
# / Appendix H.1). For paper-comparable quality, regenerate the assistant turns
# with the target model first, then point path_or_dataset_id at that data.
dataset:
  _target_: nemo_automodel.components.datasets.llm.chat_dataset.ChatDataset
  path_or_dataset_id: nvidia/Nemotron-Post-Training-Dataset-v2
  split: "math+code"
  shuffle_seed: 42
  seq_length: 4096
  truncation: true
  unshifted: true
  tokenizer:
    pretrained_model_name_or_path: Qwen/Qwen3-8B
    trust_remote_code: true

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  group_by_length: true
