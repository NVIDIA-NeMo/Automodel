# ============================================================================
# LLaDA2.1-mini (16B MoE) MDLM SFT — LoRA fine-tune. Identical to
# llada2_sft.yaml except for the `peft` block. LoRA adapts the attention
# linears and the dense-layer MLPs only; the routed experts
# (`*.mlp.experts.<i>.*`) and the router stay frozen — routed experts see only
# a sparse slice of tokens per step, so their adapters train poorly, and a
# frozen router keeps routing stable (same policy as diffusion_gemma_lora).
# Generate from the result with:
#   generate.py --checkpoint <base model or SFT ckpt> --adapter <lora ckpt dir>
# ============================================================================

# LLaDA2 SFT recipe using the existing DiffusionLMSFTRecipe (mode: mdlm).
#
# LLaDA2 training is standard MDLM: tokens are uniformly corrupted at a random
# rate t ~ U[0,1] and the model is trained to denoise with a 1/t-weighted
# cross-entropy loss.  Block-wise iterative refinement is an inference-only
# feature handled by LLaDA2's built-in generate method. The AutoModel generation
# script calls that method when --sampler llada2 is selected.
#
# Usage (8-GPU):
#   python -m torch.distributed.run --nproc-per-node=8 \
#       nemo_automodel/recipes/dllm/train_ft.py \
#       -c examples/dllm_sft/llada2_sft.yaml
#
# Generation:
#   python examples/dllm_generate/generate.py \
#       --checkpoint checkpoints/llada2-mini \
#       --prompt "Explain what a neural network is." \
#       --sampler llada2

recipe: DiffusionLMSFTRecipe

step_scheduler:
  global_batch_size: 32
  local_batch_size: 4
  ckpt_every_steps: 500
  val_every_steps: 500
  max_steps: null
  num_epochs: 5

dist_env:
  backend: nccl
  timeout_minutes: 10

seed: 42

wandb:
  enable: false
  project: llada2-sft
  name: llada2-mini-lora-run

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: inclusionAI/LLaDA2.1-mini
  torch_dtype: bfloat16
  trust_remote_code: true

checkpoint:
  enabled: true
  checkpoint_dir: dllm_checkpoints/llada2_lora/
  model_save_format: safetensors
  save_consolidated: false  # PEFT checkpoints save adapters; use generate.py --adapter

# LoRA on attention + dense-layer MLPs; experts and router frozen.
peft:
  _target_: nemo_automodel.components._peft.lora.PeftConfig
  match_all_linear: false
  target_modules:
    - "*attention.query_key_value"
    - "*attention.dense"
    - "*.mlp.gate_proj"
    - "*.mlp.up_proj"
    - "*.mlp.down_proj"
  dim: 16
  alpha: 32

distributed:
  strategy: fsdp2
  dp_size: null
  tp_size: 1
  cp_size: 1
  pp_size: 1
  sequence_parallel: false
  activation_checkpointing: false
  mp_policy:
    param_dtype: bfloat16
    reduce_dtype: float32
    output_dtype: float32
  autocast_dtype: bfloat16
  offload_policy: null

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

# LLaDA2.1 mask token ID (<|mask|> in the Qwen-based tokenizer).
# Set eps > 0 to ensure at least some corruption every step.
dllm:
  mode: mdlm
  mask_token_id: 156895
  eps: 0.001
  supervise_padding: true

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.999]
  eps: 1.0e-8
  lr: 2.0e-5
  weight_decay: 0.0

clip_grad_norm:
  max_norm: 1.0

lr_scheduler:
  lr_decay_style: cosine
  init_lr: 0.0
  min_lr: 0.0

dataset:
  _target_: nemo_automodel.components.datasets.llm.chat_dataset.ChatDataset
  path_or_dataset_id: allenai/tulu-3-sft-mixture
  split: train
  shuffle_seed: 42
  seq_length: 1024
  truncation: true
  unshifted: true
  tokenizer:
    pretrained_model_name_or_path: inclusionAI/LLaDA2.1-mini
    trust_remote_code: true

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  group_by_length: true
