recipe: DiffusionLMSFTRecipe

step_scheduler:
  global_batch_size: 1
  local_batch_size: 1
  ckpt_every_steps: null
  val_every_steps: null
  max_steps: 2
  num_epochs: 1

dist_env:
  backend: nccl
  timeout_minutes: 10

seed: 42

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: inclusionAI/LLaDA2.1-mini
  torch_dtype: bfloat16
  trust_remote_code: true

checkpoint:
  enabled: false

distributed:
  strategy: fsdp2
  dp_size: null
  tp_size: 1
  cp_size: 1
  pp_size: 1
  sequence_parallel: false
  activation_checkpointing: false
  mp_policy:
    param_dtype: bfloat16
    reduce_dtype: float32
    output_dtype: float32
  autocast_dtype: bfloat16
  offload_policy: null

dllm:
  mode: mdlm
  mask_token_id: 156895
  eps: 0.001
  supervise_padding: true

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.999]
  eps: 1.0e-8
  lr: 2.0e-5
  weight_decay: 0.0

clip_grad_norm:
  max_norm: 1.0

lr_scheduler:
  lr_decay_style: cosine
  init_lr: 0.0
  min_lr: 0.0

dataset:
  _target_: nemo_automodel.components.datasets.llm.chat_dataset.ChatDataset
  path_or_dataset_id: allenai/tulu-3-sft-mixture
  split: train[:64]
  shuffle_seed: 42
  seq_length: 256
  truncation: true
  unshifted: true
  tokenizer:
    pretrained_model_name_or_path: inclusionAI/LLaDA2.1-mini
    trust_remote_code: true

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  group_by_length: false
