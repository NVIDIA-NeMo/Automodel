#
# Qwen3-30B-A3B fine-tuning with HybridEP token dispatch + MXFP8 expert GEMMs via
# TransformerEngine. CONVERGENCE-CHECK variant of qwen3_moe_30b_te_hybridep.yaml:
# verifies TE MXFP8BlockScaling does not hurt real-data finetune convergence vs bf16.
#
# Delta vs qwen3_moe_30b_te_hybridep.yaml (the bf16 baseline) — ONE line:
#   - backend.te_fp8.recipe: mxfp8   (enables TE MXFP8BlockScaling on the experts=te GEMMs)
# Everything else (dataset, gate, ep, steps, lr, seed, packing) is IDENTICAL so the
# train/val loss curves are directly comparable.
#
# To run this recipe:
#   automodel examples/llm_finetune/qwen/qwen3_moe_30b_te_hybridep_mxfp8.yaml --nproc-per-node 8

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 32
  local_batch_size: 4
  ckpt_every_steps: 500
  num_epochs: 2
  max_steps: 20

dist_env:
  backend: nccl
  timeout_minutes: 10

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3-30B-A3B
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: te
    linear: te
    rms_norm: torch_fp32
    experts: torch_mm_mxfp8
    dispatcher: hybridep
    fake_balanced_gate: false
    enable_hf_state_dict_adapter: true

checkpoint:
  enabled: false
  checkpoint_dir: checkpoints/
  model_save_format: torch_save # torch_save or safetensors
  save_consolidated: false # saves the model in a consolidated safetensors format. Requires model_save_format to be safetensors.

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 8

  sequence_parallel: false
  activation_checkpointing: true

  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 4
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false
    layers_per_stage: 2

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: train
  pad_to_max_length: false

packed_sequence:
  # Set packed_sequence_size > 0 to run with packed sequences
  packed_sequence_size: 1024

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.packed_sequence_thd_collater
  shuffle: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: validation
  pad_to_max_length: false

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.packed_sequence_thd_collater

optimizer:
  _target_: torch.optim.Adam
  betas: [0.9, 0.999]
  eps: 1e-7
  lr: 1.0e-4
  weight_decay: 0
  foreach: false
  # min_lr: 1.0e-5

# # Uncomment and configure for W&B logging
# wandb:
#   project: <your_wandb_project>
#   entity: <your_wandb_entity>
#   name: <your_wandb_exp_name>
#   save_dir: <your_wandb_save_dir>

ci:
  recipe_owner: hemildesai
  # GB200/oci_hsg has 4 GPUs/node. ep_size=8 needs world 8, so spread 4 procs
  # across 2 nodes (local_rank 0..3 -> the 4 GPUs). Set nodes/nproc explicitly
  # rather than node_multiplier: the multiplier gate in
  # .base_sbatch_template_launcher reads the before_script NPROC_PER_NODE
  # (=8 on oci_hsg, the non-lyris/pretyche else-branch) and so never triggers.
  nodes: 2
  nproc_per_node: 4
