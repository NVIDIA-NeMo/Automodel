# To run this recipe:
#   torchrun --nproc-per-node=8 examples/llm_finetune/finetune.py --config examples/llm_finetune/qwen/qwen3_moe_30b_magi_packed_sequence_cp2.yaml
#
# Qwen3-30B-A3B finetune with the MagiAttention (FFA) backend and THD sequence
# packing, WITH context parallelism (cp_size=2). Identical to
# qwen3_moe_30b_magi_packed_sequence.yaml except cp_size=2 (EP and CP overlap on the
# device mesh, so ep_size stays 8 -- same EP/DP layout as cp1), giving a clean
# cp1-vs-cp2 convergence comparison on identical data.
#
# MagiAttention provides context parallelism via its own load-balancing dispatch:
# the packed sequence is sharded across the CP group, KV is exchanged cross-rank
# (GroupCast/GroupReduce) inside the FFA kernel, and labels are sharded so the loss
# is computed per-shard and reduced across CP. This matches the cp_size=1 result.
#
# MoE backend matches the other Qwen3-MoE / Moonlight examples (DeepEP dispatcher,
# grouped expert GEMM); only the attention backend is swapped to magi.
#
# Notes for the magi backend:
#   * local_batch_size must be 1. MagiAttention operates on a single flat (varlen)
#     THD sequence with no batch dimension, so this integration packs the batch into
#     that one sequence rather than using an outer batch dim. This is the integration
#     mapping (and the idiomatic magi usage), not a kernel limit -- raise throughput
#     via packed_sequence_size, not local_batch_size.
#   * backend.rope_fusion must be false: under CP the sequence is dispatched
#     (permuted), so RoPE is applied with the dispatched positions (get_position_ids),
#     which the fused TE rope path cannot honor.

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 8
  local_batch_size: 1        # magi uses one flat varlen sequence per micro-step (no batch dim); pack via packed_sequence_size
  ckpt_every_steps: 500
  num_epochs: 2

dist_env:
  backend: nccl
  timeout_minutes: 20

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3-30B-A3B
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: magi              # MagiAttention Flex-Flash-Attention backend
    linear: te
    rms_norm: torch_fp32
    experts: torch_mm
    dispatcher: deepep
    rope_fusion: false      # required for magi CP (positional RoPE on dispatched layout)
    fake_balanced_gate: false
    enable_hf_state_dict_adapter: true

checkpoint:
  enabled: false
  checkpoint_dir: checkpoints/
  model_save_format: torch_save
  save_consolidated: false

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 2                 # context parallelism via MagiAttention
  pp_size: 1
  ep_size: 8                 # EP and CP overlap on the device mesh (same ep/dp as cp1)
  sequence_parallel: false
  activation_checkpointing: true

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: train
  pad_to_max_length: false

packed_sequence:
  packed_sequence_size: 1024

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.packed_sequence_thd_collater
  shuffle: false   # deterministic order so cp1 vs cp2 curves are directly comparable

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: validation
  pad_to_max_length: false

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.packed_sequence_thd_collater

optimizer:
  _target_: torch.optim.Adam
  betas: [0.9, 0.999]
  eps: 1e-7
  lr: 1.0e-4
  weight_decay: 0
  foreach: false

ci:
  recipe_owner: huiyingl
