# Qwen3 MoE 30B fine-tuning launched via NeMo-Run on a Slurm cluster.
#
# This config uses a named executor defined in $NEMORUN_HOME/executors.py
# and overrides the container image to use the AutoModel nightly squashfs image.
#
# Usage:
#   automodel examples/llm_finetune/qwen/qwen3_moe_30b_te_packed_sequence_nemorun.yaml


# -- NeMo-Run launcher section ------------------------------------------------
# Removed before the training config reaches the remote node.
nemo_run:
  executor: my_slurm_cluster       # Name from EXECUTOR_MAP in $NEMORUN_HOME/executors.py
  container_image: /path/to/automodel_nightly.sqsh
  nodes: 1
  devices: 8
  time: "04:00:00"
  job_name: qwen3_moe_30b_nemorun


# -- Training config (forwarded to the remote node unchanged) ------------------
recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 32
  local_batch_size: 4
  num_epochs: 2

dist_env:
  backend: nccl
  timeout_minutes: 10

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3-30B-A3B
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: te
    linear: te
    rms_norm: torch_fp32
    experts: torch_mm
    dispatcher: deepep
    rope_fusion: false
    fake_balanced_gate: false
    enable_hf_state_dict_adapter: true

checkpoint:
  enabled: false

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 8

  sequence_parallel: false
  activation_checkpointing: true

  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 4
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false
    layers_per_stage: 2

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: train
  pad_to_max_length: false

packed_sequence:
  packed_sequence_size: 1024

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.packed_sequence_thd_collater
  shuffle: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: validation
  pad_to_max_length: false

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.packed_sequence_thd_collater

optimizer:
  _target_: flashoptim.FlashAdamW
  lr: 1.0e-4
  betas: [0.9, 0.999]
  eps: 1e-7
  weight_decay: 0
  master_weight_bits: 24
