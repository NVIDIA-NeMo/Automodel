# Super V3 ships MTP weights in its HF checkpoint:
#   - mtp_hybrid_override_pattern: "*E"   (1 attention + 1 MoE per MTP depth)
#   - num_nextn_predict_layers: 1         (single MTP depth)
# Both fields are read directly from the HF config by NemotronHForCausalLM.
# The training-only ``mtp_loss_scaling_factor`` is supplied here.

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  num_epochs: 1
  global_batch_size: 8
  local_batch_size: 1
  ckpt_every_steps: 5
  val_every_steps: 100

dist_env:
  backend: nccl
  timeout_minutes: 10

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-BF16
  # MTP scaling factor (Megatron's --mtp-loss-scaling-factor; default 0.1).
  # ``num_nextn_predict_layers`` and ``mtp_hybrid_override_pattern`` are read
  # from the HF config and do not need to be overridden here.
  mtp_loss_scaling_factor: 0.1

compile:
  enabled: false
  mode: "default"
  fullgraph: false
  dynamic: true
  backend: null

checkpoint:
  enabled: true
  checkpoint_dir: checkpoints/super_v3_mtp_peft/
  model_save_format: safetensors
  save_consolidated: true

peft:
  _target_: nemo_automodel.components._peft.lora.PeftConfig
  target_modules: ["*_proj", "*experts*"]
  dim: 8
  alpha: 32
  use_triton: true

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1
  ep_size: 8

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: train
  num_samples_limit: 64

packed_sequence:
  packed_sequence_size: 0

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  shuffle: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: validation
  num_samples_limit: 8

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater

optimizer:
  _target_: torch.optim.Adam
  betas: [0.9, 0.999]
  eps: 1e-8
  lr: 1.0e-5
  weight_decay: 0

lr_scheduler:
  lr_decay_style: cosine
  min_lr: 1.0e-6
