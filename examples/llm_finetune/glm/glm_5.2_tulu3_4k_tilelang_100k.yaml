recipe: TrainFinetuneRecipeForNextTokenPrediction
seed: 1234

step_scheduler:
  global_batch_size: 256
  local_batch_size: 4
  ckpt_every_steps: 100000
  val_every_steps: 100000
  gc_every_steps: 10
  num_epochs: 2
  max_steps: 100

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 4
  ep_size: 64
  sequence_parallel: false
  activation_checkpointing: true

  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 1
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false
    layers_per_stage: 2

  moe:
    reshard_after_forward: false
    wrap_outer_model: false
    ignore_router_for_ac: true

dist_env:
  backend: nccl
  timeout_minutes: 10

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: /lustre/fs1/portfolios/coreai/projects/coreai_dlalgo_nemofw/users/huiyingl/glm52/glm52_fixed_config
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: tilelang
    linear: torch
    rms_norm: torch_fp32
    rope_fusion: false
    enable_deepep: true
    gate_precision: float32
    fake_balanced_gate: false
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true

checkpoint:
  enabled: false
  dequantize_base_checkpoint: true

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.chat_dataset.ChatDataset
  path_or_dataset_id: allenai/tulu-3-sft-mixture
  split: train[:100000]
  shuffle_seed: 42
  truncation: true
  seq_length: 4096
  padding: false
  tokenizer:
    _target_: transformers.AutoTokenizer.from_pretrained
    pretrained_model_name_or_path: /lustre/fs1/portfolios/coreai/projects/coreai_dlalgo_nemofw/users/huiyingl/glm52/glm52_fixed_config

packed_sequence:
  packed_sequence_size: 4096

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.packed_sequence_thd_collater
  shuffle: true

optimizer:
  _target_: torch.optim.Adam
  betas:
  - 0.9
  - 0.999
  eps: 1e-8
  lr: 1e-5
  weight_decay: 0

