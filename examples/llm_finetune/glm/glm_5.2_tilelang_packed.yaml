# GLM-5.2 (IndexShare DSA) SFT with the TileLang sparse DSA kernels enabled
# (fused lighting-indexer + gather-top-k SparseMLA). The TileLang path is THD/varlen
# only, so this recipe packs sequences (packed_sequence_thd_collater) and uses
# packed_sequence_size > index_topk (2048) to actually exercise sparse selection.
# Mirrors glm_5.2_hellaswag_pp.yaml; the only functional change is the kernel backend.
#
# Requires: tilelang (pip install "tilelang==0.1.11" "apache-tvm-ffi==0.1.11"; the newer
# apache-tvm-ffi 0.1.12 breaks `import tilelang`).

recipe: TrainFinetuneRecipeForNextTokenPrediction

seed: 1234

step_scheduler:
  global_batch_size: 256
  local_batch_size: 4
  ckpt_every_steps: 1000
  val_every_steps: 1000
  gc_every_steps: 10
  num_epochs: 1
  max_steps: 20

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 4
  ep_size: 64

  sequence_parallel: false
  activation_checkpointing: true

  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 1
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    # GLM-5.2 threads the DSA top-k selection through the pipeline; the generic causal-LM
    # forward wrappers collide with that extra carry, so disable them.
    patch_inner_model: false
    patch_causal_lm_model: false
    layers_per_stage: 2

  moe:
    reshard_after_forward: false
    wrap_outer_model: false

dist_env:
  backend: nccl
  timeout_minutes: 30

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: zai-org/GLM-5.2
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: tilelang  # opt-in TileLang sparse DSA kernels (indexer + SparseMLA); THD-only
    linear: torch   # the absorbed-MLA path reads kv_b_proj.weight directly; torch linear is the
                    # validated layout (TE linear should also work but is not yet validated here)
    rms_norm: torch_fp32
    rope_fusion: false
    enable_deepep: true
    gate_precision: float32  # match HF/DeepSeek-V3 fp32 router; stabilizes top-k routing
    fake_balanced_gate: false
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true

checkpoint:
  enabled: false
  dequantize_base_checkpoint: true

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: train

# THD packing is required by the TileLang kernels. packed_sequence_size (4096) > index_topk
# (2048) so the SparseMLA kernel attends to a strict subset of keys (real sparsity).
packed_sequence:
  packed_sequence_size: 4096

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.packed_sequence_thd_collater
  shuffle: true

optimizer:
  _target_: torch.optim.Adam
  betas:
  - 0.9
  - 0.999
  eps: 1e-8
  lr: 1e-5
  weight_decay: 0

ci:
  nodes: 32
