# Based on custom_llama3_3_70b_instruct_peft_benchmark.yaml

seed: 42

# NEW: Add benchmark section
benchmark:
  warmup_steps: 5
  peak_tflops: 989  # H100: 989, A100: 312
  nsys_start: 8
  nsys_end: 9
  nsys_ranks: [0]
  num_nodes: 1
  profile_comm: false

step_scheduler:
  global_batch_size: 32
  local_batch_size: 2
  ckpt_every_steps: 50
  val_every_steps: 1000
  max_steps: 10

dist_env:
  backend: nccl
  timeout_minutes: 10

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: meta-llama/Llama-3.3-70B-Instruct
  torch_dtype: bf16

peft:
  _target_: nemo_automodel.components._peft.lora.PeftConfig
  match_all_linear: True
  dim: 16
  alpha: 32
  use_triton: True  # was: False — restore fused Triton LoRA kernels

checkpoint:
  enabled: false
  checkpoint_dir: checkpoints/
  model_save_format: safetensors
  save_consolidated: false

distributed:
  _target_: nemo_automodel.components.distributed.fsdp2.FSDP2Manager
  dp_size: none
  tp_size: 2
  cp_size: 1

  sequence_parallel: true
  activation_checkpointing: true
  enable_async_tensor_parallel: true
  enable_fsdp2_prefetch: true
  enable_compile: true

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

# Use MockIterableDataset for benchmarking (faster, no I/O)
dataset:
  _target_: nemo_automodel.components.datasets.llm.mock_iterable_dataset.MockIterableDataset
  vocab_size: 100
  seq_len: 4096
  num_samples: 1000000

dataloader:
  _target_: torch.utils.data.DataLoader
  batch_size: null  # Dataset already yields batches
  # Note: model_config will be auto-injected by train_ft.py for PP models

optimizer:
  _target_: transformer_engine.pytorch.optimizers.fused_adam.FusedAdam
  betas: [0.9, 0.999]
  eps: 1e-8
  lr: 1.0e-5
  weight_decay: 0
  adam_w_mode: false
  bias_correction: true
  master_weights: true

lr_scheduler:
  lr_decay_style: cosine
  min_lr: 1.0e-6 

nvtx: true  # was: true — eliminate NVTX push/pop CPU overhead per kernel launch