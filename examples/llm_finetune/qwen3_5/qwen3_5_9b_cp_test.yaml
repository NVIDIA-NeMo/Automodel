# Qwen3.5 9B CP parity test: THD collater, no packing, SDPA attention
# Run with cp_size=1 (8 GPUs) then cp_size=2 (8 GPUs) and compare losses.
#
# CP=1:
#   torchrun --nproc-per-node=8 examples/llm_finetune/finetune.py \
#     -c examples/llm_finetune/qwen3_5/qwen3_5_9b_cp_test.yaml \
#     --distributed.cp_size=1
#
# CP=2:
#   torchrun --nproc-per-node=8 examples/llm_finetune/finetune.py \
#     -c examples/llm_finetune/qwen3_5/qwen3_5_9b_cp_test.yaml \
#     --distributed.cp_size=2

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 8
  local_batch_size: 1
  ckpt_every_steps: 10
  val_every_steps: 999
  max_steps: 100

dist_env:
  backend: nccl
  timeout_minutes: 10

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3.5-9B
  attn_implementation: sdpa

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  dp_replicate_size: 1
  ep_size: 1
  sequence_parallel: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: train

packed_sequence:
  packed_sequence_size: 0

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.packed_sequence_thd_collater
  shuffle: false

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1e-8
  lr: 1.0e-5
  weight_decay: 0.1

checkpoint:
  enabled: true
  checkpoint_dir: /tmp/checkpoints/qwen3_5_9b_cp_test/
  model_save_format: safetensors
  save_consolidated: true
