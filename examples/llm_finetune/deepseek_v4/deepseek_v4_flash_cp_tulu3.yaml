# DeepSeek-V4 Flash SFT on Tulu-3 with context parallelism (cp_size=8).
#
# This is the recipe the DSV4 CP path was validated on (cp1-vs-cp2 loss parity
# plus a 100-step pp4/cp8/ep32 run matching the cp1 reference trajectory).
#
# Notes specific to DSV4 context parallelism:
#   * CP requires the Miles-style TileLang attention backend (attn: tilelang);
#     the runtime capability gate rejects other backends with cp_size > 1.
#   * CP is NOT compatible with packed sequences (packed_sequence_size must be 0).
#     Use a fixed sequence length with padding=max_length instead — each CP rank
#     owns a contiguous query shard of that fixed length.
#   * Mesh: dp(4) * tp(1) * pp(4) * cp(8) = 128 GPUs => 16 nodes (8 H100/node);
#     ep_size(32) shards experts within the dp*cp group (4*8=32).
#
#   torchrun --nproc-per-node 8 examples/llm_finetune/deepseek_v4/deepseek_v4_flash_cp_tulu3.yaml --nproc-per-node 8


recipe: TrainFinetuneRecipeForNextTokenPrediction

seed: 1234

step_scheduler:
  global_batch_size: 256
  local_batch_size: 4
  ckpt_every_steps: 500
  val_every_steps: 500
  gc_every_steps: 10
  num_epochs: 1
  max_steps: 100

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 8
  pp_size: 4
  ep_size: 32

  sequence_parallel: false
  activation_checkpointing: true

  pipeline:
    pp_schedule: 1f1b
    pp_microbatch_size: 1
    layers_per_stage: 11
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false

  moe:
    ignore_router_for_ac: true
    reshard_after_forward: false
    wrap_outer_model: false

dist_env:
  backend: nccl
  timeout_minutes: 60

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: nemo_automodel.components.models.deepseek_v4.config.DeepseekV4Config.from_pretrained
    pretrained_model_name_or_path: deepseek-ai/DeepSeek-V4-Flash
    name_or_path: deepseek-ai/DeepSeek-V4-Flash
    num_nextn_predict_layers: 0
  trust_remote_code: false
  load_base_model: true
  mtp_loss_scaling_factor: 0.1
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    # Context parallelism requires the TileLang attention backend.
    attn: tilelang
    linear: torch
    rms_norm: torch_fp32
    rope_fusion: false
    dispatcher: hybridep
    experts: torch_mm
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true

checkpoint:
  enabled: false
  dequantize_base_checkpoint: true

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

# Assistant-only loss masking: the {% generation %} block marks the spans that
# contribute to the loss (everything else is masked out as context).
_dsv4_tulu3_chat_template: &dsv4_tulu3_chat_template |-
  {% for message in messages %}{% if message['role'] == 'system' %}<｜begin▁of▁sentence｜>system
  {{ message['content'] }}<｜end▁of▁sentence｜>
  {% elif message['role'] == 'user' %}<｜begin▁of▁sentence｜>user
  {{ message['content'] }}<｜end▁of▁sentence｜>
  {% elif message['role'] == 'assistant' %}<｜begin▁of▁sentence｜>assistant
  {% generation %}{{ message['content'] }}{% endgeneration %}<｜end▁of▁sentence｜>
  {% endif %}{% endfor %}

dataset:
  _target_: nemo_automodel.components.datasets.llm.chat_dataset.ChatDataset
  path_or_dataset_id: allenai/tulu-3-sft-mixture
  split: train
  shuffle_seed: 42
  truncation: true
  # Fixed length + max_length padding: CP shards this contiguously across ranks.
  seq_length: 16384
  padding: max_length
  chat_template: *dsv4_tulu3_chat_template
  tokenizer:
    _target_: transformers.AutoTokenizer.from_pretrained
    pretrained_model_name_or_path: deepseek-ai/DeepSeek-V4-Flash

# Context parallelism does not support packed sequences for DeepSeek-V4.
packed_sequence:
  packed_sequence_size: 0

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.default_collater
    pad_seq_len_divisible: 8
  shuffle: true

optimizer:
  _target_: torch.optim.AdamW
  betas:
  - 0.9
  - 0.95
  eps: 1e-8
  lr: 1e-5
  weight_decay: 0.1

ci:
  # dp(4) * tp(1) * pp(4) * cp(8) = 128 GPUs => 16 nodes (8 H100/node).
  # ep_size(32) shards experts within the dp*cp group (4*8=32); it does not
  # multiply the mesh.
  recipe_owner: huiyingl
  nodes: 16
  # Cold multi-node start + TileLang JIT runs past the 00:10:00 default.
  time: "00:30:00"
