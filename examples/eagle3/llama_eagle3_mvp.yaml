recipe: TrainEagle3Recipe

dist_env:
  backend: nccl
  timeout_minutes: 30

recipe_args:
  target_model_name_or_path: meta-llama/Llama-3.2-1B
  train_data_path: /path/to/train.jsonl
  val_data_path: null
  train_split: null
  val_split: null
  output_dir: ./outputs/eagle3_llama_mvp
  seq_length: 1024
  micro_batch_size: 1
  grad_accumulation_steps: 1
  num_workers: 0
  num_epochs: 1
  ttt_steps: 4
  draft_vocab_size: 8192
  freeze_embeddings: true
  trust_remote_code: false
  shuffle_seed: 42
  log_every_steps: 10
  max_grad_norm: 1.0

optimizer:
  # LR is calibrated against the SpecForge-style weighted loss
  # ``Σ_{i=0..ttt_steps-1} 0.8^i * step_loss_i`` (unnormalized).
  # If you change ``ttt_steps`` or the decay constant in
  # ``components/speculative/eagle/core.py``, rescale this LR by the
  # inverse ratio of the new vs. old weight sum to keep update magnitude
  # comparable. See the equivalent note in the PerfectBlend config.
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
