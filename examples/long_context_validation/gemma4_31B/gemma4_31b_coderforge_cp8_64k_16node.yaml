# Gemma 4 31B CoderForge agent SFT — 16 nodes / 128 GPUs, single 4h-window run (~0.30B tokens).
# Topology: cp8 x dp16 (128/(1*8)=16), gbs=16 (one trajectory per dp rank), max_steps=450
# (~7,200 trajectories, ~0.30B tokens at ~42.3k tok/traj) — fits one batch-partition 4h window
# at the smoke run's ~192 tok/s/GPU. Mid-run CONSOLIDATED checkpoints every 150 steps
# (steps 150/300/450) for SWE-bench eval AND preemption insurance.
# Derived from gemma4_31b_coderforge_cp8_64k.yaml (validated on 2 nodes; loss 0.80->0.25).

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 16       # dp16 x local_batch_size 1
  local_batch_size: 1
  ckpt_every_steps: 150       # consolidated HF ckpt at 150/300/450 (eval + preemption safety)
  val_every_steps: 999999
  max_steps: 450              # ~0.30B tokens (~7.2k trajectories)
  num_epochs: 1

dist_env:
  backend: nccl
  timeout_minutes: 120

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: /path/to/checkpoints/hf_gemma4_31b_it
  torch_dtype: torch.bfloat16
  attn_implementation: sdpa   # dense CP requires sdpa (model-owned p2p ring); no TE attn backend
  use_liger_kernel: false
  use_sdpa_patching: false
  text_config:
    use_cache: false
    output_hidden_states: true  # required by FusedLinearCrossEntropy

processor:
  padding_side: right

checkpoint:
  enabled: true
  checkpoint_dir: /path/to/coderforge_ckpts/gemma4_31b_coderforge_cp8_64k_16node_0p3B/
  model_save_format: safetensors
  save_consolidated: every    # each save -> consolidated HF ckpt (SWE-bench-evaluable), persisted on lustre
  v4_compatible: true         # consolidated assets load under transformers v4 (Phase-3 vLLM serving)

distributed:
  strategy: fsdp2
  dp_size: none               # auto: 128 / (tp1 * cp8) = 16
  tp_size: 1
  cp_size: 8                  # 65536 / (2*8) = 4096 -> divisible; 8192 tokens/rank
  sequence_parallel: false
  activation_checkpointing: true

clip_grad_norm:
  max_norm: 1.0

loss_fn:
  _target_: nemo_automodel.components.loss.linear_ce.FusedLinearCrossEntropy
  logit_softcapping: 30.0
  reduction: sum

dataset:
  _target_: nemo_automodel.components.datasets.llm.chat_dataset.ChatDataset
  path_or_dataset_id: /path/to/coderforge_cache/togethercomputer_CoderForge-Preview_filtered_reward1_seq65536/data.jsonl
  tokenizer:
    _target_: transformers.AutoTokenizer.from_pretrained
    pretrained_model_name_or_path: /path/to/checkpoints/hf_gemma4_31b_it
  split: train
  seq_length: 65536
  padding: do_not_pad
  shuffle_seed: 42            # sample the ~7.2k-trajectory budget across all 135k

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 4
  persistent_workers: true
  pin_memory: true
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.packed_sequence_thd_collater_vlm

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]

lr_scheduler:
  lr_decay_style: cosine
  lr_warmup_steps: 30
  min_lr: 1.0e-6

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

wandb:
  enable: true
  project: cp_validation
  entity: nvidia
  name: gemma4_31b_coderforge_cp8_64k_16node_0p3B
