# Benchmarking config for GPT-OSS 120B with MXFP8 expert GEMMs via TransformerEngine,
# tuned for GB200.
#
# Delta vs gptoss_120b_te_deepep_gb200.yaml (bf16) and vs the torchao mxfp8 config
# (gptoss_120b_te_deepep_mxfp8_gb200.yaml):
#   - model.backend.experts: torch_mm -> te
#     Uses TE's GroupedLinear expert GEMMs (GroupedExpertsTE), which natively support
#     FP8 (fp8_padding/unpadding + FP8GlobalStateManager gate already in its forward).
#   - model.backend.te_fp8.recipe: mxfp8
#     Enables TE's MXFP8BlockScaling recipe (e4m3 data + e8m0 block scales) for the
#     expert GEMMs. Unlike torchao's MXFP8 grouped GEMM, TE's MXFP8 backward is mature
#     (no e8m0-overflow NaN), so GPT-OSS's grouped + bias experts train stably — the
#     torchao path NaNs from iter 1 on GPT-OSS (bias-shifted block saturates the e8m0
#     scale in the backward re-quant); qwen3-moe (no bias) is fine on torchao.
#
# The te_fp8 autocast is applied to the whole forward at train_ft._forward_backward_step
# (fp8_ctx); the BenchmarkingRecipe reuses that step, so the expert GEMMs run under
# MXFP8BlockScaling. attn/linear/rms_norm stay TE bf16 unless a wider fp8 scope is set.
#
# Parallelism/data match the bf16 baseline for an apples-to-apples iter-time comparison:
#   8 nodes/32 GPUs, ep_size=16, local_batch_size=2, GBS=512, seq_len=4096.
# peak_tflops=5000 (GB200 MXFP8/FP8 dense peak) so MFU is reported against the FP8
# roofline, not the bf16 2500 peak the gmm/bf16 configs use.

recipe: BenchmarkingRecipeForNextTokenPrediction

seed: 1234

benchmark:
  warmup_steps: 10
  peak_tflops: 5000  # GB200 MXFP8/FP8 dense peak TFLOPs
  nsys_start: -1
  nsys_end: -1
  nsys_ranks: []
  num_nodes: 8

step_scheduler:
  gc_every_steps: 10
  global_batch_size: 512
  local_batch_size: 2
  ckpt_every_steps: 1000
  val_every_steps: 1000
  num_epochs: 1
  max_steps: 30

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 16

  sequence_parallel: false
  activation_checkpointing: false

  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 2
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false
    layers_per_stage: 2

  moe:
    reshard_after_forward: false

dist_env:
  backend: nccl
  timeout_minutes: 10

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.AutoConfig.from_pretrained
    pretrained_model_name_or_path: openai/gpt-oss-120b
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: te
    linear: te
    rms_norm: te
    rope_fusion: true
    experts: te
    dispatcher: hybridep
    dispatcher_num_sms: 64
    fake_balanced_gate: true
    enable_hf_state_dict_adapter: false
    enable_fsdp_optimizations: true
    te_fp8:
      recipe: mxfp8

checkpoint:
  enabled: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy
  fp32_upcast: false

dataset:
  _target_: nemo_automodel.components.datasets.llm.mock_iterable_dataset.MockIterableDataset
  seq_len: 4096
  num_samples: 100000

dataloader:
  batch_size: null  # Dataset already yields batches
  _target_: torch.utils.data.DataLoader
  num_workers: 0

optimizer:
  _target_: torch.optim.Adam
  betas:
  - 0.9
  - 0.999
  eps: 1e-8
  lr: 0.0001
  weight_decay: 0
  # experts=te params are FSDP-sharded to DTensor only when ep<world (ep_shard dim
  # exists). At ep==world they stay plain Tensors while the rest of the model is DTensor;
  # foreach=false runs Adam per-param so it never batches a mixed Tensor/DTensor group
  # ("_foreach_lerp_ got mixed torch.Tensor and DTensor"). gpt-oss runs ep=16<world=32
  # so it already gets DTensor experts, but keep this for ep==world robustness.
  foreach: false


ci:
  time: "00:40:00"
  nodes: 8
  ep_size: 16
