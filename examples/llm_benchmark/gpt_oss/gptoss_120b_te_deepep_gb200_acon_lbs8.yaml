# MFU-sweep variant of gptoss_120b_te_deepep_gb200: activation_checkpointing=ON,
# local_batch_size=8 (GBS=512 -> GA=2). AC pays a recompute tax but frees the
# activation memory to run a 2x-larger microbatch, which improves GEMM/dispatch
# efficiency. This is the bf16 analogue of the operating point the TE-MXFP8 recipe
# already uses (lbs=8/AC-on). Iso-GBS=512 with the AC-off/lbs=4 baseline.

recipe: BenchmarkingRecipeForNextTokenPrediction

seed: 1234

benchmark:
  warmup_steps: 10
  peak_tflops: 2500  # GB200 BF16 dense peak TFLOPs
  nsys_start: -1
  nsys_end: -1
  nsys_ranks: []
  num_nodes: 8

step_scheduler:
  gc_every_steps: 10
  global_batch_size: 512
  local_batch_size: 8
  ckpt_every_steps: 1000
  val_every_steps: 1000
  num_epochs: 1
  max_steps: 30

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 16

  sequence_parallel: false
  activation_checkpointing: true

  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 2
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false
    layers_per_stage: 2

  moe:
    reshard_after_forward: false

dist_env:
  backend: nccl
  timeout_minutes: 10

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.AutoConfig.from_pretrained
    pretrained_model_name_or_path: openai/gpt-oss-120b
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: te
    linear: te
    rms_norm: te
    rope_fusion: true
    experts: te  # TE GroupedLinear bf16 (no fp8) — te is the fastest bf16 expert backend in the bake-off; ep16<world32 so experts stay DTensor-wrapped (optimizer.foreach default OK)
    dispatcher: hybridep
    dispatcher_num_sms: 64
    fake_balanced_gate: true
    enable_hf_state_dict_adapter: false
    enable_fsdp_optimizations: true

checkpoint:
  enabled: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy
  fp32_upcast: false

dataset:
  _target_: nemo_automodel.components.datasets.llm.mock_iterable_dataset.MockIterableDataset
  seq_len: 4096
  num_samples: 100000

dataloader:
  batch_size: null  # Dataset already yields batches
  _target_: torch.utils.data.DataLoader
  num_workers: 0

optimizer:
  _target_: torch.optim.Adam
  betas:
  - 0.9
  - 0.999
  eps: 1e-8
  lr: 0.0001
  weight_decay: 0


ci:
  time: "00:50:00"
  nodes: 8
  cluster_tag: "[Gg][Bb]200"  # case-insensitive: pretyche GPU=gb200, oci_hsg GPU=GB200
  ep_size: 16
  env_vars:
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
