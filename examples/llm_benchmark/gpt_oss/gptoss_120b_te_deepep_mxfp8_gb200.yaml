# Benchmarking config for GPT-OSS 120B Te Deepep with MXFP8 expert GEMMs, tuned for GB200.
#
# Delta vs gptoss_120b_te_deepep_gb200.yaml:
#   - model.backend.experts: torch_mm -> torch_mm_mxfp8
#     Routes the expert grouped GEMMs through torchao's MXFP8 scaled grouped GEMM.
#     gpt-oss has expert_bias=True, so it uses the inline bias-branch grouped GEMMs
#     (GroupedExperts._forward_grouped_mm / GroupedExpertsDeepEP.forward), which are
#     swapped to the same torchao MXFP8 path (with the contiguous-operand relayout) via
#     _select_grouped_mm. MXFP8 is gated at runtime on CUDA sm_100+ (GB200) and an
#     importable torchao; it falls back to torch._grouped_mm otherwise. Needs the
#     kernelized torchao forward (>=0.17.0) to be a perf win.
#
# Everything else matches the bf16 baseline for an apples-to-apples comparison:
#   peak_tflops=2500, 8 nodes/32 GPUs, ep_size=16, local_batch_size=2, GBS=512, seq_len=4096.

recipe: BenchmarkingRecipeForNextTokenPrediction

seed: 1234

benchmark:
  warmup_steps: 10
  peak_tflops: 2500  # GB200 BF16 dense peak TFLOPs
  nsys_start: -1
  nsys_end: -1
  nsys_ranks: []
  num_nodes: 8

step_scheduler:
  gc_every_steps: 10
  global_batch_size: 512
  local_batch_size: 2
  ckpt_every_steps: 1000
  val_every_steps: 1000
  num_epochs: 1
  max_steps: 30

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 16

  sequence_parallel: false
  activation_checkpointing: false

  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 2
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false
    layers_per_stage: 2

  moe:
    reshard_after_forward: false

dist_env:
  backend: nccl
  timeout_minutes: 10

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.AutoConfig.from_pretrained
    pretrained_model_name_or_path: openai/gpt-oss-120b
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: te
    linear: te
    rms_norm: te
    rope_fusion: true
    experts: torch_mm_mxfp8
    dispatcher: hybridep
    dispatcher_num_sms: 64
    fake_balanced_gate: true
    enable_hf_state_dict_adapter: false
    enable_fsdp_optimizations: true

checkpoint:
  enabled: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy
  fp32_upcast: false

dataset:
  _target_: nemo_automodel.components.datasets.llm.mock_iterable_dataset.MockIterableDataset
  seq_len: 4096
  num_samples: 100000

dataloader:
  batch_size: null  # Dataset already yields batches
  _target_: torch.utils.data.DataLoader
  num_workers: 0

optimizer:
  _target_: torch.optim.Adam
  betas:
  - 0.9
  - 0.999
  eps: 1e-8
  lr: 0.0001
  weight_decay: 0


ci:
  time: "00:40:00"
  nodes: 8
  ep_size: 16
