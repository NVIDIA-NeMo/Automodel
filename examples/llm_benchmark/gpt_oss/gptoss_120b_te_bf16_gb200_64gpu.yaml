# GPT-OSS 120B BF16 throughput recipe at the 26.06 Megatron comparison
# geometry: 16 GB200 nodes x 4 GPUs, EP64, MBS4, GBS1280 (GA5).
# AutoModel uses stacked TE-ops experts with HybridEP. The full five-microbatch
# forward/backward schedule is captured after two eager warmups. A guarded
# 1.125x HybridEP rank budget and whole-step dropless fallback preserve exact
# routing. Paged stashing is MXFP8-only with TE 2.16.1, so BF16 retains its
# ordinary saved tensors. Activation checkpointing is disabled because this
# operating point fits. Detailed sub-step timers remain disabled.

recipe: BenchmarkingRecipeForNextTokenPrediction
seed: 1234

benchmark:
  warmup_steps: 10
  peak_tflops: 2500
  nsys_start: -1
  nsys_end: -1
  nsys_ranks: []
  num_nodes: 16
  detailed_timers: false

step_scheduler:
  gc_every_steps: 10
  global_batch_size: 1280
  local_batch_size: 4
  ckpt_every_steps: 1000
  val_every_steps: 1000
  num_epochs: 1
  max_steps: 30

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 64
  sequence_parallel: false
  activation_checkpointing: false
  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 2
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false
    layers_per_stage: 2
  moe:
    reshard_after_forward: false
    # Reuse process-group-owned communication buffers for dense FSDP units.
    # This is beneficial for BF16 at EP64; MXFP8 keeps the default allocator.
    enable_fsdp2_process_group_allocator: true

dist_env:
  backend: nccl
  timeout_minutes: 10

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.AutoConfig.from_pretrained
    pretrained_model_name_or_path: openai/gpt-oss-120b
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: te
    linear: te
    rms_norm: te
    rope_fusion: true
    experts: te_ops
    dispatcher: hybridep
    dispatcher_num_sms: 32
    fake_balanced_gate: true
    enable_hf_state_dict_adapter: false
    enable_fsdp_optimizations: true
    full_iteration_cuda_graph: true
    full_iteration_cuda_graph_warmup_steps: 2
    full_iteration_cuda_graph_single_mempool: true
    moe_expert_rank_capacity_factor: 1.125
    # TE 2.16.1 marks the CuTe MXFP8 grouped-MLP saved tensors needed by
    # paged stashing; its BF16 GroupedTensor path does not expose that marker.
    # Keep the guarded full-iteration graph enabled without expert stashing.
    moe_paged_stash: false

checkpoint:
  enabled: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy
  fp32_upcast: false

dataset:
  _target_: nemo_automodel.components.datasets.llm.mock_iterable_dataset.MockIterableDataset
  seq_len: 4096
  num_samples: 100000

dataloader:
  batch_size: null
  _target_: torch.utils.data.DataLoader
  num_workers: 0

optimizer:
  _target_: transformer_engine.pytorch.optimizers.fused_adam.FusedAdam
  betas: [0.9, 0.999]
  eps: 1e-8
  lr: 0.0001
  weight_decay: 0
  master_weights: true
  store_param_remainders: true
  exp_avg_dtype: torch.bfloat16
  exp_avg_sq_dtype: torch.bfloat16
  master_weight_dtype: torch.float32

ci:
  time: "00:40:00"
  nodes: 16
  cluster_tag: gb200
  ep_size: 64
  env_vars:
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True,graph_capture_record_stream_reuse:True"
    TORCH_NCCL_AVOID_RECORD_STREAMS: "0"
    NCCL_GRAPH_REGISTER: "0"
