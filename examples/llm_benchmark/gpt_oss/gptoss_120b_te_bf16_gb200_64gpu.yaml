# GPT-OSS 120B BF16 throughput recipe at the 26.06 Megatron comparison
# geometry: 16 GB200 nodes x 4 GPUs, EP64, MBS4, GBS1280 (GA5).
# AutoModel uses HybridEP because its TE GroupedLinear experts require a flex
# dispatcher. Activation checkpointing is disabled because this operating point
# fits and avoids recompute. Detailed sub-step timers are disabled because each
# timer boundary synchronizes CUDA and serializes adjacent accumulation steps;
# the synchronized outer iteration timer remains enabled.

recipe: BenchmarkingRecipeForNextTokenPrediction
seed: 1234

benchmark:
  warmup_steps: 10
  peak_tflops: 2500
  nsys_start: -1
  nsys_end: -1
  nsys_ranks: []
  num_nodes: 16
  detailed_timers: false

step_scheduler:
  gc_every_steps: 10
  global_batch_size: 1280
  local_batch_size: 4
  ckpt_every_steps: 1000
  val_every_steps: 1000
  num_epochs: 1
  max_steps: 30

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 64
  sequence_parallel: false
  activation_checkpointing: false
  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 2
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false
    layers_per_stage: 2
  moe:
    reshard_after_forward: false

dist_env:
  backend: nccl
  timeout_minutes: 10

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.AutoConfig.from_pretrained
    pretrained_model_name_or_path: openai/gpt-oss-120b
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: te
    linear: te
    rms_norm: te
    rope_fusion: true
    experts: te
    dispatcher: hybridep
    dispatcher_num_sms: 32
    fake_balanced_gate: true
    enable_hf_state_dict_adapter: false
    enable_fsdp_optimizations: true

checkpoint:
  enabled: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy
  fp32_upcast: false

dataset:
  _target_: nemo_automodel.components.datasets.llm.mock_iterable_dataset.MockIterableDataset
  seq_len: 4096
  num_samples: 100000

dataloader:
  batch_size: null
  _target_: torch.utils.data.DataLoader
  num_workers: 0

optimizer:
  _target_: torch.optim.Adam
  betas: [0.9, 0.999]
  eps: 1e-8
  lr: 0.0001
  weight_decay: 0
  # At EP==world the TE expert parameters are plain tensors while FSDP-managed
  # dense parameters are DTensors; foreach cannot batch the mixed types.
  foreach: false

ci:
  time: "00:40:00"
  nodes: 16
  cluster_tag: gb200
  ep_size: 64
  env_vars:
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
