# Benchmarking config for Qwen3 MoE 30B (A3B) Te Deepep with MXFP8 expert GEMMs, tuned for GB200.
#
# Delta vs qwen3_moe_30b_te_deepep_gb200.yaml:
#   - model.backend.experts: gmm -> torch_mm_mxfp8
#     Routes the expert grouped GEMMs through torchao's MXFP8 scaled grouped GEMM
#     (e4m3 data + e8m0 block scales) instead of grouped_gemm.ops.gmm. Selected via
#     GroupedExpertsDeepEP (same dispatcher path as torch_mm). MXFP8 is gated at
#     runtime on CUDA sm_100+ (GB200) and an importable torchao.prototype.moe_training;
#     it falls back to torch._grouped_mm otherwise. Training-only prototype kernel.
#
# dispatcher is hybridep (not deepep): on GB200 the deepep dispatcher fails EP
# buffer init with 'invalid resource handle'; hybridep is the working GB200 path (matches
# the passing gpt-oss GB200 recipes and the bf16 qwen3_moe_30b_te_deepep_gb200.yaml).
#
# Everything else matches the bf16 baseline for an apples-to-apples comparison:
#   peak_tflops=2500, num_nodes/ci.nodes=2, ep_size=8, local_batch_size=8,
#   global_batch_size=512 (=> 512 / (8 dp * 8) = 8 grad-accum micro-batches), seq_len=4096.

recipe: BenchmarkingRecipeForNextTokenPrediction

seed: 1234

benchmark:
  warmup_steps: 10
  peak_tflops: 2500  # GB200 BF16 dense peak TFLOPs
  nsys_start: -1
  nsys_end: -1
  nsys_ranks: []
  num_nodes: 2

step_scheduler:
  gc_every_steps: 10
  global_batch_size: 512
  local_batch_size: 8
  ckpt_every_steps: 1000
  val_every_steps: 1000
  num_epochs: 1
  max_steps: 30

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 8

  sequence_parallel: false
  activation_checkpointing: true

  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 2
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false
    layers_per_stage: 2

dist_env:
  backend: nccl
  timeout_minutes: 10

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.AutoConfig.from_pretrained
    pretrained_model_name_or_path: Qwen/Qwen3-30B-A3B
  trust_remote_code: true
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: te
    linear: te
    rms_norm: te
    rope_fusion: true
    experts: torch_mm_mxfp8
    dispatcher: hybridep  # GB200: deepep fails EP-buffer init ('invalid resource handle')
    fake_balanced_gate: true
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true

checkpoint:
  enabled: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy
  fp32_upcast: false

dataset:
  _target_: nemo_automodel.components.datasets.llm.mock_iterable_dataset.MockIterableDataset
  seq_len: 4096
  num_samples: 100000

dataloader:
  batch_size: null  # Dataset already yields batches
  _target_: torch.utils.data.DataLoader
  num_workers: 0

optimizer:
  _target_: torch.optim.Adam
  betas:
  - 0.9
  - 0.999
  eps: 1e-8
  lr: 0.0001
  weight_decay: 0


ci:
  time: "00:40:00"
  nodes: 2
  ep_size: 8
