# Benchmarking config for Qwen3 MoE 235B (A22B) Te Deepep, tuned for GB200 (BF16).
#
# GB200 deltas vs the generic qwen3_moe_235b_te_deepep.yaml:
#   - peak_tflops: 989 -> 2500  (GB200 BF16 dense peak; generic recipe uses H100 989)
#   - num_nodes/ci.nodes: 32 -> 8  (8 nodes x 4 GB200 = 32 GPUs; the pp=1 floor,
#     same footprint as gpt-oss — proven placeable, fits 192GB with margin)
#   - pp_size: 4 -> 1, ep_size: 32 -> 32  (pure expert parallelism, no pipeline)
#   - dispatcher: deepep -> hybridep  (GB200/oci_hsg: deepep fails EP-buffer init)
#
# Parallelism: ep_size=32 (==world=32), tp=pp=cp=1, dp_size=32. With lbs=4 and
# global_batch_size=32768, GA = 32768 / (32*4) = 256 gradient-accumulation
# micro-batches/step. seq_len=4096. pp=1 -> no pipeline / moe blocks.
# warmup=2 + max_steps=5: each step is 256 microbatches so MFU is steady within
# the first step; a couple measured steps give a stable number.

recipe: BenchmarkingRecipeForNextTokenPrediction

seed: 1234

benchmark:
  warmup_steps: 2
  peak_tflops: 2500  # GB200 BF16 dense peak TFLOPs
  nsys_start: -1
  nsys_end: -1
  nsys_ranks: []
  num_nodes: 8

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 32

  sequence_parallel: false
  activation_checkpointing: true

step_scheduler:
  gc_every_steps: 10
  global_batch_size: 32768  # GA = GBS / (world*lbs) = 32768 / (32*4) = 256
  local_batch_size: 4
  ckpt_every_steps: 1000
  val_every_steps: 1000
  num_epochs: 1
  max_steps: 5  # GA=256 -> each step is 256 microbatches; steady state in 1 step, a few measured steps suffice

dist_env:
  backend: nccl
  timeout_minutes: 10

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.AutoConfig.from_pretrained
    pretrained_model_name_or_path: Qwen/Qwen3-235B-A22B
  trust_remote_code: true
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: te
    linear: te
    rms_norm: te
    rope_fusion: true
    experts: gmm
    dispatcher: hybridep  # GB200/oci_hsg: deepep fails EP-buffer init ('invalid resource handle')
    fake_balanced_gate: true
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true

checkpoint:
  enabled: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy
  fp32_upcast: false

dataset:
  _target_: nemo_automodel.components.datasets.llm.mock_iterable_dataset.MockIterableDataset
  seq_len: 4096
  num_samples: 100000

dataloader:
  batch_size: null  # Dataset already yields batches
  _target_: torch.utils.data.DataLoader
  num_workers: 0

optimizer:
  _target_: torch.optim.Adam
  betas:
  - 0.9
  - 0.999
  eps: 1e-8
  lr: 0.0001
  weight_decay: 0


ci:
  time: "01:00:00"
  nodes: 8
  ep_size: 32
