# Benchmarking config for Qwen3 MoE 235B (A22B) with MXFP8 expert GEMMs via
# TransformerEngine, tuned for GB200.
#
# Delta vs qwen3_moe_235b_te_deepep_gb200.yaml (the BF16 baseline) — three lines:
#   - backend.experts: gmm -> te          (TE GroupedLinear expert GEMMs)
#   - backend.te_fp8.recipe: mxfp8         (TE MXFP8BlockScaling on the expert GEMMs)
#   - optimizer.foreach: false             (at ep==world the experts=te params stay
#       plain Tensors while the rest is DTensor; per-param Adam avoids the
#       "_foreach_lerp_ got mixed torch.Tensor and DTensor" optimizer error)
# Everything else identical for an apples-to-apples comparison.
#
# Parallelism: ep_size=32 (==world=32), tp=pp=cp=1, dp=32, 8 nodes x 4 GB200.
# GA = GBS / (world*lbs) = 32768 / (32*4) = 256. warmup=2 + max_steps=5: each step
# is 256 microbatches so MFU is steady within the first step.

recipe: BenchmarkingRecipeForNextTokenPrediction

seed: 1234

benchmark:
  warmup_steps: 2
  peak_tflops: 5000  # GB200 MXFP8/FP8 dense peak TFLOPs
  nsys_start: -1
  nsys_end: -1
  nsys_ranks: []
  num_nodes: 8

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 32

  sequence_parallel: false
  activation_checkpointing: true

step_scheduler:
  gc_every_steps: 10
  global_batch_size: 32768  # GA = GBS / (world*lbs) = 32768 / (32*4) = 256
  local_batch_size: 4
  ckpt_every_steps: 1000
  val_every_steps: 1000
  num_epochs: 1
  max_steps: 5  # GA=256 -> each step is 256 microbatches; a few measured steps suffice

dist_env:
  backend: nccl
  timeout_minutes: 10

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.AutoConfig.from_pretrained
    pretrained_model_name_or_path: Qwen/Qwen3-235B-A22B
  trust_remote_code: true
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: te
    linear: te
    rms_norm: te
    rope_fusion: true
    experts: te
    dispatcher: hybridep  # GB200/oci_hsg: deepep fails EP-buffer init ('invalid resource handle')
    fake_balanced_gate: true
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true
    te_fp8:
      recipe: mxfp8

checkpoint:
  enabled: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy
  fp32_upcast: false

dataset:
  _target_: nemo_automodel.components.datasets.llm.mock_iterable_dataset.MockIterableDataset
  seq_len: 4096
  num_samples: 100000

dataloader:
  batch_size: null  # Dataset already yields batches
  _target_: torch.utils.data.DataLoader
  num_workers: 0

optimizer:
  _target_: torch.optim.Adam
  betas:
  - 0.9
  - 0.999
  eps: 1e-8
  lr: 0.0001
  weight_decay: 0
  foreach: false


ci:
  time: "01:00:00"
  nodes: 8
  ep_size: 32
