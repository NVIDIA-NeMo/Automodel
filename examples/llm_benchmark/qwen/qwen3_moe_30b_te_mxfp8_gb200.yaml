# Benchmarking config for Qwen3 MoE 30B (A3B) with MXFP8 expert GEMMs via
# TransformerEngine, tuned for GB200. Head-to-head vs the torchao MXFP8 path
# (qwen3_moe_30b_te_deepep_mxfp8_gb200.yaml, experts=torch_mm_mxfp8).
#
# Delta vs qwen3_moe_30b_te_deepep_gb200.yaml (bf16, experts=gmm):
#   - model.backend.experts: gmm -> te
#     Uses TE's GroupedLinear expert GEMMs (GroupedExpertsTE), native FP8 support.
#   - model.backend.te_fp8.recipe: mxfp8
#     Enables TE's MXFP8BlockScaling recipe for the expert GEMMs.
#
# Qwen3-MoE has expert_bias=False, so (unlike gpt-oss) there is no 1D-bias FSDP
# sharding edge case and no bias-induced backward NaN — this is a clean perf
# comparison of the TE grouped-GEMM MXFP8 path vs torchao's. torchao works for qwen
# (no bias) at lbs=16 ~9.122 s/iter, 26.44% MFU; bf16 (gmm/torch_mm) ~9.371 s.
#
# The te_fp8 autocast wraps the forward at train_ft._forward_backward_step (fp8_ctx),
# reused by the BenchmarkingRecipe. attn/linear/rms_norm stay TE bf16.
#
# Parallelism: ep_size=8, tp=pp=cp=1, dp_size=8 (world=8), 2 nodes x 4 GB200.

recipe: BenchmarkingRecipeForNextTokenPrediction

seed: 1234

benchmark:
  warmup_steps: 10
  peak_tflops: 2500  # GB200 BF16 dense peak TFLOPs
  nsys_start: -1
  nsys_end: -1
  nsys_ranks: []
  num_nodes: 2

step_scheduler:
  gc_every_steps: 10
  global_batch_size: 512
  local_batch_size: 8
  ckpt_every_steps: 1000
  val_every_steps: 1000
  num_epochs: 1
  max_steps: 30

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 8

  sequence_parallel: false
  activation_checkpointing: true

  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 2
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false
    layers_per_stage: 2

dist_env:
  backend: nccl
  timeout_minutes: 10

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.AutoConfig.from_pretrained
    pretrained_model_name_or_path: Qwen/Qwen3-30B-A3B
  trust_remote_code: true
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: te
    linear: te
    rms_norm: te
    rope_fusion: true
    experts: te
    dispatcher: hybridep  # GB200: deepep fails EP-buffer init ('invalid resource handle')
    fake_balanced_gate: true
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true
    te_fp8:
      recipe: mxfp8

checkpoint:
  enabled: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy
  fp32_upcast: false

dataset:
  _target_: nemo_automodel.components.datasets.llm.mock_iterable_dataset.MockIterableDataset
  seq_len: 4096
  num_samples: 100000

dataloader:
  batch_size: null  # Dataset already yields batches
  _target_: torch.utils.data.DataLoader
  num_workers: 0

optimizer:
  _target_: torch.optim.Adam
  betas:
  - 0.9
  - 0.999
  eps: 1e-8
  lr: 0.0001
  weight_decay: 0


ci:
  time: "00:40:00"
  nodes: 2
  ep_size: 8
