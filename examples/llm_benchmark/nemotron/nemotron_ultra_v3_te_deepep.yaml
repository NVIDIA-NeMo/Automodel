# Nemotron-3-Ultra-550B-A55B throughput benchmark (16 nodes / 128x H100, EP=64):
# torch_mm experts, balanced gate, EP=64, local batch size 2, seq 4096, activation checkpointing,
# fused linear cross-entropy, and the repeated MTP head (num_nextn_predict_layers=2 +
# mtp_use_repeated_layer=true; one physical MTP layer reused across both depths). Run via the
# recipe (nemo_automodel/recipes/llm/benchmark.py) to get MFU / TFLOPs.
#
# Launch (16-node Slurm alloc), one task/node:
#   MASTER_ADDR=$(scontrol show hostnames "$SLURM_JOB_NODELIST" | head -1)
#   srun --ntasks-per-node=1 --nodes=16 bash -c '
#     torchrun --nnodes=16 --nproc-per-node=8 --rdzv-backend=c10d \
#       --rdzv-endpoint="$MASTER_ADDR":29500 --node-rank=$SLURM_NODEID \
#       nemo_automodel/recipes/llm/benchmark.py \
#       -c examples/llm_benchmark/nemotron/nemotron_ultra_v3_te_deepep.yaml'

recipe: BenchmarkingRecipeForNextTokenPrediction

seed: 1234

benchmark:
  warmup_steps: 10
  peak_tflops: 989  # H100 dense bf16 peak TFLOPs
  nsys_start: -1
  nsys_end: -1
  nsys_ranks: []
  num_nodes: 16

step_scheduler:
  gc_every_steps: 10
  global_batch_size: 256  # local_batch_size(2) * dp_size(128) -> 1 microbatch/GPU/step (no grad accum)
  local_batch_size: 2
  ckpt_every_steps: 1000
  val_every_steps: 1000
  num_epochs: 1
  max_steps: 30

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 64
  activation_checkpointing: true
  moe:
    reshard_after_forward: true
    wrap_outer_model: false

dist_env:
  backend: nccl
  timeout_minutes: 30

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.AutoConfig.from_pretrained
    pretrained_model_name_or_path: nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-BF16  # pragma: allowlist secret
    trust_remote_code: true
  trust_remote_code: true
  # MTP head predicts the next 2 tokens; mtp_use_repeated_layer reuses ONE physical layer
  # across both depths (weight-tied). Block pattern auto-resolves from Ultra's
  # mtp_layers_block_type = ["attention", "moe"].
  num_nextn_predict_layers: 2
  mtp_use_repeated_layer: true
  mtp_loss_scaling_factor: 0.1
  output_hidden_states: true
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: te
    linear: te
    rms_norm: te
    experts: torch_mm
    dispatcher: hybridep
    fake_balanced_gate: true
    enable_fsdp_optimizations: false

checkpoint:
  enabled: false

loss_fn:
  _target_: nemo_automodel.components.loss.linear_ce.FusedLinearCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.mock_iterable_dataset.MockIterableDataset
  seq_len: 4096
  num_samples: 100000

dataloader:
  batch_size: null  # Dataset already yields batches
  _target_: torch.utils.data.DataLoader
  num_workers: 0

optimizer:
  _target_: torch.optim.Adam
  betas:
  - 0.9
  - 0.999
  eps: 1e-8
  lr: 0.0001
  weight_decay: 0

ci:
  time: "00:30:00"
  nodes: 16
