# Mock-data variant of the established GLM-5.2 32K CP8 recipe. Run on 64 H100
# nodes; the launcher overrides backend.attn with tilelang or cudnn.

recipe: TrainFinetuneRecipeForNextTokenPrediction
seed: 1234

step_scheduler:
  global_batch_size: 64
  local_batch_size: 4
  ckpt_every_steps: 100000
  val_every_steps: 100000
  log_remote_every_steps: 1
  gc_every_steps: 10
  num_epochs: 8
  max_steps: 100

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 8
  pp_size: 4
  ep_size: 64
  sequence_parallel: false
  activation_checkpointing: true
  reshard_after_forward: true

  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 1
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false
    layers_per_stage: 2
    pp_seq_len: 32768

  moe:
    reshard_after_forward: true
    wrap_outer_model: false
    ignore_router_for_ac: true

dist_env:
  backend: nccl
  timeout_minutes: 30

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: zai-org/GLM-5.2
  config:
    head_dim: 64
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: tilelang
    linear: torch
    rms_norm: torch_fp32
    rope_fusion: false
    dispatcher: hybridep
    gate_precision: float32
    fake_balanced_gate: false
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true

checkpoint:
  enabled: false
  dequantize_base_checkpoint: true

loss_fn:
  _target_: nemo_automodel.components.loss.chunked_ce.ChunkedCrossEntropy
  chunk_len: 256

dataset:
  _target_: nemo_automodel.components.datasets.llm.mock_iterable_dataset.MockIterableDataset
  vocab_size: 154880
  seq_len: 32768
  num_samples: 100000
  batch_size: 4
  seed: 1234
  tokenizer: null

packed_sequence:
  packed_sequence_size: 32768
  prepacked: true

dataloader:
  _target_: torch.utils.data.DataLoader
  batch_size: null
  collate_fn: nemo_automodel.components.datasets.utils.packed_sequence_thd_collater
  shuffle: false
  num_workers: 0

optimizer:
  _target_: torch.optim.Adam
  betas: [0.9, 0.999]
  eps: 1e-8
  lr: 1e-5
  weight_decay: 0

wandb:
  project: huiyingl_workspace
  entity: Nemo-automodel
  name: overridden_by_launcher
  group: glm52-dsa-mock-32k-cp8-parity
  tags: [glm52, dsa, mock, 32k, cp8, parity]
  mode: online
  resume: never
