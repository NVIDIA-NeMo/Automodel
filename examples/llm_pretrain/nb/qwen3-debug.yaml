# NeMo Bench source workload: qwen3-debug.yaml
# Effective source settings: module=qwen3, config=qwen3_debugmodel,
# tp=1, pp=1, cp=1, ep=1, total_gpus=8, local_batch_size=8, global_batch_size=64,
# steps=50, seq_len=4096.
#
# To run this recipe:
#   automodel examples/llm_pretrain/nb/qwen3-debug.yaml --nproc-per-node 8
# Replace the MegatronPretraining dataset paths with processed C4-compatible data before a real run.
recipe: TrainFinetuneRecipeForNextTokenPrediction
seed: 1234
step_scheduler:
  gc_every_steps: 10
  global_batch_size: 64
  local_batch_size: 8
  ckpt_every_steps: 1000
  val_every_steps: 1000
  num_epochs: 1
  max_steps: 50
distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 1
  sequence_parallel: false
  activation_checkpointing: true
  pipeline:
    pp_schedule: 1f1b
    pp_microbatch_size: 1
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false
    layers_per_stage: 2
dist_env:
  backend: nccl
  timeout_minutes: 10
model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.Qwen3Config
    architectures:
    - Qwen3ForCausalLM
    vocab_size: 2048
    hidden_size: 256
    intermediate_size: 3072
    num_hidden_layers: 8
    num_attention_heads: 16
    num_key_value_heads: 8
    head_dim: 128
    max_position_embeddings: 4096
    rms_norm_eps: 1e-6
    tie_word_embeddings: true
checkpoint:
  enabled: false
loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy
  fp32_upcast: false
dataset:
  _target_: nemo_automodel.components.datasets.llm.megatron_dataset.MegatronPretraining
  paths: /path/to/c4_test/processed_data_*_text_document*
  index_mapping_dir: /path/to/c4_test/mapping_dir
  tokenizer:
    _target_: nemo_automodel._transformers.auto_tokenizer.NeMoAutoTokenizer.from_pretrained
    pretrained_model_name_or_path: openai-community/gpt2
  seq_length: 4096
  split: 0.99, 0.01, 0.00
  splits_to_build: train
dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: torch.utils.data.default_collate
  dataloader_type: single
validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.megatron_dataset.MegatronPretraining
  paths: /path/to/c4_test/processed_data_*_text_document*
  index_mapping_dir: /path/to/c4_test/mapping_dir
  tokenizer:
    _target_: nemo_automodel._transformers.auto_tokenizer.NeMoAutoTokenizer.from_pretrained
    pretrained_model_name_or_path: openai-community/gpt2
  seq_length: 4096
  split: 0.99, 0.01, 0.00
  splits_to_build: validation
  num_val_samples: 1024
validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: torch.utils.data.default_collate
  dataloader_type: single
optimizer:
  _target_: torch.optim.AdamW
  lr: 0.0008
  betas:
  - 0.9
  - 0.95
  eps: 1e-8
  weight_decay: 0.1
