recipe: TrainEagle3Recipe

dist_env:
  backend: nccl
  timeout_minutes: 30

recipe_args:
  target_model_name_or_path: Qwen/Qwen3-8B
  draft_attn_implementation: flash_attention_2
  train_data_path: ./cache/dataset/perfectblend-qwen3-8b-regen-messages
  val_data_path: null
  train_split: "train[:50]"
  val_split: null
  output_dir: ./outputs/eagle3_qwen3_8b_fp8
  seq_length: 4096
  micro_batch_size: 1
  grad_accumulation_steps: 1
  num_workers: 0
  num_epochs: 1
  ttt_steps: 7
  draft_vocab_size: 32000
  freeze_embeddings: true
  trust_remote_code: false
  shuffle_seed: 42
  log_every_steps: 10
  max_grad_norm: 1.0
  packed_sequence_size: 4096

# Torchao FP8 draft training (same surface as the SFT recipes' `fp8:` block).
# The draft's nn.Linear layers are swapped to Float8Linear; forward/backward
# GEMMs run in fp8 on SM89+ GPUs (H100 or newer). The frozen target is NOT
# converted. Linears with any weight dim not divisible by 16 are skipped
# automatically. Set `emulate: true` to smoke-test on pre-Hopper GPUs
# (numerics only, no speedup).
fp8:
  enabled: true
  recipe_name: tensorwise
  filter_fqns: ["lm_head"]
  emulate: false

# torch.compile of the draft (same surface as the SFT recipes' `compile:`
# block). Strongly recommended together with `fp8:`: the Float8Linear
# cast/scale ops only pay off once inductor fuses them into the GEMM
# prologue, and eager-mode fp8 is typically SLOWER than bf16.
compile:
  enabled: true
  mode: default

optimizer:
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0

checkpoint:
  enabled: true
  checkpoint_dir: ./outputs/eagle3_qwen3_8b_fp8/checkpoints
  model_save_format: safetensors
  save_consolidated: true
