recipe: TrainEagle3Recipe

# Co-located EAGLE-3 training with the frozen target served through vLLM.
#
# Identical to the co-located MVP config (llama_eagle3_mvp.yaml) except the
# target forward runs through vLLM (via its native ``extract_hidden_states``
# speculative method) instead of the HuggingFace eager forward. vLLM carves its
# weight + KV pool out of the training GPU up front
# (``vllm_args.gpu_memory_utilization``); the draft trains in the remainder.
#
# Single-process only: vLLM owns its own engine process group. For multi-GPU
# runs serve the target separately (``serve_target --engine vllm``) and use
# llama_eagle3_remote.yaml.
#
# vLLM is not a NeMo-AutoModel dependency; install it out of band in a dedicated
# environment on the server (``uv pip install vllm==0.23.0``).

dist_env:
  backend: nccl
  timeout_minutes: 30

recipe_args:
  target_model_name_or_path: meta-llama/Llama-3.2-1B

  # --- vllm backend ---
  # ``colocated`` (default) runs the target through HF on this GPU; ``sglang``
  # runs it through SGLang; ``vllm`` runs it through vLLM on this GPU; ``remote``
  # talks to serve_target.
  target_model_backend: vllm
  # Extra vLLM engine kwargs forwarded to ``vllm.LLM``.
  # ``gpu_memory_utilization`` is the fraction of GPU memory vLLM reserves for
  # target weights + KV pool (default 0.5 here; raise it for big targets, lower
  # it if draft training runs out of memory).
  vllm_args:
    gpu_memory_utilization: 0.5

  train_data_path: /path/to/train.jsonl
  val_data_path: null
  train_split: null
  val_split: null
  output_dir: ./outputs/eagle3_llama_vllm
  seq_length: 1024
  micro_batch_size: 1
  grad_accumulation_steps: 1
  num_workers: 0
  num_epochs: 1
  ttt_steps: 4
  draft_vocab_size: 8192
  freeze_embeddings: true
  trust_remote_code: false
  shuffle_seed: 42
  log_every_steps: 10
  max_grad_norm: 1.0

optimizer:
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0

checkpoint:
  enabled: true
  checkpoint_dir: ./outputs/eagle3_llama_vllm/checkpoints
  model_save_format: safetensors
  save_consolidated: true
