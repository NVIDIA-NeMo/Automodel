recipe: TrainEagle3Recipe

# EAGLE-3 draft training against a Gemma4 target (26B-A4B-it, MoE).
#
# Gemma4 ships as a multimodal ``Gemma4ForConditionalGeneration`` whose text
# decoder config is nested under ``config.text_config``; the EAGLE-3 draft is
# built from that inner text config automatically (via ``config.get_text_config()``).
# See ``gemma4_e2b_eagle3.yaml`` for the Gemma-specific ``target_force_hf`` /
# flattened-RoPE notes.
#
# MoE target: the draft consumes only the post-block hidden states emitted by the
# frozen target's decoder layers, so an MoE backbone (128 experts here) is hooked
# and supervised identically to a dense target -- the draft never sees the router
# or per-expert internals. The frozen 26B target (~48 GiB bf16) plus the draft
# (hidden 2816, ~0.9B params) fits on a single 80 GB GPU with
# ``freeze_embeddings: true`` and ``PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True``.

dist_env:
  backend: nccl
  timeout_minutes: 30

recipe_args:
  target_model_name_or_path: google/gemma-4-26B-A4B-it
  target_force_hf: true
  # Gemma4 interleaves sliding-window and full attention; sdpa handles both
  # masks cleanly for the frozen target.
  target_attn_implementation: sdpa
  draft_attn_implementation: flash_attention_2
  train_data_path: ./cache/dataset/perfectblend-gemma4-26b-a4b-regen-messages
  val_data_path: null
  train_split: "train[:50]"
  val_split: null
  output_dir: ./outputs/eagle3_gemma4_26b_a4b
  seq_length: 2048
  micro_batch_size: 1
  grad_accumulation_steps: 1
  num_workers: 0
  num_epochs: 1
  ttt_steps: 7
  # Gemma4 has a 262k vocab; compress the draft head to the most frequent 32k
  # target ids (d2t/t2d remap tables are serialized into the checkpoint).
  draft_vocab_size: 32000
  # Keep the copied 262k-vocab embedding frozen so it carries no optimizer state.
  freeze_embeddings: true
  trust_remote_code: false
  shuffle_seed: 42
  log_every_steps: 10
  max_grad_norm: 1.0
  packed_sequence_size: 0

optimizer:
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0

checkpoint:
  enabled: true
  checkpoint_dir: ./outputs/eagle3_gemma4_26b_a4b/checkpoints
  model_save_format: safetensors
  save_consolidated: true
