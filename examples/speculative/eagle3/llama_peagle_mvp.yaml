recipe: TrainEagle3Recipe

# P-EAGLE (parallel-drafting EAGLE-3) MVP recipe. Trains the same Llama-style
# EAGLE-3 draft as ``llama_eagle3_mvp_flash_attn.yaml`` but in *parallel
# drafting* mode: instead of EAGLE-3's autoregressive test-time-training
# unroll, the draft learns to predict all ``num_draft_tokens`` tokens in a
# single forward, conditioning the masked multi-token-prediction depths on a
# learnable ``mask_hidden`` placeholder and the reserved ``ptd_token_id`` token
# (https://arxiv.org/abs/2602.01469).
#
# IMPORTANT -- inference runtime. As of this writing P-EAGLE inference is only
# implemented in vLLM (>= 0.16, via https://github.com/vllm-project/vllm/pull/32887,
# enabled with ``--speculative-config '{..., "parallel_drafting": true}'``).
# SGLang support is tracked upstream in
# https://github.com/sgl-project/sglang/issues/23171 but is not yet merged, so
# the ``serve_sglang`` entry point CANNOT serve a P-EAGLE head today. The
# checkpoint this recipe produces is written in vLLM's expected layout: the
# learnable ``mask_hidden`` tensor is saved under the key ``mask_hidden`` and
# ``ptd_token_id`` is written into the draft ``config.json``, so vLLM loads it
# unchanged. Training and the on-disk format are validated by CPU unit tests;
# the acceptance-length / speedup numbers can only be measured by running the
# head under vLLM on a GPU.

dist_env:
  backend: nccl
  timeout_minutes: 30

recipe_args:
  target_model_name_or_path: meta-llama/Llama-3.2-1B
  # Each row must follow the OpenAI chat schema -- a ``messages`` list of
  # ``{role, content}`` entries (see ``llama_eagle3_mvp_flash_attn.yaml``).
  train_data_path: /path/to/train.jsonl
  val_data_path: null
  train_split: null
  val_split: null
  output_dir: ./outputs/llama_peagle_mvp
  seq_length: 1024
  micro_batch_size: 1
  grad_accumulation_steps: 1
  num_workers: 0
  num_epochs: 1
  draft_vocab_size: 8192
  freeze_embeddings: true
  trust_remote_code: false
  shuffle_seed: 42
  log_every_steps: 10
  max_grad_norm: 1.0

  # ----------------------------------------------------------------------
  # P-EAGLE knobs.
  #
  # ``parallel_drafting: true`` switches the recipe from the EAGLE-3 TTT
  # trainer to the parallel-drafting trainer and registers the learnable
  # ``mask_hidden`` placeholder on the draft.
  #
  # ``num_draft_tokens`` is K -- the number of tokens the draft predicts in
  # one forward (P-EAGLE's analogue of ``ttt_steps``). It must match the
  # vLLM ``num_speculative_tokens`` used at inference.
  #
  # ``ptd_token_id`` is the reserved token id placed at every masked
  # multi-token-prediction slot; its ``embed_tokens`` row serves as the
  # masked token embedding. It is written into the draft ``config.json`` and
  # vLLM reads it back at inference, so the value here and at serve time MUST
  # be the same. Pick a token that does not carry meaning in your data
  # (a reserved / rarely-used id). With ``freeze_embeddings: true`` (the
  # default) the masked token embedding is fixed and the learnable mask
  # capacity comes entirely from ``mask_hidden``; set ``freeze_embeddings:
  # false`` to additionally learn the masked token's embedding row.
  # ----------------------------------------------------------------------
  parallel_drafting: true
  num_draft_tokens: 4
  ptd_token_id: 0

optimizer:
  # The per-depth loss is a weighted mean (``Σ 0.8^i * L_i / Σ 0.8^i``), so LR
  # is invariant to ``num_draft_tokens`` and to the decay constant.
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
