recipe: TrainEagle3Recipe

dist_env:
  backend: nccl
  timeout_minutes: 30

recipe_args:
  target_model_name_or_path: Qwen/Qwen3-8B
  draft_attn_implementation: flash_attention_2
  train_data_path: ./cache/dataset/perfectblend-qwen3-8b-regen-messages
  val_data_path: null
  train_split: "train[:50]"
  val_split: null
  output_dir: ./outputs/eagle3_qwen3_8b_perfectblend
  seq_length: 4096
  micro_batch_size: 1
  grad_accumulation_steps: 1
  num_workers: 0
  num_epochs: 1
  ttt_steps: 7
  # lk_loss_type: null              # null (soft-CE), "alpha" (-mean(log acceptance)), or "lambda"
  #                                 # (adaptive mix: kl_weight*soft_ce + (1-kl_weight)*(1-acceptance))
  # lk_kl_scale: 1.0                # lambda only: kl_weight = lk_kl_scale * exp(-lk_kl_decay * acceptance)
  # lk_kl_decay: 3.0
  draft_vocab_size: 32000
  freeze_embeddings: true
  trust_remote_code: false
  shuffle_seed: 42
  log_every_steps: 10
  max_grad_norm: 1.0
  # mask_reasoning_content: true   # exclude <think>...</think> reasoning traces from loss

  # Sequence packing (EAGLE-3, colocated backend only). > 0 packs variable-length
  # samples into rows of this width with per-document block-causal attention,
  # removing padding waste. Set to seq_length (or larger); 0 disables.
  packed_sequence_size: 4096

  # Cache the draft-vocab token mapping. The LoRA adaptation example
  # (qwen3_eagle3_lora.yaml) warm-starts from this run and MUST train against
  # this exact mapping, so it points selected_token_ids_path at this file.
  selected_token_ids_path: ./outputs/eagle3_qwen3_8b_perfectblend/draft_token_map.pt

optimizer:
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0

checkpoint:
  enabled: true
  checkpoint_dir: ./outputs/eagle3_qwen3_8b_perfectblend/checkpoints
  model_save_format: safetensors
  save_consolidated: true
