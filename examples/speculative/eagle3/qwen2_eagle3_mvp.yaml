recipe: TrainEagle3Recipe

dist_env:
  backend: nccl
  timeout_minutes: 30

recipe_args:
  # Qwen2 dense target. The recipe accepts any Llama-style dense LLM whose
  # config exposes ``attention_bias``, ``mlp_bias``, ``rope_theta`` /
  # ``rope_scaling``, and ``rms_norm_eps`` (the draft attention reads
  # ``attention_bias`` directly, so Qwen2's Q/K/V bias is wired through
  # without any further code change).
  target_model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
  # ``train_data_path`` accepts either a HF dataset id or a local
  # ``.jsonl`` / directory of ``.jsonl`` files. Each row must follow the
  # OpenAI chat schema with a ``messages`` list of ``{role, content}``
  # entries. If your dataset ships conversations under a different key,
  # rename the column locally before pointing the recipe at it.
  train_data_path: /path/to/train.jsonl
  val_data_path: null
  train_split: null
  val_split: null
  output_dir: ./outputs/eagle3_qwen2_mvp
  seq_length: 1024
  micro_batch_size: 1
  grad_accumulation_steps: 1
  num_workers: 0
  num_epochs: 1
  ttt_steps: 4
  draft_vocab_size: 8192
  freeze_embeddings: true
  trust_remote_code: false
  shuffle_seed: 42
  log_every_steps: 10
  max_grad_norm: 1.0

optimizer:
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0

checkpoint:
  enabled: true
  checkpoint_dir: ./outputs/eagle3_qwen2_mvp/checkpoints
  model_save_format: safetensors
  save_consolidated: true
  # restore_from: LATEST  # set to "LATEST", a subdir name like "epoch_1_step_100", or an absolute path
