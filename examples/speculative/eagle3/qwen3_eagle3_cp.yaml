recipe: TrainEagle3Recipe

# EAGLE-3 with context parallelism on both the target AND the draft.
#
# CP shards the sequence across the "cp" device submesh: the frozen target's
# forward runs sharded (K/V all-gathered so attention still sees the full
# sequence), and the draft ALSO runs sharded via a differentiable ring
# attention (its TTT cache diagonals stay per-position local). Draft gradients
# are summed across cp before the optimizer step. Notes:
#   * cp_size must divide the number of GPUs; dp_size = world_size / cp_size.
#   * The target must run on SDPA (CP rewrites the causal mask), so set
#     target_attn_implementation: sdpa.
#   * seq_length must be divisible by cp_size.
#   * CP is incompatible with sequence packing -- keep packed_sequence_size: 0.
#
# Run (single node, cp_size=2 over 2 GPUs):
#   automodel examples/speculative/eagle3/qwen3_eagle3_cp.yaml \
#       --nproc-per-node 2 --distributed.cp_size=2

dist_env:
  backend: nccl
  timeout_minutes: 30

recipe_args:
  target_model_name_or_path: Qwen/Qwen3-4B
  # The target must run on SDPA for CP (ring attention via DTensor dispatch).
  target_attn_implementation: sdpa
  # CP all-gathers the target's K/V through the HF SDPA path so each cp rank
  # attends across shard boundaries; this requires the HF target backend.
  target_force_hf: true
  # The draft's own attention backend (eager / flash_attention_2) for the
  # cp_size=1 path; when cp_size>1 the draft runs the differentiable ring
  # attention instead (sequence-sharded), so this is not used under CP.
  draft_attn_implementation: flash_attention_2
  train_data_path: ./cache/dataset/perfectblend-messages
  val_data_path: null
  train_split: "train[:64]"
  val_split: null
  output_dir: ./outputs/eagle3_qwen3_4b_cp
  seq_length: 2048
  micro_batch_size: 1
  grad_accumulation_steps: 1
  num_workers: 0
  num_epochs: 1
  ttt_steps: 7
  draft_vocab_size: 32000
  freeze_embeddings: true
  trust_remote_code: false
  shuffle_seed: 42
  log_every_steps: 1
  max_grad_norm: 1.0
  # CP is incompatible with sequence packing (the 4D block-causal mask), so it
  # is gated off when cp_size > 1. Keep packing disabled here.
  packed_sequence_size: 0

rng:
  seed: 42

distributed:
  strategy: fsdp2
  cp_size: 1

optimizer:
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0

checkpoint:
  enabled: false
