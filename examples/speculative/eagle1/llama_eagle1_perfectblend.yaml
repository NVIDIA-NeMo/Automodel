recipe: TrainEagle1Recipe

dist_env:
  backend: nccl
  timeout_minutes: 60

recipe_args:
  target_model_name_or_path: meta-llama/Llama-3.1-8B-Instruct

  # ``frankleeeee/PerfectBlend-Regenerated-Llama-3.1-8B-Instruct`` is
  # distributed with a ``conversations`` column, but ChatDataset expects
  # ``messages``. Before pointing the recipe at the dataset, rename the
  # column locally (one-liner shown below) and pass the rewritten
  # directory or HF dataset ID here.
  #
  #   python -c "import pandas as pd; from pathlib import Path; \
  #              src = Path('<download_dir>'); dst = Path('<output_dir>'); \
  #              dst.mkdir(parents=True, exist_ok=True); \
  #              [pd.read_parquet(f).rename(columns={'conversations': 'messages'}) \
  #               .to_parquet(dst / f.name, index=False) for f in sorted(src.glob('train-*.parquet'))]"
  train_data_path: frankleeeee/PerfectBlend-Regenerated-Llama-3.1-8B-Instruct
  val_data_path: null

  # Full PerfectBlend is ~1.42M rows. EAGLE-1 has lower compute per step
  # than EAGLE-3, so a 200k slice gives roughly an hour/epoch on 8 GPUs;
  # remove this line (or set to null) to train on the full corpus.
  train_split: "train[:200000]"
  val_split: null

  output_dir: ./outputs/eagle1_llama_perfectblend

  seq_length: 2048

  # 8 GPUs * micro_batch=1 * grad_accum=4 -> effective batch 32.
  micro_batch_size: 1
  grad_accumulation_steps: 4
  num_workers: 4

  num_epochs: 1
  draft_num_hidden_layers: 1
  hidden_loss_weight: 1.0
  token_loss_weight: 0.1
  freeze_embeddings: true

  trust_remote_code: false
  shuffle_seed: 42
  log_every_steps: 20
  max_grad_norm: 1.0

optimizer:
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0

checkpoint:
  enabled: true
  checkpoint_dir: ./outputs/eagle1_llama_perfectblend/checkpoints
  model_save_format: safetensors
  save_consolidated: true
  # restore_from: LATEST  # set to "LATEST", a subdir name like "epoch_1_step_100", or an absolute path
