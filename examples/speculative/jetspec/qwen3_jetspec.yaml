# JetSpec draft training for a Qwen3 target (online target hidden-state capture).
#
# JetSpec (arXiv:2606.18394) reuses the DFlash parallel draft backbone but trains
# it as a *causal* parallel tree drafter: in-block attention is causal (each branch
# is conditioned on its own prefix, mirroring the target's autoregressive order),
# and the draft is distilled against the target's per-position soft distribution
# with a temperature-scaled forward-KL loss instead of DFlash's hard-label CE.
#
# IMPORTANT: regenerate the training responses with the target model before
# training -- training teacher-forces ground-truth tokens while inference is
# autoregressive, and the distribution mismatch hurts acceptance length otherwise.

recipe: TrainJetSpecRecipe

dist_env:
  backend: nccl
  timeout_minutes: 30

recipe_args:
  target_model_name_or_path: Qwen/Qwen3-8B
  train_data_path: /path/to/perfectblend_qwen3-8b_regen.jsonl   # regenerate responses with the target model first
  val_data_path: null
  output_dir: ./outputs/jetspec_qwen3_8b
  seq_length: 3072
  micro_batch_size: 2
  grad_accumulation_steps: 1
  num_workers: 4
  num_epochs: 6

  # --- DFlash backbone (shared with the DFlash recipe) ---
  draft_num_hidden_layers: 5          # depth of the draft transformer stack
  block_size: 16                      # tokens drafted in parallel per block (= max tree depth)
  num_anchors: 256                    # blocks sampled per sequence per step
  mask_token_id: 151669               # REQUIRED: token used for non-anchor block positions.
  #                                   # Pick a reserved / unused token id (do NOT rely on pad:
  #                                   # pad often aliases eos, which silently degrades quality).
  # target_layer_ids: [1, 9, 17, 25, 33]   # target layers captured as draft context
  attention_backend: flex_attention   # "flex_attention" (GPU main path) or "sdpa" (portable fallback)

  # --- JetSpec forward-KL distillation (paper Eq. 8-9) ---
  kd_temperature: 1.0                 # softmax temperature for KL(P_target || Q_draft); loss is T^2-scaled
  kd_chunk_size: 0                    # >0 processes valid positions in chunks to cap the fp32 prob-matrix
  #                                   # memory (raise num_anchors/block_size -> set e.g. 1024 to avoid OOM)

  trust_remote_code: false
  # target_attn_implementation: sdpa   # frozen target's attention backend (unset = HF auto-select)
  shuffle_seed: 42
  log_every_steps: 10
  max_grad_norm: 1.0
  # mask_reasoning_content: true   # exclude <think>...</think> reasoning traces from loss

  # --- checkpoint cadence (independent; the fully-trained model is always saved) ---
  # ckpt_every_steps: 2000            # also save every N optimizer steps
  # save_checkpoint_every_epoch: false

optimizer:
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_ratio: 0.04
  min_lr_ratio: 0.1

checkpoint:
  enabled: true
  checkpoint_dir: ./outputs/jetspec_qwen3_8b/checkpoints
  model_save_format: safetensors
  save_consolidated: true
  # restore_from: LATEST  # "LATEST", a subdir like "epoch_1_step_1000", or an absolute path
