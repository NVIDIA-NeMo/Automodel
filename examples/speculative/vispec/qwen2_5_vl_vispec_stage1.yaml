# ViSpec stage 1 for Qwen2.5-VL: text-only EAGLE draft training.
#
# This freezes Qwen2.5-VL as the teacher but only passes text conversations to
# it. It does not fine-tune the target VLM. The final consolidated checkpoint
# initializes qwen2_5_vl_vispec.yaml for stage 2.

recipe: TrainVispecStage1Recipe

dist_env:
  backend: nccl
  timeout_minutes: 30

recipe_args:
  target_model_name_or_path: Qwen/Qwen2.5-VL-7B-Instruct
  # This must contain responses regenerated by the same target VLM. The
  # existing EAGLE text regeneration pipeline writes a compatible messages
  # dataset that build_eagle3_dataloader reads directly.
  train_data_path: /data/datasets/vispec_qwen2_5_vl/stage1
  val_data_path: null
  output_dir: /data/runs/vispec_qwen2_5_vl_stage1
  seq_length: 4096
  micro_batch_size: 1
  grad_accumulation_steps: 8
  num_workers: 4
  num_epochs: 10
  draft_num_hidden_layers: 1
  hidden_loss_weight: 1.0
  token_loss_weight: 0.1
  feature_noise: 0.1
  # ViSpec's stage 1 is EAGLE plus a ListMLE ranking term over the target's
  # top-k. The reference optimizes v_w * vloss + p_w * (ploss + 0.1 * rloss)
  # with v_w=1.0 and p_w=0.1, so the ranking term carries an effective weight of
  # 0.01. Stage 2 leans on that ranking ability heavily, so a stage 1 trained
  # without it starts stage 2 with a much larger rank_loss to work off.
  rank_loss_weight: 0.01
  rank_loss_topk: 10
  freeze_embeddings: true
  target_force_hf: true
  trust_remote_code: false
  seed: 42
  shuffle_seed: 42
  log_every_steps: 10
  max_grad_norm: 1.0

optimizer:
  lr: 3.0e-5
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_ratio: 0.05
  min_lr_ratio: 0.1

checkpoint:
  enabled: true
  checkpoint_dir: /data/runs/vispec_qwen2_5_vl_stage1/checkpoints
  model_save_format: safetensors
  save_consolidated: final
