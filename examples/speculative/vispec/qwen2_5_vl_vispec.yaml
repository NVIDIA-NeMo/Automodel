# ViSpec (arXiv:2509.15235) stage-2 draft training for a Qwen2.5-VL target.
#
# ---------------------------------------------------------------------------
# RUN STAGE 1 FIRST.
# ---------------------------------------------------------------------------
# ViSpec is a two-stage recipe. Stage 1 uses TrainVispecStage1Recipe on a
# text-only corpus. It freezes this VLM as the teacher and trains an EAGLE
# draft without vision modules. Point `recipe_args.draft_init_from` at that
# run's consolidated `model.safetensors`; the ViSpec-only modules
# (`img_adaptor`, `img_fc`) start as an identity pass-through, so step 0 here
# is numerically the stage-1 draft.
#
# ---------------------------------------------------------------------------
# THE DATA MUST BE REGENERATED BY THIS TARGET, WITH LONG ANSWERS.
# ---------------------------------------------------------------------------
# Public image-caption corpora answer in one or two sentences, which never
# exercises the long-form decoding speculative decoding exists to accelerate.
# Build the corpus with:
#
#   uv run python -m nemo_automodel.components.speculative.regenerate_vlm \
#     --model Qwen/Qwen2.5-VL-7B-Instruct \
#     --dataset liuhaotian/LLaVA-Pretrain --image-root /data/LLaVA-Pretrain \
#     --output-dir /data/vispec_stage2 --end 68000
#
# and point `dataset.path_or_dataset` at the `meta.json` it writes.
#
# ---------------------------------------------------------------------------
# micro_batch_size MUST be 1.
# ---------------------------------------------------------------------------
# The draft compresses each image span into `num_query_tokens` vectors, so its
# sequence length depends on how many image tokens that sample produced; two
# samples cannot share a padded length. The recipe rejects anything else. Scale
# the effective batch with `grad_accumulation_steps`.

recipe: TrainVispecRecipe

dist_env:
  backend: nccl
  timeout_minutes: 30

recipe_args:
  target_model_name_or_path: Qwen/Qwen2.5-VL-7B-Instruct
  draft_init_from: /llm-align/liuchonghan/runs/vispec_qwen2_5_vl_stage1/checkpoints/latest/model/model.safetensors
  output_dir: /llm-align/liuchonghan/runs/vispec_qwen2_5_vl_stage2
  # Image tokens inflate the sequence well past a text-only conversation of the
  # same turn count; 4096 matches the reference implementation's --max-len.
  seq_length: 4096
  micro_batch_size: 1
  grad_accumulation_steps: 8
  num_workers: 4
  num_epochs: 10

  draft_num_hidden_layers: 1
  # ViSpec's num_q. One compressed token is spliced back into the sequence per
  # image span and the last one becomes that span's global image feature, so
  # this must be >= 2. Inference must use the same value.
  num_query_tokens: 2
  # Self-rollout depth: after the first pass, feed the draft its own predicted
  # hidden states back this many times. The reference trains with 1.
  mtp_steps: 1
  prob_loss_weight: 10.0
  rank_loss_weight: 0.1
  rank_loss_topk: 10
  freeze_embeddings: true
  trust_remote_code: false
  seed: 42
  shuffle_seed: 42
  log_every_steps: 10
  max_grad_norm: 1.0

dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_meta_dataset
  path_or_dataset: /llm-align/liuchonghan/datasets/vispec_qwen2_5_vl/stage2/meta.json
  split: train

optimizer:
  # Stage 2 continues from a trained stage-1 draft, so it runs an order of
  # magnitude below stage 1's LR (the reference uses 3e-6 after 3e-5).
  lr: 3.0e-6
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_ratio: 0.05
  min_lr_ratio: 0.1

checkpoint:
  enabled: true
  checkpoint_dir: /llm-align/liuchonghan/runs/vispec_qwen2_5_vl_stage2/checkpoints
  model_save_format: safetensors
  save_consolidated: final
