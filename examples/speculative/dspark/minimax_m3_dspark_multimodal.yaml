# DSpark draft training for a MiniMax M3 VL target, on MULTIMODAL (image+text) data.
#
# Same draft model, method, and hardware story as `minimax_m3_dspark.yaml` -- read
# that file first. This variant differs only in `recipe_args.multimodal: true` and
# the `dataset:`/`val_dataset:` blocks below, which feed image-containing
# conversations through the target instead of plain text.
#
# ---------------------------------------------------------------------------
# DATA REQUIREMENT: every example must contain at least one image (or video).
# ---------------------------------------------------------------------------
# MiniMax M3's vision_tower is its own FSDP2-sharded unit. If a batch mixes
# text-only samples (which never call vision_tower) with image-containing
# samples (which do) across data-parallel ranks, some ranks skip the
# vision_tower's all-gather collective while others don't in the same step --
# an NCCL collective mismatch that hangs training. This is NOT enforced in
# code (would require inspecting every example up front); for v1, curate the
# dataset so every example has >= 1 image/video, or split mixed corpora into
# a text-only run (the plain `minimax_m3_dspark.yaml`) and a separate
# multimodal run.
#
# `trust_remote_code: true` is REQUIRED here (unlike the text-only yaml's
# default `false`): MiniMax M3's processor needs the model's remote code to
# load `MiniMaxVLProcessor`.
#
# `dataset:`/`val_dataset:` follow the same `_target_` convention as the
# validated VLM SFT yaml (`examples/vlm_finetune/minimax_m3/minimax_m3_vl_sft_ep32pp4.yaml`):
# any function under `nemo_automodel.components.datasets.vlm.datasets` that
# returns `{"conversation": [...]}` examples works here (`make_medpix_dataset`,
# `make_llava_onevision_dataset`, `make_unimm_chat_dataset`, `make_meta_dataset`
# for a local ShareGPT-style JSON/JSONL corpus, ...). Regenerate responses with
# the target model first, same as the text-only recipe's data requirement.

recipe: TrainDSparkRecipe

dist_env:
  backend: nccl
  timeout_minutes: 30

distributed:
  strategy: fsdp2
  defer_fsdp_grad_sync: true
  tp_size: 1
  cp_size: 1
  pp_size: 1                 # keep PP off: the DSpark target wrapper hooks a single (non-pipelined) model
  ep_size: 64                 # = world_size (8 nodes x 8). Must divide n_routed_experts (128); 128/64 = 2 experts/rank
  activation_checkpointing: false

recipe_args:
  target_model_name_or_path: MiniMaxAI/MiniMax-M3
  multimodal: true
  output_dir: ./outputs/dspark_minimax_m3_multimodal
  # Image tokens inflate the per-sample sequence length well beyond a
  # text-only conversation of the same turn count; keep micro_batch_size at 1
  # even more strictly than the text-only yaml.
  seq_length: 4096
  micro_batch_size: 1
  grad_accumulation_steps: 8
  num_workers: 4
  num_epochs: 10

  draft_num_hidden_layers: 5
  block_size: 7
  num_anchors: 512
  mask_token_id: 128799            # a reserved, in-vocab (vocab_size=200064) token id for non-anchor block positions
  target_layer_ids: [10, 22, 34, 46, 58]  # 5 feature layers across the 60-layer M3 target
  freeze_embeddings: true
  attention_backend: flex_attention  # draft attention (block mask); requires flex

  markov_rank: 256
  markov_head_type: vanilla

  confidence_head_alpha: 1.0
  confidence_head_with_markov: true

  ce_loss_alpha: 0.1
  l1_loss_alpha: 0.9
  loss_decay_gamma: 4.0

  trust_remote_code: true
  shuffle_seed: 42
  log_every_steps: 10
  max_grad_norm: 1.0

dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_medpix_dataset
  path_or_dataset: /path/to/regenerated_image_conversations   # regenerate responses with the target first
  split: train

val_dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_medpix_dataset
  path_or_dataset: /path/to/regenerated_image_conversations
  split: validation[:256]

optimizer:
  lr: 6.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_ratio: 0.04
  min_lr_ratio: 0.1

checkpoint:
  enabled: true
  checkpoint_dir: ./outputs/dspark_minimax_m3_multimodal/checkpoints
  model_save_format: safetensors
  save_consolidated: final
