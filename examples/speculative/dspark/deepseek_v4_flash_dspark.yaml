# DSpark draft training for a DeepSeek-V4-Flash target (online hidden-state capture).
#
# Same method and three-term objective as the Qwen3 / Gemma4 configs. The difference
# is the target: a full DeepSeek-V4-Flash model is loaded frozen with the V4 finetune
# recipe's distributed path (expert-parallel + FSDP2), so the 256 routed experts shard
# across ranks and the FP8 base weights dequantize on load. The draft is a small dense
# V4-attention stack (Q-LoRA, single shared K=V latent, grouped O-LoRA, partial RoPE)
# and runs the DFlash SDPA mask path (NOT flex_attention).
#
# DSpark hyperparameters follow the published DeepSeek-V4-Flash-DSpark settings
# (block_size=5, 3 late feature layers, markov_rank=256). The reserved mask token id
# 128799 is in-vocab (V4 vocab_size=129280) and must match the inference runtime.
#
# Data: prompts from Open-PerfectBlend with responses REGENERATED by the target model
# (teacher-forced training; regenerate first). Non-thinking mode.
#
# Hardware: validated target = 8x A800-SXM4-80GB. DeepSeek-V4-Flash is ~530 GiB in
# bf16; with ep_size=8 (experts sharded 256/8=32 per rank) plus FSDP2 over the same 8
# ranks for the dense params, per-rank weight memory is ~66 GiB, leaving room for
# activations and the (replicated, gathered) embed_tokens / lm_head the draft seeds
# from. It is a tight fit: if it OOMs, lower seq_length or set
# distributed.activation_checkpointing: true. ep_size MUST divide n_routed_experts (256).
#
# NOTE: NOT runtime-validated here (no GPU on the authoring machine). The draft + config
# + registry + target wrapper carry passing CPU unit tests; the full distributed target
# load and hidden-state capture across the EP/FSDP shards still need 8-GPU validation.

recipe: TrainDSparkRecipe

dist_env:
  backend: nccl
  timeout_minutes: 30

distributed:
  strategy: fsdp2
  defer_fsdp_grad_sync: true
  # The draft is data-parallel sharded over the full world; these sizes shape the
  # frozen V4 target's expert-parallel / FSDP mesh only.
  tp_size: 1
  cp_size: 1
  pp_size: 1                 # keep PP off: the DSpark target wrapper hooks a single (non-pipelined) model
  ep_size: 8                 # must divide n_routed_experts (256); 256/8 = 32 experts per rank
  activation_checkpointing: false
  moe:
    reshard_after_forward: false
    wrap_outer_model: false

recipe_args:
  target_model_name_or_path: deepseek-ai/DeepSeek-V4-Flash
  # Or a local path to a downloaded V4-Flash checkpoint:
  # target_model_name_or_path: /path/to/DeepSeek-V4-Flash
  train_data_path: /path/to/perfectblend_deepseek-v4-flash_regen.jsonl   # regenerate responses with the target first
  val_data_path: null
  output_dir: ./outputs/dspark_deepseek_v4_flash
  seq_length: 4096
  micro_batch_size: 1
  grad_accumulation_steps: 8          # effective batch scales toward the paper's 512 with more ranks
  num_workers: 4
  num_epochs: 10                      # paper trains each drafter for 10 epochs

  # --- draft backbone (parallel, dense V4 attention) ---
  draft_num_hidden_layers: 2          # small dense draft on top of the 43-layer V4 target
  block_size: 5                       # DeepSeek-V4-Flash-DSpark drafts 5 tokens per block
  num_anchors: 512                    # blocks sampled per sequence per step
  mask_token_id: 128799               # reserved V4 token id for non-anchor block positions (in-vocab; < 129280)
  target_layer_ids: [40, 41, 42]      # 3 late feature layers of the 43-layer V4 target
  freeze_embeddings: true             # draft shares + freezes the target embed_tokens and lm_head
  # The V4 draft attention is fixed to the dense SDPA mask path by the config builder,
  # so attention_backend is not used here (flex_attention is the Qwen3 / Gemma4 path).

  # --- frozen DeepSeek V4 target backend (mirrors the V4 finetune recipe) ---
  target_attn_backend: tilelang       # TileLang sparse attention + indexer + Sinkhorn kernels
  target_dispatcher: hybridep         # MoE token dispatcher for the sharded experts
  target_experts: torch_mm            # grouped-expert GEMM backend
  target_enable_fsdp_optimizations: true

  # --- serial Markov head (semi-autoregressive) ---
  markov_rank: 256
  markov_head_type: vanilla           # vanilla | gated | rnn

  # --- confidence head (scheduled verification) ---
  confidence_head_alpha: 1.0          # > 0 enables the confidence head
  confidence_head_with_markov: true

  # --- objective: L = ce_alpha * L_ce + l1_alpha * L_tv + conf_alpha * L_conf ---
  ce_loss_alpha: 0.1
  l1_loss_alpha: 0.9
  loss_decay_gamma: 4.0               # block-position loss decay: exp(-(k-1)/gamma)

  trust_remote_code: false
  shuffle_seed: 42
  log_every_steps: 10
  max_grad_norm: 1.0
  # mask_reasoning_content: true      # exclude <think>...</think> traces from loss (non-thinking data)

optimizer:
  lr: 6.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_ratio: 0.04
  min_lr_ratio: 0.1

checkpoint:
  enabled: true
  checkpoint_dir: ./outputs/dspark_deepseek_v4_flash/checkpoints
  model_save_format: safetensors
  save_consolidated: final
  # restore_from: LATEST
