# DSpark draft training for a DeepSeek-V4-Flash target (online hidden-state capture).
#
# Same method and three-term objective as the Qwen3 / Gemma4 configs. The difference
# is the target: a full DeepSeek-V4-Flash model is loaded frozen with the V4 finetune
# recipe's distributed path (expert-parallel + FSDP2), so the 256 routed experts shard
# across ranks and the FP8/FP4 base weights dequantize on load. The draft is a small
# dense V4-attention stack (Q-LoRA, single shared K=V latent, grouped O-LoRA, partial
# RoPE) and runs the DFlash SDPA mask path (NOT flex_attention).
#
# DSpark hyperparameters follow the published DeepSeek-V4-Flash-DSpark settings
# (block_size=5, 3 late feature layers, markov_rank=256). The reserved mask token id
# 128799 is in-vocab (V4 vocab_size=129280) and must match the inference runtime.
#
# Data: direct Open-PerfectBlend conversations after removing prompt-only rows.
# Responses are unchanged and therefore off-policy relative to the V4 target.
#
# ---------------------------------------------------------------------------
# HARDWARE: this needs AT LEAST 2 nodes (16 x 80GB GPUs), NOT a single 8x80GB box.
# ---------------------------------------------------------------------------
# DeepSeek-V4-Flash stores its 256 routed experts in FP4 (~0.5 byte/param), but this
# path dequantizes them to bf16 (2 byte/param) for the grouped-expert GEMM, a 4x
# expansion. The routed experts alone are ~500 GiB in bf16. Per-rank expert weight is
# therefore ~500 GiB / ep_size:
#   ep_size=8  -> ~63 GiB/rank experts + ~12 GiB replicated dense + draft/optim/acts
#                 -> ~79 GiB, which OOMs on 80 GB cards DURING THE LOAD (before the
#                    first forward), in the expert dequant -> create_dtensor_from_local
#                    move-to-CUDA. seq_length / activation_checkpointing CANNOT help:
#                    it is a resident-weight peak, not an activation peak.
#   ep_size=16 -> ~32 GiB/rank experts + ~12 GiB dense + draft/optim/acts -> ~50 GiB,
#                 fits comfortably on 80 GB. THIS IS THE DEFAULT BELOW (2 nodes).
#   ep_size=32 -> ~16 GiB/rank experts (4 nodes); more headroom for longer seq.
# ep_size MUST divide n_routed_experts (256): 8, 16, 32, 64 are all valid. Set
# ep_size == world_size (nnodes * 8). Expert parallelism is data-parallel-compatible:
# each rank forwards its own data shard and the MoE all-to-all routes tokens to the
# expert-owning ranks, so a larger ep_size only shards experts, it does not change the
# effective data batch.
#
# LAUNCH (4 nodes, ep_size=32). Run the SAME command on every node, varying only
# --node-rank; node 0 is the rendezvous master. See README_deepseek_v4_flash.md.
#   torchrun --nnodes=4 --node-rank=0 --nproc_per_node=8 \
#     --master-addr=<NODE0_IP> --master-port=29500 \
#     -m nemo_automodel.recipes.llm.train_dspark -c examples/speculative/dspark/deepseek_v4_flash_dspark.yaml
#
# To first sanity-check the whole path on ONE node in minutes, use the smoke config
# (deepseek_v4_flash_smoke.yaml), which shrinks the target to 4 layers so it fits.

recipe: TrainDSparkRecipe

dist_env:
  backend: nccl
  timeout_minutes: 30

wandb:
  enable: false            # opt-in: flip to true to log this run (needs W&B credentials)
  project: deepseek-v4-dspark
  group: perfectblend-direct
  tags: [dspark, deepseek-v4-flash, perfectblend, hybridep]

distributed:
  strategy: fsdp2
  defer_fsdp_grad_sync: true
  # The draft is data-parallel sharded over the full world; these sizes shape the
  # frozen V4 target's expert-parallel / FSDP mesh only.
  tp_size: 1
  cp_size: 1
  pp_size: 1                 # keep PP off: the DSpark target wrapper hooks a single (non-pipelined) model
  ep_size: 32                # = world_size (4 nodes x 8). Must divide n_routed_experts (256); 256/32 = 8 experts/rank
  activation_checkpointing: false
  moe:
    reshard_after_forward: false
    wrap_outer_model: false

recipe_args:
  target_model_name_or_path: deepseek-ai/DeepSeek-V4-Flash
  # Or a local path to a downloaded V4-Flash checkpoint:
  # target_model_name_or_path: /path/to/DeepSeek-V4-Flash
  # Direct, off-policy training on the original PerfectBlend responses. The local
  # Parquet cache only removes prompt-only rows; assistant text is unchanged.
  # The fixed slices are applied after a deterministic seed-42 shuffle.
  train_data_path: /lustre/fs1/portfolios/coreai/projects/coreai_dlalgo_nemofw/users/huiyingl/sd/datasets/open-perfectblend-direct-clean
  train_split: "train[4096:]"
  val_data_path: /lustre/fs1/portfolios/coreai/projects/coreai_dlalgo_nemofw/users/huiyingl/sd/datasets/open-perfectblend-direct-clean
  val_split: "train[:4096]"
  output_dir: ./outputs/dspark_deepseek_v4_flash_perfectblend
  seq_length: 4096
  micro_batch_size: 1
  grad_accumulation_steps: 16         # 1 (micro) x 32 (data-parallel ranks) x 16 = 512 effective batch (the paper's)
  num_workers: 2
  num_epochs: 10                      # paper trains each drafter for 10 epochs
  ckpt_every_steps: 500
  save_checkpoint_every_epoch: true

  # --- chat template (REQUIRED for V4-Flash) ---
  # The DeepSeek-V4-Flash tokenizer ships NO chat template, so the messages-format
  # data cannot be rendered without one. This uses V4's official non-thinking
  # chat-mode framing for the direct PerfectBlend responses; the {% generation %}
  # block marks the assistant span so only those tokens carry loss.
  chat_template: |-
    {{ bos_token }}{% for message in messages %}{% if message['role'] == 'system' %}{{ message['content'] }}{% elif message['role'] == 'user' %}{{ '<｜User｜>' + message['content'] }}{% elif message['role'] == 'assistant' %}{{ '<｜Assistant｜></think>' }}{% generation %}{{ message['content'] }}{{ eos_token }}{% endgeneration %}{% else %}{{ raise_exception('Unsupported role: ' + message['role']) }}{% endif %}{% endfor %}{% if add_generation_prompt is defined and add_generation_prompt and (messages|length == 0 or messages[-1]['role'] != 'assistant') %}{{ '<｜Assistant｜></think>' }}{% endif %}

  # --- draft backbone (parallel, dense V4 attention) ---
  draft_num_hidden_layers: 2          # small dense draft on top of the 43-layer V4 target
  block_size: 5                       # DeepSeek-V4-Flash-DSpark drafts 5 tokens per block
  num_anchors: 512                    # blocks sampled per sequence per step
  mask_token_id: 128799               # reserved V4 token id for non-anchor block positions (in-vocab; < 129280)
  target_layer_ids: [40, 41, 42]      # 3 late feature layers of the full 43-layer V4 target
  freeze_embeddings: true             # draft shares + freezes the target embed_tokens and lm_head
  # The V4 draft attention is fixed to the dense SDPA mask path by the config builder,
  # so attention_backend is not used here (flex_attention is the Qwen3 / Gemma4 path).

  # --- frozen DeepSeek V4 target backend (mirrors the V4 finetune recipe) ---
  # eager runs the model's Torch attention/indexer path: reliable everywhere and
  # correct, just slower than the fused TileLang kernels. Switch to `tilelang` for
  # speed IF your TileLang build JIT-compiles the V4 sparse/indexer/Sinkhorn kernels
  # (some versions fail with "_NestedLoopCheckVisitor has no attribute _inst").
  target_attn_backend: eager
  target_dispatcher: hybridep         # MoE token dispatcher for the sharded experts (needs DeepEP)
  target_experts: torch_mm            # grouped-expert GEMM backend
  target_enable_fsdp_optimizations: true

  # --- serial Markov head (semi-autoregressive) ---
  markov_rank: 256
  markov_head_type: vanilla           # vanilla | gated | rnn

  # --- confidence head (scheduled verification) ---
  confidence_head_alpha: 1.0          # > 0 enables the confidence head
  confidence_head_with_markov: true

  # --- objective: L = ce_alpha * L_ce + l1_alpha * L_tv + conf_alpha * L_conf ---
  ce_loss_alpha: 0.1
  l1_loss_alpha: 0.9
  loss_decay_gamma: 4.0               # block-position loss decay: exp(-(k-1)/gamma)

  trust_remote_code: false
  shuffle_seed: 42
  log_every_steps: 10
  max_grad_norm: 1.0
  # mask_reasoning_content: true      # exclude <think>...</think> traces from loss (non-thinking data)

optimizer:
  lr: 6.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_ratio: 0.04
  min_lr_ratio: 0.1

checkpoint:
  enabled: true
  checkpoint_dir: ./outputs/dspark_deepseek_v4_flash_perfectblend/checkpoints
  model_save_format: safetensors
  save_consolidated: final
  # restore_from: LATEST
