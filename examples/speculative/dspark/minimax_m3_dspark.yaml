# DSpark draft training for a MiniMax M3 VL target (online target hidden-state capture).
#
# Same method and three-term objective as the Qwen3 / Gemma4 configs. The draft is
# a small dense GQA stack (separate q/k/v/o, per-head Gemma RMSNorm, SwiGLU-OAI,
# partial RoPE) built from the target's text sub-config; it ignores M3's 128-expert
# MoE and block-sparse indexer attention entirely (target-only machinery, not the
# draft's concern -- the draft is always dense, same convention as every other
# DSpark target).
#
# Data: prompts from Open-PerfectBlend with responses REGENERATED by the target
# model (teacher-forced training; regenerate first). Non-thinking mode.
#
# ---------------------------------------------------------------------------
# HARDWARE: pp_size MUST stay 1. This needs more GPUs than you might expect.
# ---------------------------------------------------------------------------
# DSpark's target wrapper captures hidden states via forward hooks on the frozen
# target's decoder layers, which needs one non-pipelined `self.model(...)` call
# per micro-batch -- a pipeline-parallel stage only holds a slice of the layers,
# so PP is not usable here (pp_size must be 1), unlike the full VLM SFT recipe's
# validated `examples/vlm_finetune/minimax_m3/minimax_m3_vl_sft_ep32pp4.yaml`
# (pp_size=4, ep_size=32, 128 GPUs / 16 nodes).
#
# Losing the pp_size=4 factor means ep_size alone has to shard the FULL 60-layer
# stack's experts on every rank (not just one pipeline stage's ~15 layers), so
# matching that config's per-rank expert memory needs roughly
# ep_size = pp_size(4) * ep_size(32) = 128 (same total GPU count, just recomposed
# without a pipeline axis). DSpark's target is frozen and forward-only (no
# backward, no optimizer state for the ~400B-parameter target), which frees up
# real headroom compared to full SFT training, so a smaller ep_size may well fit
# -- but this has NOT been benchmarked on real hardware yet. Start at ep_size=64
# (8 nodes) below and reduce seq_length / increase ep_size if you OOM; do not
# assume this number is validated.
#
# LAUNCH (8 nodes, ep_size=64). Run the SAME command on every node, varying only
# --node-rank; node 0 is the rendezvous master.
#   torchrun --nnodes=8 --node-rank=0 --nproc_per_node=8 \
#     --master-addr=<NODE0_IP> --master-port=29500 \
#     -m nemo_automodel.recipes.llm.train_dspark -c examples/speculative/dspark/minimax_m3_dspark.yaml

recipe: TrainDSparkRecipe

dist_env:
  backend: nccl
  timeout_minutes: 30

distributed:
  strategy: fsdp2
  defer_fsdp_grad_sync: true
  tp_size: 1
  cp_size: 1
  pp_size: 1                 # keep PP off: the DSpark target wrapper hooks a single (non-pipelined) model
  ep_size: 64                 # = world_size (8 nodes x 8). Must divide n_routed_experts (128); 128/64 = 2 experts/rank
  activation_checkpointing: false

recipe_args:
  target_model_name_or_path: MiniMaxAI/MiniMax-M3
  # Or a local path to a downloaded MiniMax-M3 checkpoint:
  # target_model_name_or_path: /path/to/MiniMax-M3
  train_data_path: /path/to/perfectblend_minimax-m3_regen.jsonl   # regenerate responses with the target first
  val_data_path: null
  output_dir: ./outputs/dspark_minimax_m3
  seq_length: 4096
  micro_batch_size: 1
  grad_accumulation_steps: 8
  num_workers: 4
  num_epochs: 10

  draft_num_hidden_layers: 5
  block_size: 7
  num_anchors: 512
  mask_token_id: 128799            # a reserved, in-vocab (vocab_size=200064) token id for non-anchor block positions
  target_layer_ids: [10, 22, 34, 46, 58]  # 5 feature layers across the 60-layer M3 target
  freeze_embeddings: true
  attention_backend: flex_attention  # draft attention (block mask); requires flex

  markov_rank: 256
  markov_head_type: vanilla

  confidence_head_alpha: 1.0
  confidence_head_with_markov: true

  ce_loss_alpha: 0.1
  l1_loss_alpha: 0.9
  loss_decay_gamma: 4.0

  trust_remote_code: false
  shuffle_seed: 42
  log_every_steps: 10
  max_grad_norm: 1.0

optimizer:
  lr: 6.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_ratio: 0.04
  min_lr_ratio: 0.1

checkpoint:
  enabled: true
  checkpoint_dir: ./outputs/dspark_minimax_m3/checkpoints
  model_save_format: safetensors
  save_consolidated: final
