# DSpark draft training for a Gemma4-12B target (online target hidden-state capture).
#
# Same method and hyperparameters as the Qwen3 config; the draft is built from the
# Gemma4 target's text sub-config. Feature layers and mask token id follow the
# published Gemma4-12B DSpark settings.
#
# Data: prompts from Open-PerfectBlend with responses REGENERATED by the target
# model (teacher-forced training; regenerate first). Non-thinking mode.
#
# NOTE: requires a Gemma4 checkpoint and a transformers build with Gemma4 support;
# the draft mirrors the validated Qwen3 draft but is not runtime-validated here.

recipe: TrainDSparkRecipe

dist_env:
  backend: nccl
  timeout_minutes: 30

distributed:
  strategy: fsdp2
  defer_fsdp_grad_sync: true

recipe_args:
  target_model_name_or_path: google/gemma-4-12B-it
  train_data_path: /path/to/perfectblend_gemma4-12b_regen.jsonl   # regenerate responses with the target first
  val_data_path: null
  output_dir: ./outputs/dspark_gemma4_12b
  seq_length: 4096
  micro_batch_size: 1
  grad_accumulation_steps: 8
  num_workers: 4
  num_epochs: 10

  draft_num_hidden_layers: 5
  block_size: 7
  num_anchors: 512
  mask_token_id: 4                       # reserved Gemma4 token for non-anchor block positions
  target_layer_ids: [5, 17, 29, 41, 46]  # 5 feature layers across the Gemma4-12B target
  freeze_embeddings: true
  attention_backend: flex_attention

  markov_rank: 256
  markov_head_type: vanilla

  confidence_head_alpha: 1.0
  confidence_head_with_markov: true

  ce_loss_alpha: 0.1
  l1_loss_alpha: 0.9
  loss_decay_gamma: 4.0

  trust_remote_code: false
  shuffle_seed: 42
  log_every_steps: 10
  max_grad_norm: 1.0

optimizer:
  lr: 6.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_ratio: 0.04
  min_lr_ratio: 0.1

checkpoint:
  enabled: true
  checkpoint_dir: ./outputs/dspark_gemma4_12b/checkpoints
  model_save_format: safetensors
  save_consolidated: final
