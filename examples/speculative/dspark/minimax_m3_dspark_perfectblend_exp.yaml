# Experimental full-target MiniMax M3 DSpark training setup validated on
# 16 nodes with 8x H100 80GB per node (128 GPUs total).
#
# This setup trains directly on Open-PerfectBlend without response regeneration.
# It keeps pp_size=1 because DSpark captures hidden states from one complete target
# forward, and uses ep_size=128 so each rank owns one of MiniMax M3's 128 routed
# experts. The target remains frozen; only the five-layer dense draft is trained.
#
# Run the same command on every node, changing only --node-rank:
#   torchrun --nnodes=16 --node-rank=0 --nproc-per-node=8 \
#     --master-addr=<NODE0_IP> --master-port=29500 \
#     -m nemo_automodel.recipes.llm.train_dspark \
#     -c examples/speculative/dspark/minimax_m3_dspark_perfectblend_exp.yaml

recipe: TrainDSparkRecipe

dist_env:
  backend: nccl
  timeout_minutes: 60

distributed:
  strategy: fsdp2
  defer_fsdp_grad_sync: true
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 128
  activation_checkpointing: false
  moe:
    reshard_after_forward: false
    wrap_outer_model: true

recipe_args:
  target_model_name_or_path: MiniMaxAI/MiniMax-M3
  train_data_path: /path/to/open-perfectblend-direct-clean
  train_split: "train[4096:]"
  val_data_path: /path/to/open-perfectblend-direct-clean
  val_split: "train[:4096]"
  output_dir: ./outputs/dspark_minimax_m3_perfectblend
  seq_length: 4096
  micro_batch_size: 1
  grad_accumulation_steps: 4
  num_workers: 2
  num_epochs: 10

  draft_num_hidden_layers: 5
  block_size: 7
  num_anchors: 512
  mask_token_id: 128799
  target_layer_ids: [10, 22, 34, 46, 58]
  target_experts: torch_mm
  freeze_embeddings: true
  attention_backend: flex_attention

  markov_rank: 256
  markov_head_type: vanilla
  confidence_head_alpha: 1.0
  confidence_head_with_markov: true

  ce_loss_alpha: 0.1
  l1_loss_alpha: 0.9
  loss_decay_gamma: 4.0

  trust_remote_code: false
  shuffle_seed: 42
  log_every_steps: 1
  ckpt_every_steps: 25
  save_checkpoint_every_epoch: true
  max_grad_norm: 1.0

optimizer:
  _target_: transformer_engine.pytorch.optimizers.fused_adam.FusedAdam
  lr: 1.0e-5
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.0
  adam_w_mode: true
  bias_correction: true
  master_weights: true
  master_weight_dtype: torch.float32
  store_param_remainders: true
  exp_avg_dtype: torch.float32
  exp_avg_sq_dtype: torch.float32
  warmup_ratio: 0.0
  min_lr_ratio: 1.0

wandb:
  enable: true
  project: minimax-m3-dspark
  group: perfectblend-direct-full
  name: minimax-m3-dspark-perfectblend-full
  tags: [minimax-m3, dspark, perfectblend, full-target, ep128, hybridep, torch-mm]

checkpoint:
  enabled: true
  checkpoint_dir: ./outputs/dspark_minimax_m3_perfectblend/checkpoints
  model_save_format: safetensors
  save_consolidated: final
