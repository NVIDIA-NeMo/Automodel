# DSpark draft training for a Qwen3-0.6B target (online target hidden-state capture).
#
# DSpark is a semi-autoregressive parallel drafter: a parallel backbone produces
# every position of a block in one pass, a lightweight serial Markov head injects
# intra-block token dependency, and a confidence head predicts per-position
# acceptance probability for scheduled verification.
#
# Hyperparameters follow the published DSpark settings. The feature layers
# (target_layer_ids) are the only value adapted for the 0.6B target: the method
# uses 5 evenly spread feature layers, here mapped onto Qwen3-0.6B's 28 layers.
#
# Data: prompts from Open-PerfectBlend with responses REGENERATED by the target
# model (training is teacher-forced; the distribution mismatch with autoregressive
# inference hurts acceptance length otherwise). Non-thinking mode.
#
# NOTE: the TrainDSparkRecipe + CLI route are still being wired; this config pins
# the intended interface and the correct hyperparameters.

recipe: TrainDSparkRecipe

dist_env:
  backend: nccl
  timeout_minutes: 30

distributed:
  strategy: fsdp2            # fsdp2 (default, shards the draft per block) | ddp
  defer_fsdp_grad_sync: true

recipe_args:
  target_model_name_or_path: Qwen/Qwen3-0.6B
  train_data_path: /path/to/perfectblend_qwen3-0.6b_regen.jsonl   # regenerate responses with the target first
  val_data_path: null
  output_dir: ./outputs/dspark_qwen3_0.6b
  seq_length: 4096
  micro_batch_size: 1
  grad_accumulation_steps: 8          # effective batch scales toward the paper's 512 with more ranks
  num_workers: 4
  num_epochs: 10                      # paper trains each drafter for 10 epochs

  # --- draft backbone (parallel) ---
  draft_num_hidden_layers: 5          # paper uses 5 draft layers for DSpark
  block_size: 7                       # tokens drafted in parallel per block
  num_anchors: 512                    # blocks sampled per sequence per step
  mask_token_id: 151669               # reserved Qwen3 token id for non-anchor block positions
  target_layer_ids: [1, 7, 14, 21, 26]  # 5 feature layers spread across the 28-layer 0.6B target; 26 stays within [0, N-2] so the checkpoint is SGLang-servable (the last layer 27 has no SGLang aux capture point)
  freeze_embeddings: true             # draft shares + freezes the target embed_tokens and lm_head
  attention_backend: flex_attention   # block mask requires flex_attention (GPU)

  # --- serial Markov head (semi-autoregressive) ---
  markov_rank: 256
  markov_head_type: vanilla           # vanilla | gated | rnn

  # OFFLINE path: precompute the target supervision once, then stream it here
  # without loading/running the target model during draft training:
  #
  #   python -m nemo_automodel.components.speculative.precompute_dspark \
  #     --target-model Qwen/Qwen3-0.6B \
  #     --input-data /path/to/perfectblend_qwen3-0.6b_regen.jsonl \
  #     --output-dir /data/dspark_cache/qwen3_0.6b \
  #     --seq-length 4096 --target-layer-ids 1 7 14 21 27
  #
  # cached_target_path: /data/dspark_cache/qwen3_0.6b

  # --- confidence head (scheduled verification) ---
  confidence_head_alpha: 1.0          # > 0 enables the confidence head
  confidence_head_with_markov: true

  # --- objective: L = ce_alpha * L_ce + l1_alpha * L_tv + conf_alpha * L_conf ---
  ce_loss_alpha: 0.1
  l1_loss_alpha: 0.9
  loss_decay_gamma: 4.0               # block-position loss decay: exp(-(k-1)/gamma)

  trust_remote_code: false
  shuffle_seed: 42
  log_every_steps: 10
  max_grad_norm: 1.0
  # mask_reasoning_content: true      # exclude <think>...</think> traces from loss (non-thinking data)

optimizer:
  lr: 6.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_ratio: 0.04
  min_lr_ratio: 0.1

checkpoint:
  enabled: true
  checkpoint_dir: ./outputs/dspark_qwen3_0.6b/checkpoints
  model_save_format: safetensors
  save_consolidated: final
  # restore_from: LATEST
