# DFlash draft training for a Qwen3 target (online target hidden-state capture).
#
# DFlash drafts a whole block of tokens in parallel via MASK-token denoising
# conditioned on the frozen target's hidden states. Hyperparameters below follow
# the SpecForge Qwen3-8B DFlash demo (sgl-project/SpecForge#465).
#
# IMPORTANT: regenerate the training responses with the target model before
# training -- training uses teacher forcing on ground-truth tokens while
# inference is autoregressive, and the distribution mismatch hurts acceptance
# length otherwise.

recipe: TrainDFlashRecipe

dist_env:
  backend: nccl
  timeout_minutes: 30

recipe_args:
  target_model_name_or_path: Qwen/Qwen3-8B
  train_data_path: /path/to/perfectblend_qwen3-8b_regen.jsonl   # regenerate responses with the target model first
  val_data_path: null
  output_dir: ./outputs/dflash_qwen3_8b
  seq_length: 3072
  micro_batch_size: 4
  grad_accumulation_steps: 1
  num_workers: 4
  num_epochs: 6

  # --- DFlash-specific ---
  draft_num_hidden_layers: 5          # depth of the draft transformer stack
  block_size: 16                      # tokens drafted in parallel per block
  num_anchors: 512                    # blocks sampled per sequence per step
  loss_decay_gamma: 7.0               # block-position loss decay: exp(-(k-1)/gamma)
  # loss_type: dflash                 # "dflash" (fixed anchor), a D-PACE variant ("dpace",
  #                                   # "dpace-cumulative-confidence-only", "dpace-continuation-value-only":
  #                                   # same block, CE reweighted by the draft's own confidence), or
  #                                   # "variable_prefix" (D2SD VP-Drafter: per-block visible prefix sampled
  #                                   # ~ prefix_weight_base**l, only the masked suffix is supervised, decay
  #                                   # re-anchored at the prefix)
  # dpace_alpha: 0.5                  # smoothing alpha for the D-PACE confidence products
  # prefix_weight_base: 0.9           # truncated-geometric prior base for variable_prefix (<1 favors short)
  mask_token_id: 151669               # REQUIRED: token used for non-anchor block positions.
  #                                   # Pick a reserved / unused token id (do NOT rely on pad:
  #                                   # pad often aliases eos, which silently degrades quality).
  # target_layer_ids: [1, 9, 17, 25, 33]   # target layers captured as draft context
  #                                   # (defaults to an even spread across the target)
  attention_backend: flex_attention   # "flex_attention" (GPU main path) or "sdpa" (portable fallback)

  trust_remote_code: false
  # target_attn_implementation: sdpa   # frozen target's attention backend (unset = HF auto-select)
  shuffle_seed: 42
  log_every_steps: 10
  max_grad_norm: 1.0
  # mask_reasoning_content: true   # exclude <think>...</think> reasoning traces from loss

  # --- checkpoint cadence (independent; the fully-trained model is always saved) ---
  # ckpt_every_steps: 1000            # also save every N optimizer steps
  # save_checkpoint_every_epoch: false

optimizer:
  lr: 6.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_ratio: 0.04
  min_lr_ratio: 0.1

checkpoint:
  enabled: true
  checkpoint_dir: ./outputs/dflash_qwen3_8b/checkpoints
  model_save_format: safetensors
  save_consolidated: true
  # restore_from: LATEST  # "LATEST", a subdir like "epoch_1_step_1000", or an absolute path

