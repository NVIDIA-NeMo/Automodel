# Knowledge distillation with disjoint 2-GPU student and teacher meshes.
# The student uses data parallelism and the teacher uses context parallelism.
#
# To run on four GPUs:
#   automodel examples/llm_kd/llama3_2/llama3_2_1b_kd_separate_mesh_teacher_cp2.yaml --nproc-per-node 4

recipe: KnowledgeDistillationRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 32
  local_batch_size: 1
  ckpt_every_steps: 200
  val_every_steps: 100
  num_epochs: 2

dist_env:
  backend: nccl
  timeout_minutes: 10

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

# Student on global ranks [0, 1].
model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: meta-llama/Llama-3.2-1B
  torch_dtype: bfloat16
  attn_implementation: sdpa

# Teacher on global ranks [2, 3].
teacher_model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: meta-llama/Llama-3.2-3B
  torch_dtype: bfloat16
  attn_implementation: sdpa

separate_meshes: true
distributed:
  strategy: fsdp2
  dp_size: 2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  sequence_parallel: false

teacher_distributed:
  strategy: fsdp2
  dp_size: 1
  tp_size: 1
  cp_size: 2
  pp_size: 1
  sequence_parallel: false

checkpoint:
  enabled: true
  checkpoint_dir: checkpoints/llama3_2_1b_kd_separate_mesh_teacher_cp2/
  model_save_format: safetensors
  save_consolidated: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

kd_ratio: 0.5
kd_loss_fn:
  _target_: nemo_automodel.components.loss.kd_loss.KDLoss
  ignore_index: -100
  temperature: 1.0
  fp32_upcast: true

optimizer:
  _target_: transformer_engine.pytorch.optimizers.fused_adam.FusedAdam
  betas: [0.9, 0.999]
  eps: 1e-8
  lr: 1.0e-5
  weight_decay: 0
  adam_w_mode: true
  bias_correction: true
  master_weights: true
  master_weight_dtype: torch.float32

dataset:
  _target_: nemo_automodel.components.datasets.llm.squad.make_squad_dataset
  dataset_name: rajpurkar/squad
  split: train
  seq_length: 2048
  padding: max_length
  truncation: true

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  shuffle: false

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.squad.make_squad_dataset
  dataset_name: rajpurkar/squad
  split: validation
  seq_length: 2048
  padding: max_length
  truncation: true

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
