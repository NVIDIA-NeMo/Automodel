recipe: KnowledgeDistillationRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 2
  local_batch_size: 1
  max_steps: 2
  num_epochs: 1
  ckpt_every_steps: 100
  val_every_steps: 100

dist_env:
  backend: nccl
  timeout_minutes: 10

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: /workspace/artifacts/tiny_llama
  torch_dtype: float32
  attn_implementation: sdpa

teacher_model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: /workspace/artifacts/tiny_llama
  torch_dtype: float32
  attn_implementation: sdpa

separate_meshes: true
distributed:
  strategy: fsdp2
  dp_size: 2
  tp_size: 1
  cp_size: 1
  pp_size: 1

teacher_distributed:
  strategy: fsdp2
  dp_size: 1
  tp_size: 2
  cp_size: 1
  pp_size: 1
  pipeline:
    pp_schedule: 1f1b
    pp_microbatch_size: 1
    scale_grads_in_schedule: false

checkpoint:
  enabled: false
  checkpoint_dir: /workspace/artifacts/checkpoints

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

kd_ratio: 0.5
kd_loss_fn:
  _target_: nemo_automodel.components.loss.kd_loss.KDLoss
  ignore_index: -100
  temperature: 1.0
  fp32_upcast: true

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  weight_decay: 0.0

dataset:
  _target_: tests.functional_tests.llm_pretrain_and_kd.kd_separate_mesh_test_utils.make_tiny_kd_dataset
  tokenizer:
    pretrained_model_name_or_path: /workspace/artifacts/tiny_llama
  num_samples: 16
  seq_length: 8

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  shuffle: false
