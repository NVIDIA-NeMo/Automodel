# dLLM (diffusion-LLM) SFT recipes included in the nightly scope.
# `examples_dir` defaults to the test-folder name (dllm_sft), so each entry
# resolves to examples/dllm_sft/<config>.
#
# The launcher runs a train -> generate smoke test: recipes with an
# examples/dllm_generate sampler preset (`llada`, `nemotron`) train then
# generate; recipes without a preset would be train-only.
#
# Every listed recipe MUST carry a top-level `ci:` block (recipe_owner + time)
# in its YAML -- generate_ci_tests.py reads it for SLURM wall time and ownership.
# These recipes download 8B checkpoints + a large SFT dataset on a cold HF cache,
# so allow generous `ci.time`.
configs:
  # -- LLaDA: pure MDLM, `llada` sampler --
  - llada_sft.yaml             # GSAI-ML/LLaDA-8B-Base  (8B, seq 1024, tp1)

  # -- Nemotron-Labs-Diffusion: hybrid block-diffusion, `nemotron` sampler --
  - nemotron_labs_diffusion_sft.yaml   # nvidia/Nemotron-Labs-Diffusion-8B-Base (8B, seq 8192, tp2)

  # diffusion_gemma_sft.yaml is intentionally excluded for now: the
  # google/diffusiongemma-26B-A4B-it model requires a newer transformers (HF)
  # version than the current CI image pins, so it won't load until the image is
  # bumped. The launcher already train-only-handles it (+ GSM8K prep), so it can
  # be re-added here once the transformers pin is updated.
