# Weekly Tulu-3 convergence recipes. Each is trained to completion (1000 steps)
# then gated on downstream IFEval vs a recorded baseline (see each recipe's
# ci.downstream_eval block) by convergence_tests_launcher.sh.
#
# One recipe per model -- the single config we validated end to end.

examples_dir: convergence
configs:
  - tulu3/models/moonlight-16b/moonlight_16b_ep8_te_fusedadam.yaml
  - tulu3/models/qwen3-moe-30b/qwen3_moe_30b_ep8_te_fusedadam.yaml
  - tulu3/models/gemma4-31b/gemma4_31b_tulu3_packed2k_cp1_gbs32_4node.yaml
