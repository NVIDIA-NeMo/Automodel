name: CICD NeMo
on:
  schedule:
    - cron: 0 0 * * *
  push:
    branches:
      - main
      - "pull-request/[0-9]+"
      - "deploy-release/*"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event.label.name || 'main' }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: read

env:
  container-registry: 766267172432.dkr.ecr.us-east-1.amazonaws.com

jobs:
  is-not-external-contributor:
    runs-on: ubuntu-latest
    outputs:
      is_external_contributor: ${{ github.event.pull_request.user.type == 'User' }}
      is_maintainer: ${{ steps.check-membership.outputs.is_maintainer }}
      selected_runner: ${{ steps.check-membership.outputs.is_maintainer == 'true' && 'nemo-ci-aws-gpu-x2' || 'nemo-ci-aws-gpu-x2-ephemeral' }}
    permissions:
      issues: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ secrets.PAT }}
      REPO: ${{ github.repository }}
      DISABLE_EXTERNAL_CONTRIBUTOR: ${{ vars.DISABLE_EXTERNAL_CONTRIBUTOR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ env.GITHUB_TOKEN }}

      - name: Get PR info
        id: get-pr-info
        if: startsWith(github.ref, 'refs/heads/pull-request/') && github.event_name == 'push'
        uses: nv-gha-runners/get-pr-info@main

      - name: Check NVIDIA SSO membership
        id: check-sso
        uses: ./.github/actions/check-nvidia-sso-membership
        with:
          username: ${{ fromJSON(steps.get-pr-info.outputs.pr-info || '{}').user.login }}
          github_token: ${{ secrets.NVIDIA_MANAGEMENT_ORG_PAT }}
          sso_users_filename: ${{ vars.SSO_USERS_FILENAME }}

      - name: Set maintainer status
        id: check-membership
        env:
          IS_MAIN_BRANCH: ${{ github.ref == 'refs/heads/main' }}
          IS_MERGE_GROUP: ${{ github.event_name == 'merge_group' }}
          SCHEDULED_JOB: ${{ github.event_name == 'schedule' }}
          IS_WORKFLOW_DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ "${SCHEDULED_JOB}" == "true" ] || [ "${IS_MAIN_BRANCH}" == "true" ] || [ "${IS_MERGE_GROUP}" == "true" ] || [ "${IS_WORKFLOW_DISPATCH}" == "true" ]; then
            echo "is_maintainer=true" | tee -a $GITHUB_OUTPUT
            exit 0
          fi

          IS_MEMBER="${{ steps.check-sso.outputs.is_member }}"

          if [ "${{ env.DISABLE_EXTERNAL_CONTRIBUTOR }}" == "true" ] && [ "${{ steps.check-sso.outputs.is_member }}" != "true" ]; then
            PR_AUTHOR=${{ fromJSON(steps.get-pr-info.outputs.pr-info || '{}').user.login }}

            echo "Checking if $PR_AUTHOR is a repo collaborator..."
            API_URL="https://api.github.com/repos/$REPO/collaborators/$PR_AUTHOR"
            REPO_MEMBERSHIP_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -L \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              $API_URL)

            echo "Checking if $PR_AUTHOR is an org collaborator to NVIDIA-NeMo..."
            API_URL="https://api.github.com/orgs/NVIDIA-NeMo/members/$PR_AUTHOR"
            ORG_NVIDIA_NEMO_MEMBERSHIP_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -L \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              $API_URL)

            echo "Checking if $PR_AUTHOR is an org collaborator to NVIDIA..."
            API_URL="https://api.github.com/orgs/NVIDIA/members/$PR_AUTHOR"
            ORG_NVIDIA_MEMBERSHIP_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -L \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              $API_URL)

            if [ "$REPO_MEMBERSHIP_RESPONSE" -eq 204 ] || [ "$ORG_NVIDIA_NEMO_MEMBERSHIP_RESPONSE" -eq 204 ] || [ "$ORG_NVIDIA_MEMBERSHIP_RESPONSE" -eq 204 ]; then
              IS_MEMBER="true"
            else
              exit 1
            fi
          fi

          if [ "$IS_MEMBER" == "true" ]; then
            echo "is_maintainer=true" | tee -a $GITHUB_OUTPUT
          else
            echo "is_maintainer=false" | tee -a $GITHUB_OUTPUT
          fi

  pre-flight:
    needs: [is-not-external-contributor]
    uses: NVIDIA-NeMo/FW-CI-templates/.github/workflows/_cicd_preflight.yml@v0.80.1
    with:
      default_runner_prefix: ${{ vars.DEFAULT_RUNNER_PREFIX }}
      non_nvidia_runner_prefix: ${{ vars.NON_NVIDIA_RUNNER_PREFIX }}
      default_test_data_path: ${{ vars.DEFAULT_TEST_DATA_PATH }}
      non_nvidia_test_data_path: ${{ vars.NON_NVIDIA_TEST_DATA_PATH }}
      sso_users_filename: ${{ vars.SSO_USERS_FILENAME }}
    secrets:
      NVIDIA_MANAGEMENT_ORG_PAT: ${{ secrets.NVIDIA_MANAGEMENT_ORG_PAT }}

  linting:
    runs-on: ${{ vars.LINT_AND_INSTALL_TEST_RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Set up UV
        uses: astral-sh/setup-uv@v1
        with:
          version: 0.8.22
      - name: Install ruff
        env:
          UV_PROJECT_ENVIRONMENT: ./venv
        run: |
          uv venv ${UV_PROJECT_ENVIRONMENT} --system-site-packages
          source ./venv/bin/activate

          export PATH="./bin/:$PATH"

          uv sync --link-mode copy --locked --group linting

      - name: Run ruff
        run: |
          source ./venv/bin/activate
          uv run --active ruff --version
          uv run --active ruff check --verbose .
          uv run --active ruff format --check --verbose .

  import_linting:
    runs-on: ${{ vars.LINT_AND_INSTALL_TEST_RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Set up UV
        uses: astral-sh/setup-uv@v1
        with:
          version: 0.8.22
      - name: Install ruff
        env:
          UV_PROJECT_ENVIRONMENT: ./venv
        run: |
          uv venv ${UV_PROJECT_ENVIRONMENT} --system-site-packages
          source ./venv/bin/activate

          export PATH="./bin/:$PATH"

          uv sync --link-mode copy --locked --group linting

      - name: Run import-linter
        run: |
          source ./venv/bin/activate
          uv run lint-imports --debug --verbose --no-cache

  type_checking:
    runs-on: ${{ vars.LINT_AND_INSTALL_TEST_RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Set up UV
        uses: astral-sh/setup-uv@v1
        with:
          version: 0.8.22
      - name: Install ty
        env:
          UV_PROJECT_ENVIRONMENT: ./venv
        run: |
          uv venv ${UV_PROJECT_ENVIRONMENT} --system-site-packages
          source ./venv/bin/activate

          export PATH="./bin/:$PATH"

          uv sync --link-mode copy --locked --group linting

      - name: Run ty
        run: |
          source ./venv/bin/activate
          uv run --active ty --version

          uv pip install -q tomli
          TY_DIRS=$(python3 -c "
          try:
              import tomllib
          except ModuleNotFoundError:
              import tomli as tomllib
          from pathlib import Path
          data = tomllib.loads(Path('pyproject.toml').read_text())
          dirs = set()
          for override in data.get('tool', {}).get('ty', {}).get('overrides', []):
              for pattern in override.get('include', []):
                  dirs.add(pattern.replace('/**', ''))
          print(' '.join(sorted(dirs)))
          ")

          echo "ty check targets: $TY_DIRS"
          uv run --active ty check --verbose $TY_DIRS

  Nemo_Linting_Test:
    needs: [linting, import_linting, type_checking]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Main
        env:
          LINTING_RESULT: ${{ toJson(needs.linting) }}
          IMPORT_LINTING_RESULT: ${{ toJson(needs.import_linting) }}
          TYPE_CHECKING_RESULT: ${{ toJson(needs.type_checking) }}
        run: |
          LINTING=$(echo "$LINTING_RESULT" | jq -r '.result')
          IMPORT_LINTING=$(echo "$IMPORT_LINTING_RESULT" | jq -r '.result')
          TYPE_CHECKING=$(echo "$TYPE_CHECKING_RESULT" | jq -r '.result')

          if [[ "$LINTING" == "success" ]] && [[ "$IMPORT_LINTING" == "success" ]] && [[ "$TYPE_CHECKING" == "success" ]]; then
            echo "All linting checks passed."
            exit 0
          else
            echo "Some linting checks failed:"
            echo "  - linting: $LINTING"
            echo "  - import_linting: $IMPORT_LINTING"
            echo "  - type_checking: $TYPE_CHECKING"
            exit 1
          fi

  cicd-wait-in-queue:
    needs: [pre-flight]
    runs-on: ubuntu-latest
    environment: test
    if: |
      !(needs.pre-flight.outputs.is_ci_workload == 'true'
      || needs.pre-flight.outputs.is_deployment_workflow == 'true'
      || needs.pre-flight.outputs.docs_only == 'true')
    steps:
      - name: Running CI tests
        run: |
          echo "Running CI tests"

  cicd-container-build:
    needs: [is-not-external-contributor, pre-flight, cicd-wait-in-queue]
    if: |
      (
        success()
        || needs.pre-flight.outputs.is_ci_workload == 'true'
        || needs.pre-flight.outputs.force_run_all == 'true'
      )
      && !cancelled()
    runs-on: ${{ needs.is-not-external-contributor.outputs.selected_runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: main
        uses: ./.github/actions/build-container
        with:
          dockerfile-path: "./docker/Dockerfile"
          PAT: ${{ secrets.PAT }}
          repo-name: ${{ vars.CI_REPO_NAME || 'Automodel' }}

  cicd-unit-tests:
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - test-name: L0_Unit_Tests_CPU
            runner: ${{ needs.is-not-external-contributor.outputs.selected_runner }}
            cpu-only: true
          - test-name: L0_Unit_Tests_GPU
            runner: ${{ needs.is-not-external-contributor.outputs.selected_runner }}
            cpu-only: false
            timeout: 30
    needs: [is-not-external-contributor, pre-flight, cicd-wait-in-queue, cicd-container-build]
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.test-name }}
    if: |
      (
        success()
        || needs.pre-flight.outputs.is_ci_workload == 'true'
        || needs.pre-flight.outputs.force_run_all == 'true'
      )
      && !cancelled()
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: main
        uses: ./.github/actions/test-template
        with:
          timeout: ${{ matrix.timeout || 10 }}
          is-unit-test: "true"
          cpu-only: ${{ matrix.cpu-only || false }}
          PAT: ${{ secrets.PAT }}
          test-data-path: ${{ needs.pre-flight.outputs.test_data_path }}
          container-image: ${{ env.container-registry }}/${{ vars.CI_CONTAINER_NAME || 'automodel' }}:${{ github.sha }}
          runner: ${{ matrix.runner }}

  cicd-e2e-tests:
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include:
          - test-name: L2_Pretrain_and_KD
            test-folder: llm_pretrain_and_kd
            timeout: 20
            runner: ${{ needs.is-not-external-contributor.outputs.selected_runner }}
            test-data-path: ${{ needs.pre-flight.outputs.test_data_path }}
          - test-name: L2_HF_DCP
            test-folder: hf_dcp
            timeout: 40
            runner: ${{ needs.is-not-external-contributor.outputs.selected_runner }}
            test-data-path: ${{ needs.pre-flight.outputs.test_data_path }}
          - test-name: L2_HF_PEFT
            test-folder: hf_peft
            timeout: 30
            runner: ${{ needs.is-not-external-contributor.outputs.selected_runner }}
            test-data-path: ${{ needs.pre-flight.outputs.test_data_path }}
          - test-name: L2_HF_Transformer
            test-folder: hf_transformer
            timeout: 20
            runner: ${{ needs.is-not-external-contributor.outputs.selected_runner }}
            test-data-path: ${{ needs.pre-flight.outputs.test_data_path }}
          - test-name: L2_HF_Transformer_Finetune
            test-folder: hf_transformer_finetune
            timeout: 40
            runner: ${{ needs.is-not-external-contributor.outputs.selected_runner }}
            test-data-path: ${{ needs.pre-flight.outputs.test_data_path }}
          - test-name: L2_HF_Transformer_LLM
            test-folder: hf_transformer_llm
            timeout: 40
            runner: ${{ needs.is-not-external-contributor.outputs.selected_runner }}
            test-data-path: ${{ needs.pre-flight.outputs.test_data_path }}
          - test-name: L2_HF_Transformer_VLM
            test-folder: hf_transformer_vlm
            timeout: 60
            runner: ${{ needs.is-not-external-contributor.outputs.selected_runner }}
            test-data-path: ${{ needs.pre-flight.outputs.test_data_path }}
          - test-name: L2_Datasets
            test-folder: data
            timeout: 20
            runner: ${{ needs.is-not-external-contributor.outputs.selected_runner }}
            test-data-path: ${{ needs.pre-flight.outputs.test_data_path }}
          - test-name: L2_Context_Parallel
            test-folder: context_parallel
            timeout: 20
            runner: ${{ needs.is-not-external-contributor.outputs.selected_runner }}
            test-data-path: ${{ needs.pre-flight.outputs.test_data_path }}
          - test-name: L2_Retrieval
            test-folder: retrieval
            timeout: 20
            runner: ${{ needs.is-not-external-contributor.outputs.selected_runner }}
            test-data-path: ${{ needs.pre-flight.outputs.test_data_path }}
    needs: [is-not-external-contributor, pre-flight, cicd-unit-tests]
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.test-name }}
    if: |
      (
        success()
        || needs.pre-flight.outputs.is_ci_workload == 'true'
        || needs.pre-flight.outputs.force_run_all == 'true'
      )
      && !cancelled()
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: main
        uses: ./.github/actions/test-template
        with:
          test-folder: ${{ matrix.test-folder }}
          timeout: ${{ matrix.timeout }}
          is_unit_test: "false"
          PAT: ${{ secrets.PAT }}
          test-data-path: ${{ matrix.test-data-path }}
          container-image: ${{ env.container-registry }}/${{ vars.CI_CONTAINER_NAME || 'automodel' }}:${{ github.sha }}
          runner: ${{ matrix.runner }}

  Nemo_CICD_Test:
    needs:
      - pre-flight
      - cicd-unit-tests
      - cicd-e2e-tests
    if: |
      (
        needs.pre-flight.outputs.docs_only == 'true'
        || needs.pre-flight.outputs.is_deployment_workflow == 'true'
        || needs.pre-flight.outputs.is_ci_workload == 'true'
        || always()
      )
      && !cancelled()
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get workflow result
        id: result
        shell: bash -x -e -u -o pipefail {0}
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          SKIPPING_IS_ALLOWED: ${{ needs.pre-flight.outputs.docs_only == 'true' || needs.pre-flight.outputs.is_deployment_workflow == 'true' || needs.pre-flight.outputs.is_ci_workload == 'true' }}
        run: |
          FAILED_JOBS=$(gh run view $GITHUB_RUN_ID --json jobs --jq '[.jobs[] | select(.status == "completed" and .conclusion != "success")] | length') || echo 0

          if [ "${FAILED_JOBS:-0}" -eq 0 ] || [ "$SKIPPING_IS_ALLOWED" == "true" ]; then
              echo "✅ All previous jobs completed successfully"
              exit 0
          else
              echo "❌ Found $FAILED_JOBS failed job(s)"
              # Show which jobs failed
              gh run view $GITHUB_RUN_ID --json jobs --jq '.jobs[] | select(.status == "completed" and .conclusion != "success") | .name'
              exit 1
          fi

  Coverage_Fake:
    runs-on: ubuntu-latest
    needs: [Nemo_CICD_Test, pre-flight]
    if: |
      (
        needs.pre-flight.outputs.docs_only == 'true'
        || needs.pre-flight.outputs.is_deployment_workflow == 'true'
      )
      && needs.pre-flight.outputs.is_ci_workload == 'false'
      && !cancelled()
      && vars.ENABLE_CODECOV == 'true'
    steps:
      - name: Generate fake coverage report
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              description: 'No code changes - coverage check skipped',
              context: 'codecov/patch'
            });

  Coverage:
    runs-on: ubuntu-latest
    needs: [pre-flight, Nemo_CICD_Test]
    if: |
      (
        (needs.pre-flight.outputs.is_ci_workload == 'true' && !failure())
        || success()
      )
      && !cancelled()
      && vars.ENABLE_CODECOV == 'true'
    strategy:
      matrix:
        flag: [unit-test, e2e]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download coverage reports of current branch
        uses: actions/download-artifact@v7
        with:
          pattern: coverage-${{ matrix.flag }}-*
          path: coverage-downloads

      - name: Get total coverage of current branch
        shell: bash -x -e -u -o pipefail {0}
        if: always()
        run: |
          pip install coverage[toml]

          if ! [ -d coverage-downloads ] || [ -z "$(ls -A coverage-downloads)" ]; then
            echo "No coverage artifacts found for ${{ matrix.flag }}, skipping."
            exit 0
          fi
          ls -al coverage-downloads/
          coverage combine --keep $(find coverage-downloads -name '.coverage')
          coverage report -i
          coverage xml -i
          rm -rf coverage-downloads
          ls -al

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          flags: ${{ matrix.flag }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: coverage-${{ matrix.flag }}-aggregated
          path: |
            .coverage
          include-hidden-files: true
