name: Doc coverage

on:
  push:
    branches:
      - main
      - "pull-request/[0-9]+"
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  doc-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history is required for the script's ``git log -S`` lookup
          # that ages each undocumented arch against the grace window.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Resolve PR number
        id: pr
        env:
          REF: ${{ github.ref }}
        run: |
          if [[ "$REF" =~ ^refs/heads/pull-request/([0-9]+)$ ]]; then
            echo "number=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run doc-coverage check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          ARGS=(--repo "$REPO")
          if [[ -n "$PR_NUMBER" ]]; then
            ARGS+=(--pr "$PR_NUMBER")
          fi
          python3 .github/scripts/post_doc_coverage_comment.py "${ARGS[@]}"
