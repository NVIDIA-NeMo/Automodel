name: Build docs

on:
  push:
    branches:
      - main
      - "pull-request/[0-9]+"
      - "deploy-release/*"
    paths:
      - 'docs/**'
      - '.github/fern-template/**'
      - '.github/scripts/prepare-fern-docs.sh'
      - '.github/workflows/build-docs.yml'
  workflow_call:

permissions:
  contents: read

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Fern CLI
        run: npm install -g fern-api.62.4

      - name: Prepare Fern project
        run: bash .github/scripts/prepare-fern-docs.sh "$GITHUB_WORKSPACE" "$RUNNER_TEMP/fern-docs/fern"

      - name: Validate Fern configuration
        working-directory: ${{ runner.temp }}/fern-docs/fern
        run: fern check
