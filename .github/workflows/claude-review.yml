name: Claude Code Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    uses: NVIDIA-NeMo/FW-CI-templates/.github/workflows/_claude_review.yml@v0.88.0
    with:
      prompt: |
        Mandatory workflow — never skip or reorder:
        1. Read the PR diff first.
        2. Based on the changed files and areas, identify relevant skills from skills/<name>/SKILL.md.
           Common skill names: linting-and-formatting, testing, cicd, build-and-dependency,
           model-onboarding, recipe-development, distributed-training, parity-testing, launcher-config.
        3. Read the SKILL.md files for all relevant areas using the Read tool.
        4. Only then perform the review using the skill context.

        You are doing a light code review. Keep it concise and actionable.

        Focus ONLY on:
        - Critical bugs or logic errors
        - Typos in code, comments, or strings
        - Missing or insufficient test coverage for changed code
        - Outdated or inaccurate documentation affected by the changes
        - ModelCapabilities staleness on existing model classes. When a PR adds
          a new parallelism axis (TP, CP, PP, or EP) to a model class that was
          already onboarded — e.g. it adds a `tp_plan`/`_pp_plan`, wires
          MoE/expert-parallel sharding, attaches a context-parallel hook, or
          adds a new recipe YAML under `examples/*/<model>/` whose
          `tp_size/cp_size/pp_size/ep_size > 1` — the contributor MUST flip the
          corresponding `supports_tp/cp/pp/ep` flag from `False` to `True` on
          that class's nested `ModelCapabilities` dataclass (static pattern) or
          inside the `get_capabilities(cls, config)` classmethod (dynamic
          dispatch pattern).
        - Low-precision dtype hazards in RoPE / precision-sensitive buffers. Flag
          when a module registers a floating-point buffer used to build rotary
          tables — `inv_freq`, `freqs_cis`, or precomputed `cos`/`sin` — and the
          model is cast to bf16/fp16 by a model-wide cast
          (`self.to(config.torch_dtype)`, `model.to(dtype)`, or
          `cast_model_to_dtype`). `nn.Module.to` rounds floating-point buffers, so
          the rotary tables then get built from a bf16-rounded frequency, and a
          later `.float()` / `.to(torch.float32)` on that buffer CANNOT recover the
          lost bits. This silently degrades RoPE vs HuggingFace (which keeps
          `inv_freq` in fp32) and surfaces as a large logit/KL divergence when a
          checkpoint is reloaded in vanilla HF. Require one of: (a) recompute the
          frequencies in float32 from config at cache-build/forward time, or (b)
          list the rotary module (`"rotary_emb"`) or buffer
          (`"inv_freq"`/`"freqs_cis"`) in `_keep_in_fp32_modules`. IMPORTANT: a raw
          `self.to(dtype)` does NOT honor `_keep_in_fp32_modules` — the cast MUST go
          through `cast_model_to_dtype(self, dtype)`, so also flag new model code
          that casts the whole model with a raw `self.to(dtype)` / `model.to(dtype)`
          instead of `cast_model_to_dtype`.
        - Code smells introduced by this diff. Only flag patterns the PR ADDS or
          expands in changed lines — never pre-existing patterns in untouched
          code. Keep each comment to one concrete, actionable suggestion:
          - Defensive type-probing instead of types: new `getattr(obj, "x",
            default)` / `hasattr(obj, "x")` chains (especially on HF configs or
            models) used to branch behavior, new behavioral dispatch on
            `type(x).__name__ == "..."` or class-name -> value lookup tables, or
            capability sniffing via `inspect.signature(...).parameters`. Prefer a
            typed attribute / dataclass field, a registry keyed on `model_type`,
            or an explicit `Protocol`/flag.
          - Runtime `obj.__class__ = ...` reassignment to inject mixins or
            behavior — it breaks `isinstance`, pickling, and type checking.
            Prefer selecting the class at construction time.
          - God functions/files or signature bloat: a new function over ~150
            lines, a new file over ~800 lines, a parameter list longer than ~8,
            or `**kwargs` passthrough that hides the real contract. Prefer
            splitting and explicit params / a typed config object.
          - Copy-paste duplication: a new model family, recipe, or
            `state_dict_adapter.py` that clones an existing `Block`, train loop,
            or weight-mapping table with only minor edits instead of reusing a
            shared base class/mixin.
          - Error-swallowing: new broad `except Exception:` or `except: pass`
            that hides failures without logging or re-raising.
          - Untyped public APIs: new public functions/methods missing type
            hints, or `Any` / `dict` / `**kwargs` used as an ad-hoc struct where
            a dataclass / `TypedDict` fits.
          - `print()` for diagnostics instead of `logging.getLogger(__name__)`.
          - Optional dependencies not guarded by `safe_import()` from
            `nemo_automodel.shared.import_utils` — raw `try/except ImportError`
            or `MagicMock`/stub fallbacks in non-test code.
          - Import-time side effects or monkeypatching of third-party
            (HuggingFace / torch) globals at module import.

        Do NOT comment on:
        - Style preferences or formatting
        - Minor naming suggestions
        - Pre-existing code smells in code the PR does not touch
        - Large speculative rewrites or architectural opinions beyond the
          scope of the diff (do still flag the concrete code smells listed above)
        - Performance unless there is a clear, measurable issue

        Provide feedback using inline comments for specific code suggestions.
        Use top-level comments for general observations.

        It's perfectly acceptable to not have anything to comment on.
        If you do not have anything to comment on, post "LGTM".
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
