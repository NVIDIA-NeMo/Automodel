# Validates Fern docs configuration on pull requests. The repo tracks authored
# docs under docs/ and Fern configuration under .github/fern-template/; this
# workflow materializes a disposable Fern project before running the CLI.

name: Fern docs (check)

# Triggers on push to mirrored PR branches (`pull-request/<n>`) created by the
# FW-CI mirror bot — same pattern as build-docs.yml. This runs in the trusted
# base-repo context, so DOCS_FERN_TOKEN is available even for fork PRs.
on:
  push:
    branches:
      - "pull-request/[0-9]+"
    paths:
      - 'docs/**'
      - '.github/fern-template/**'
      - '.github/scripts/prepare-fern-docs.sh'
      - '.github/workflows/fern-docs-ci.yml'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Fern CLI
        run: npm install -g fern-api.62.4

      - name: Prepare Fern project
        run: bash .github/scripts/prepare-fern-docs.sh "$GITHUB_WORKSPACE" "$RUNNER_TEMP/fern-docs/fern"

      - name: Validate Fern configuration
        working-directory: ${{ runner.temp }}/fern-docs/fern
        run: fern check
