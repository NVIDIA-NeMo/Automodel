name: "Test Template"
description: "Template for running NeMo tests in a containerized environment"

inputs:
  timeout:
    description: "Max runtime of test in minutes"
    required: false
    default: "10"
  test-folder:
    description: "Name of the folder containg tests suite"
    required: false
  is-optional:
    description: "Failure will cancel all other tests if set to true"
    required: false
    default: "false"
  is-unit-test:
    description: "Upload coverage as unit test"
    required: false
    default: "false"
  cpu-only:
    description: "Run tests on CPU only"
    required: false
    default: "false"
  shard-id:
    description: "0-based pytest-shard index for splitting a suite across runners"
    required: false
    default: ""
  num-shards:
    description: "Total number of pytest-shard chunks the suite is split into"
    required: false
    default: ""
  PAT:
    description: "GitHub Personal Access Token"
    required: true
  container-image:
    description: "Container image to use for test"
    required: true
  test-data-path:
    description: "Test data path"
    required: true
  runner:
    description: "Runner to use for test"
    required: true

runs:
  using: "composite"
  steps:
    - name: Install uuidgen
      shell: bash -x -e -u -o pipefail {0}
      if: ${{ contains(inputs.runner, 'aws') || contains(inputs.runner, 'gcp') }}
      run: |
        for i in 1 2 3; do
          apt-get update && apt-get install -y uuid-runtime && break
          echo "Attempt $i failed, retrying in 10s..."
          sleep 10
        done

    - name: Start container
      shell: bash
      run: |
        echo "::group::Start test container"

        ARG=("")
        if [[ "${{ inputs.cpu-only }}" == "false" ]]; then
          ARG=("--runtime=nvidia --gpus all")
        fi

        cmd=$(cat <<RUN_TEST_EOF
        #!/bin/bash
        docker container rm -f nemo_container_${{ github.run_id }} || true
        docker run \
          --rm \
          -d \
          --name nemo_container_${{ github.run_id }} ${ARG[@]} \
          --shm-size=64g \
          --env TRANSFORMERS_OFFLINE=0 \
          --env HYDRA_FULL_ERROR=1 \
          --env HF_CACHE=/home/TestData/lite/hf_cache \
          --env HF_HOME=/home/TestData/HF_HOME \
          --env RUN_ID=${{ github.run_id }} \
          --env TEST_DATA_DIR=/home/TestData/automodel \
          --volume ${{ inputs.test-data-path }}:/home/TestData \
          ${{ inputs.container-image }} \
          bash -c "sleep $(( ${{ inputs.timeout }} * 60 + 60 ))"
        RUN_TEST_EOF
        )

        echo "$cmd" | tee "retry_job.sh"
        bash retry_job.sh
        echo "::endgroup::"

    - name: Validate CUDA runtime compatibility
      shell: bash -e -u -o pipefail {0}
      if: ${{ inputs.cpu-only == 'false' }}
      run: |
        echo "::group::Validate CUDA runtime compatibility"
        docker exec nemo_container_${{ github.run_id }} bash -c '
          set -e

          . /opt/venv/env.sh

          echo "nvidia-smi:"
          nvidia-smi || true

          python - <<'"'"'PY'"'"'
        import torch

        print(f"torch={torch.__version__}")
        print(f"torch.version.cuda={torch.version.cuda}")
        print(f"cuda_available_probe={torch.cuda.is_available()}")

        try:
            torch.cuda.init()
            device_count = torch.cuda.device_count()
            print(f"cuda_device_count={device_count}")
            if device_count < 1:
                raise RuntimeError("no CUDA devices are visible")
            for idx in range(device_count):
                name = torch.cuda.get_device_name(idx)
                capability = torch.cuda.get_device_capability(idx)
                print(f"cuda_device_{idx}={name}, capability={capability}")
            torch.empty(1, device="cuda")
        except Exception as exc:
            print(
                "::error title=CUDA runtime incompatible::"
                "CUDA failed to initialize inside the test container. "
                "This usually means the host NVIDIA driver is too old for "
                "the CUDA runtime in the CI image; rerun on an updated GPU runner. "
                f"error={type(exc).__name__}: {exc}"
            )
            raise
        PY
        '
        echo "::endgroup::"

    - name: Create run-script
      id: create
      shell: bash
      run: |
        echo "::group::Create run-script"
        COVERAGE_PREFIX=$([[ "${{ inputs.is-unit-test }}" == "true" ]] && echo "unit-test" || echo "e2e")
        echo "coverage-prefix=$COVERAGE_PREFIX" | tee -a "$GITHUB_OUTPUT"

        cmd=$(cat <<'RUN_TEST_EOF'
        #!/bin/bash

        docker exec -t nemo_container_${{ github.run_id }} bash -c '
          set -e

          . /opt/venv/env.sh

          bash tests/run_test.sh --UNIT_TEST=${{ inputs.is-unit-test }} --CPU=${{ inputs.cpu-only}} --TEST_NAME=${{ inputs.test-folder }} --SHARD_ID=${{ inputs.shard-id }} --NUM_SHARDS=${{ inputs.num-shards }}

        '


        RUN_TEST_EOF
        )

        echo "timeout_in_seconds=$(( ${{ inputs.timeout }} * 60 ))" | tee -a "$GITHUB_OUTPUT"
        echo "$cmd" | tee "job.sh"
        echo "::endgroup::"

    - name: Display launch info
      shell: bash
      run: |
        echo -e "\033[1;34m┌─ launching test ─────────────────────────────────────────────────────────┐\033[0m"
        echo -e "\033[1;34m│  test      : ${{ inputs.test-folder }}\033[0m"
        echo -e "\033[1;34m│  runner    : ${{ inputs.runner }}\033[0m"
        echo -e "\033[1;34m│  container : ${{ inputs.container-image }}\033[0m"
        echo -e "\033[1;34m└──────────────────────────────────────────────────────────────────────────┘\033[0m"

    - name: Run main script
      uses: nick-fields/retry@v3
      id: run-main-script
      continue-on-error: ${{ inputs.is-optional == 'true' }}
      with:
        timeout_seconds: ${{ steps.create.outputs.timeout_in_seconds }}
        max_attempts: 3
        shell: bash
        retry_on: timeout
        command: /bin/bash job.sh
        on_retry_command: /bin/bash retry_job.sh

    - name: Check result
      id: check
      shell: bash -e -u -o pipefail {0}
      if: always()
      run: |
        docker exec nemo_container_${{ github.run_id }} /opt/venv/bin/coverage combine || true
        docker exec nemo_container_${{ github.run_id }} /opt/venv/bin/coverage xml || true
        docker cp nemo_container_${{ github.run_id }}:/opt/Automodel/.coverage .coverage || true
        docker cp nemo_container_${{ github.run_id }}:/opt/Automodel/coverage.xml coverage.xml || true

        coverage_report=coverage-${{ steps.create.outputs.coverage-prefix }}-${{ github.run_id }}-$(uuidgen)
        echo "coverage_report=$coverage_report" | tee -a "$GITHUB_OUTPUT"

        EXIT_CODE=${{ steps.run-main-script.outputs.exit_code }}
        IS_SUCCESS=$([[ "$EXIT_CODE" -eq 0 ]] && echo "true" || echo "false")
        IS_ALLOWED_FAILURE=false

        if [[ "$IS_SUCCESS" == "false" && "${{ inputs.is-optional }}" == "true" ]]; then
          IS_ALLOWED_FAILURE=true
        fi

        echo "::group::Coverage report"
        docker exec -t nemo_container_${{ github.run_id }} /opt/venv/bin/coverage report -i || true
        echo "::endgroup::"

        if [[ "$IS_ALLOWED_FAILURE" == "true" ]]; then
          echo -e "\033[1;33m╔══════════════════════════════════════════════════════════════════════════╗\033[0m"
          echo -e "\033[1;33m║                                                                          ║\033[0m"
          echo -e "\033[1;33m║   ⚠️   ALLOWED FAILURE  (exit code: ${EXIT_CODE})                        ║\033[0m"
          echo -e "\033[1;33m║   ${{ inputs.test-folder }}\033[0m"
          echo -e "\033[1;33m║                                                                          ║\033[0m"
          echo -e "\033[1;33m╚══════════════════════════════════════════════════════════════════════════╝\033[0m"
          echo "::warning title=Result::⚠️ ${{ inputs.test-folder }} — ALLOWED FAILURE (exit $EXIT_CODE)"
          exit 0
        elif [[ "$IS_SUCCESS" == "true" ]]; then
          echo -e "\033[1;32m╔══════════════════════════════════════════════════════════════════════════╗\033[0m"
          echo -e "\033[1;32m║                                                                          ║\033[0m"
          echo -e "\033[1;32m║   ✅  PASSED                                                             ║\033[0m"
          echo -e "\033[1;32m║   ${{ inputs.test-folder }}\033[0m"
          echo -e "\033[1;32m║                                                                          ║\033[0m"
          echo -e "\033[1;32m╚══════════════════════════════════════════════════════════════════════════╝\033[0m"
          echo "::notice title=Result::✅ ${{ inputs.test-folder }} — PASSED"
          exit 0
        else
          echo -e "\033[1;31m╔══════════════════════════════════════════════════════════════════════════╗\033[0m"
          echo -e "\033[1;31m║                                                                          ║\033[0m"
          echo -e "\033[1;31m║   ❌  FAILED  (exit code: ${EXIT_CODE})                                  ║\033[0m"
          echo -e "\033[1;31m║   ${{ inputs.test-folder }}\033[0m"
          echo -e "\033[1;31m║                                                                          ║\033[0m"
          echo -e "\033[1;31m╚══════════════════════════════════════════════════════════════════════════╝\033[0m"
          echo "::error title=Result::❌ ${{ inputs.test-folder }} — FAILED (exit $EXIT_CODE)"
          exit 1
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      if: ${{ steps.check.outputs.coverage_report != 'none' }}
      with:
        name: ${{ steps.check.outputs.coverage_report }}
        path: |
          coverage.xml
          .coverage
        include-hidden-files: true
